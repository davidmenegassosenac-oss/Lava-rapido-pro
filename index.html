      {open&&!showPgto&&!showLavador&&(
        <div style={{borderTop:"1px solid rgba(125,211,252,.08)",padding:16,
          background:"rgba(0,0,0,.2)",backdropFilter:"blur(8px)"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14,fontSize:12}}>
            <div><span style={{color:"rgba(186,230,253,.4)",display:"block",marginBottom:2}}>Telefone</span>
              <span style={{color:"#bae6fd",fontWeight:600}}>{item.phone}</span></div>
            <div><span style={{color:"rgba(186,230,253,.4)",display:"block",marginBottom:2}}>Entrada</span>
              <span style={{color:"#bae6fd",fontWeight:600}}>{fmtTime(item.created_at)}</span></div>
            {item.criador?.name&&<div><span style={{color:"rgba(186,230,253,.4)",display:"block",marginBottom:2}}>Criado por</span>
              <span style={{color:"#bae6fd",fontWeight:600}}>{item.criador.name}</span></div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {next&&<button onClick={onClickAvancar} disabled={loading}
              style={{flex:1,padding:"12px 0",borderRadius:14,
                background:"linear-gradient(135deg,#0ea5e9,#6366f1)",
                color:"#fff",fontWeight:800,fontSize:13,border:"none",cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",gap:6,
                boxShadow:"0 4px 16px rgba(14,165,233,.35)",opacity:loading?.6:1}}>
              {loading?<div className="spinner spin" style={{width:14,height:14}}/>
                :<><Icon name="Zap" size={13} color="#fff"/> Avançar: {next}</>}
            </button>}
            <button onClick={()=>onDelete(item.id)}
              style={{padding:"12px 14px",borderRadius:14,
                background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",
                color:"#f87171",cursor:"pointer",display:"flex",alignItems:"center"}}>
              <Icon name="Trash2" size={15} color="#f87171"/>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
function HomeScreen({empresaId}){
  const [queue,setQueue]=useState([]);
  const [loading,setLoading]=useState(true);
  const [errorMsg,setErrorMsg]=useState("");
  const [funcionarios,setFuncionarios]=useState([]);

  const fetchQueue=useCallback(async()=>{
    const{data,error}=await sb.from('ordens_servico').select('*, criador:profiles!criado_por(name), lavador:profiles!lavado_por(name)').eq('empresa_id',empresaId).order('created_at',{ascending:true});
    if(error){setErrorMsg("Não foi possível carregar a fila. Verifique sua conexão.");}
    setQueue(data||[]);setLoading(false);
  },[empresaId]);

  useEffect(()=>{
    fetchQueue();
    // Buscar funcionários para o modal "quem vai lavar"
    sb.from('profiles').select('id,name').eq('empresa_id',empresaId).eq('role','employee')
      .then(({data})=>setFuncionarios(data||[]));
    const ch=sb.channel(`queue_${empresaId}`)
      .on('postgres_changes',{event:'*',schema:'public',table:'ordens_servico',filter:`empresa_id=eq.${empresaId}`},(payload)=>{
        if(payload.eventType==='INSERT'&&payload.new){
          setQueue(prev=>prev.some(v=>v.id===payload.new.id)?prev:[...prev,payload.new]);
          fetchQueue();
        }else if(payload.eventType==='UPDATE'&&payload.new){
          setQueue(prev=>prev.map(v=>v.id===payload.new.id?{...payload.new,criador:v.criador,lavador:v.lavador}:v));
        }else if(payload.eventType==='DELETE'&&payload.old){
          setQueue(prev=>prev.filter(v=>v.id!==payload.old.id));
        }else{
          fetchQueue();
        }
      })
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[fetchQueue,empresaId]);

  const advance=async(id,nextStatus,currentStatus,formaPagamento,lavadoPor)=>{
    setErrorMsg("");
    const updateData={status:nextStatus,updated_at:new Date().toISOString()};
    if(nextStatus==="Pago"&&formaPagamento)updateData.forma_pagamento=formaPagamento;
    if(nextStatus==="Lavando"&&lavadoPor)updateData.lavado_por=lavadoPor;
    const{error,count}=await sb.from('ordens_servico')
      .update(updateData,{count:'exact'})
      .eq('id',id)
      .eq('status',currentStatus);
    if(error){
      setErrorMsg("Falha ao atualizar status. Verifique sua conexão e tente novamente.");
      setTimeout(()=>setErrorMsg(""),5000);
      return;
    }
    if(count===0){
      setErrorMsg("Este veículo já foi atualizado por outro usuário. A fila foi recarregada.");
      setTimeout(()=>setErrorMsg(""),5000);
    }
    fetchQueue();
  };

  const del=async(id)=>{
    setErrorMsg("");
    const{error}=await sb.from('ordens_servico').delete().eq('id',id);
    if(error){
      setErrorMsg("Não foi possível remover o veículo. Tente novamente.");
      setTimeout(()=>setErrorMsg(""),5000);
      return;
    }
    setQueue(q=>q.filter(v=>v.id!==id));
  };

  const pills=[
    {label:"Aguardando",count:queue.filter(v=>v.status==="Aguardando").length,color:"#fbbf24",pct:queue.length?queue.filter(v=>v.status==="Aguardando").length/queue.length*100:0},
    {label:"Lavando",   count:queue.filter(v=>v.status==="Lavando").length,   color:"#38bdf8",pct:queue.length?queue.filter(v=>v.status==="Lavando").length/queue.length*100:0},
    {label:"Concluído", count:queue.filter(v=>v.status==="Concluído").length, color:"#4ade80",pct:queue.length?queue.filter(v=>v.status==="Concluído").length/queue.length*100:0},
  ];

  return(
    <div className="scroll screen-enter" style={{position:"relative"}}>
      {/* Bolhas decorativas de fundo */}
      <div style={{position:"fixed",top:-80,right:-60,width:260,height:260,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(14,165,233,.18),transparent 70%)",
        filter:"blur(50px)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:60,left:-70,width:240,height:240,borderRadius:"50%",
        background:"radial-gradient(circle,rgba(99,102,241,.12),transparent 70%)",
        filter:"blur(55px)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"relative",zIndex:1}}>
      {errorMsg&&(
        <div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.35)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
          <Icon name="AlertTriangle" size={14} color="#f87171" style={{marginTop:1,flexShrink:0}}/>
          <span style={{color:"#f87171",fontSize:12,fontWeight:600,lineHeight:1.4,flex:1}}>{errorMsg}</span>
          <button onClick={()=>setErrorMsg("")} style={{background:"transparent",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
            <Icon name="XCircle" size={14} color="#f87171"/>
          </button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
        {pills.map(p=>(
          <div key={p.label} className="glass-card" style={{padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:p.color,lineHeight:1}}>{p.count}</div>
            <div style={{fontSize:10,fontWeight:600,color:"rgba(186,230,253,.5)",marginTop:4,marginBottom:6}}>{p.label}</div>
            <ProgressBar pct={p.pct} color={p.color}/>
          </div>
        ))}
      </div>
      {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>
      :queue.length===0?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 0",textAlign:"center"}}>
          <div style={{width:68,height:68,borderRadius:22,background:"rgba(14,165,233,.1)",border:"1px solid rgba(14,165,233,.2)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <Icon name="Droplets" size={30} color="rgba(56,189,248,.5)"/>
          </div>
          <div style={{color:"rgba(186,230,253,.7)",fontWeight:700,fontSize:16}}>Fila vazia</div>
          <div style={{color:"rgba(186,230,253,.4)",fontSize:13,marginTop:6}}>Adicione um veículo na aba Nova Lavagem</div>
        </div>
      ):(queue.map((v,i)=><CarCard key={v.id} item={v} onAdvance={advance} onDelete={del} onUpdate={(id,patch)=>setQueue(q=>q.map(x=>x.id===id?{...x,...patch}:x))} funcionarios={funcionarios} selecionarLavador={false} idx={i}/>))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   NEW WASH SCREEN
══════════════════════════════════════════════════════════════════════════ */
function NewWashScreen({empresaId,userId,onSuccess}){
  const refs={
    plate:useRef(null),model:useRef(null),
    client:useRef(null),phone:useRef(null),
    observacoes:useRef(null),
  };
  // Multi-seleção: array de serviços selecionados
  const [selectedSvcs,setSelectedSvcs]=useState([]);
  const [color,setColor]=useState(CAR_COLORS[0]);
  const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false);
  const [svcs,setSvcs]=useState(SVC_DEFAULT);
  const [tipoContrato,setTipoContrato]=useState("avulso");
  const [limitError,setLimitError]=useState("");
  const [limiteAtingido,setLimiteAtingido]=useState([]); // nomes de serviços bloqueados

  useEffect(()=>{
    sb.from('servicos_catalogo').select('*').eq('empresa_id',empresaId).eq('ativo',true)
      .then(({data})=>{if(data&&data.length>0)setSvcs(data.map(s=>({label:s.nome,value:s.valor})));});
  },[empresaId]);

  // Verificar limites ao mudar seleção de serviços
  const verificarLimites=async(svcsParaVerificar)=>{
    if(!svcsParaVerificar.length){setLimiteAtingido([]);return;}
    const hoje=new Date().toISOString().split("T")[0];
    const resultados=await Promise.all(
      svcsParaVerificar.map(sv=>
        sb.rpc("fn_verificar_limite_servico",{
          p_empresa_id:empresaId,
          p_servico_nome:sv.label,
          p_data:hoje,
        })
      )
    );
    const bloqueados=svcsParaVerificar
      .filter((_,i)=>resultados[i]?.data?.permitido===false)
      .map(sv=>sv.label);
    setLimiteAtingido(bloqueados);
  };

  // Valor total calculado automaticamente
  const totalValue=selectedSvcs.reduce((s,sv)=>s+sv.value,0);

  const toggleSvc=(sv)=>{
    const jaSelected=selectedSvcs.find(s=>s.label===sv.label);
    const bloqueado=limiteAtingido.includes(sv.label);
    // Regra: se bloqueado E não selecionado → ignora o clique
    if(bloqueado&&!jaSelected)return;
    // Permite desmarcar sempre, mesmo com limite atingido
    setSelectedSvcs(prev=>{
      const novo=jaSelected?prev.filter(s=>s.label!==sv.label):[...prev,sv];
      verificarLimites(novo);
      return novo;
    });
    setErrors(e=>({...e,svc:undefined}));
  };

  const getVal=k=>refs[k]?.current?.value||"";

  const validate=()=>{
    const e={};
    if(!getVal("plate").trim())e.plate="Obrigatório";
    if(!getVal("model").trim())e.model="Obrigatório";
    if(!getVal("client").trim())e.client="Obrigatório";
    if(!getVal("phone").trim())e.phone="Obrigatório";
    if(selectedSvcs.length===0)e.svc="Selecione pelo menos um serviço";
    setErrors(e);return Object.keys(e).length===0;
  };

  const submit=async()=>{
    if(!validate())return;
    setLoading(true);
    setLimitError("");
    // type armazena os nomes dos serviços concatenados para exibição no card
    const typeLabel=selectedSvcs.map(s=>s.label).join(" + ");
    const{error}=await sb.from('ordens_servico').insert({
      empresa_id:empresaId,
      plate:getVal("plate").trim().toUpperCase(),
      model:getVal("model").trim(),
      client:getVal("client").trim(),
      phone:getVal("phone").trim(),
      type:typeLabel,
      value:totalValue,
      color,
      observacoes:getVal("observacoes")||null,
      status:"Aguardando",
      criado_por:userId||null,
      tipo_contrato:tipoContrato,
    });
    setLoading(false);
    if(error){
      if(error.message?.includes("LIMITE_PLANO_EXCEDIDO")){
        setLimitError("Limite de ordens deste mês atingido pelo seu plano. Acesse Configurações para ver detalhes ou faça upgrade.");
      }else{
        setLimitError("Não foi possível adicionar o veículo. Verifique sua conexão e tente novamente.");
      }
      return;
    }
    Object.values(refs).forEach(r=>{if(r.current)r.current.value="";});
    setSelectedSvcs([]);
    setColor(CAR_COLORS[0]);
    setTipoContrato("avulso");
    setErrors({});
    onSuccess();
  };

  return(
    <div className="scroll screen-enter">
      {/* Placa */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Placa</label>
        <input ref={refs.plate} className="glass-input" type="text" defaultValue="" placeholder="ABC-1234"
          style={{borderColor:errors.plate?"rgba(239,68,68,.5)":undefined}}
          autoCapitalize="characters"/>
        {errors.plate&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.plate}</div>}
      </div>
      {/* Modelo */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Modelo / Marca</label>
        <input ref={refs.model} className="glass-input" type="text" defaultValue="" placeholder="Honda Civic"
          style={{borderColor:errors.model?"rgba(239,68,68,.5)":undefined}}/>
        {errors.model&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.model}</div>}
      </div>
      {/* Cliente */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Nome do Cliente</label>
        <input ref={refs.client} className="glass-input" type="text" defaultValue="" placeholder="João da Silva"
          style={{borderColor:errors.client?"rgba(239,68,68,.5)":undefined}}/>
        {errors.client&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.client}</div>}
      </div>
      {/* Telefone */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Telefone (com DDD)</label>
        <input ref={refs.phone} className="glass-input" type="tel" defaultValue="" placeholder="5549991234567"
          style={{borderColor:errors.phone?"rgba(239,68,68,.5)":undefined}}/>
        {errors.phone&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.phone}</div>}
      </div>
      {/* Serviços — multi-seleção com total automático */}
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <label className="lbl" style={{margin:0}}>Serviços</label>
          {selectedSvcs.length>0&&(
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:99,background:"rgba(74,222,128,.15)",border:"1px solid rgba(74,222,128,.3)"}}>
              <span style={{fontSize:11,color:"rgba(186,230,253,.6)",fontWeight:600}}>{selectedSvcs.length} selecionado{selectedSvcs.length>1?"s":""}</span>
              <span style={{fontSize:15,fontWeight:900,color:"#4ade80"}}>{fmtBRL(totalValue)}</span>
            </div>
          )}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {svcs.map(sv=>{
            const sel=selectedSvcs.some(s=>s.label===sv.label);
            const bloqueado=limiteAtingido.includes(sv.label);
            const jaSelected=selectedSvcs.some(s=>s.label===sv.label);
            // Bloqueado sem seleção = travado; bloqueado mas selecionado = pode desmarcar
            const podeClicar=!bloqueado||jaSelected;
            return(
              <button key={sv.label} onClick={()=>toggleSvc(sv)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:14,
                  border:`1.5px solid ${bloqueado&&!jaSelected?"rgba(239,68,68,.5)":bloqueado&&jaSelected?"rgba(239,68,68,.6)":jaSelected?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,
                  background:bloqueado&&!jaSelected?"rgba(239,68,68,.06)":bloqueado&&jaSelected?"rgba(239,68,68,.12)":jaSelected?"rgba(14,165,233,.15)":"rgba(255,255,255,.04)",
                  color:bloqueado?"#f87171":jaSelected?"#38bdf8":"rgba(186,230,253,.7)",
                  fontWeight:jaSelected?700:500,fontSize:13,
                  cursor:podeClicar?"pointer":"not-allowed",
                  opacity:bloqueado&&!jaSelected?.5:1,
                  transition:"all .15s"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:20,height:20,borderRadius:6,
                    border:`2px solid ${bloqueado?"#f87171":jaSelected?"#38bdf8":"rgba(125,211,252,.3)"}`,
                    background:jaSelected&&!bloqueado?"#38bdf8":"transparent",
                    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                    {jaSelected&&!bloqueado&&<Icon name="Check" size={12} color="#fff"/>}
                    {bloqueado&&!jaSelected&&<Icon name="Lock" size={10} color="#f87171"/>}
                    {bloqueado&&jaSelected&&<Icon name="X" size={10} color="#f87171"/>}
                  </div>
                  <div>
                    <span>{sv.label}</span>
                    {bloqueado&&!jaSelected&&<div style={{fontSize:10,color:"#f87171",marginTop:2}}>⚠️ Limite diário atingido</div>}
                    {bloqueado&&jaSelected&&<div style={{fontSize:10,color:"#f87171",marginTop:2}}>Clique para remover</div>}
                  </div>
                </div>
                <span style={{fontWeight:800,color:bloqueado?"#f87171":"#4ade80"}}>{fmtBRL(sv.value)}</span>
              </button>
            );
          })}
        </div>
        {errors.svc&&<div style={{fontSize:11,color:"#f87171",marginTop:6}}>{errors.svc}</div>}
      </div>
      {/* Cor */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Cor do Ícone</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {CAR_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:34,height:34,borderRadius:99,background:c,border:`3px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer",boxShadow:color===c?`0 0 12px ${c}88`:"none",transition:"all .15s"}}/>)}
        </div>
      </div>
      {/* Tipo de contrato */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Tipo de Cliente</label>
        <div style={{display:"flex",gap:8}}>
          {[["avulso","🚗 Avulso","rgba(56,189,248,.15)","#38bdf8"],["mensalista","📋 Mensalista","rgba(167,139,250,.15)","#a78bfa"]].map(([k,l,bg,cor])=>(
            <button key={k} onClick={()=>setTipoContrato(k)}
              style={{flex:1,padding:"12px 8px",borderRadius:14,cursor:"pointer",fontWeight:700,fontSize:13,
                border:`1.5px solid ${tipoContrato===k?cor:"rgba(125,211,252,.15)"}`,
                background:tipoContrato===k?bg:"rgba(255,255,255,.04)",
                color:tipoContrato===k?cor:"rgba(186,230,253,.4)",transition:"all .15s",
                display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              {l}
              <span style={{fontSize:10,fontWeight:500,
                color:tipoContrato===k?`${cor}cc`:"rgba(186,230,253,.25)"}}>
                {k==="avulso"?"Paga na hora":"Cobrado depois"}
              </span>
            </button>
          ))}
        </div>
        {tipoContrato==="mensalista"&&(
          <div style={{marginTop:8,padding:"6px 12px",borderRadius:10,
            background:"rgba(167,139,250,.08)",border:"1px solid rgba(167,139,250,.2)",
            fontSize:11,color:"rgba(167,139,250,.7)"}}>
            ℹ️ Será lançado como <b>Agendado</b> no histórico — sem solicitar forma de pagamento.
          </div>
        )}
      </div>
      {/* Observações */}
      <div style={{marginBottom:20}}>
        <label className="lbl">Observações (opcional)</label>
        <textarea ref={refs.observacoes} className="glass-input" defaultValue="" placeholder="Arranhado no para-choque, etc." rows={2} style={{resize:"none"}}/>
      </div>
      {limitError&&(
        <div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.35)",borderRadius:12,padding:"12px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
          <Icon name="AlertTriangle" size={15} color="#f87171" style={{marginTop:1,flexShrink:0}}/>
          <span style={{color:"#f87171",fontSize:13,fontWeight:600,lineHeight:1.4}}>{limitError}</span>
        </div>
      )}
      {/* Bloqueio real: apenas quando serviço bloqueado AINDA está selecionado */}
      {(()=>{
        const bloqueadosSelecionados=selectedSvcs.filter(s=>limiteAtingido.includes(s.label));
        const temBloqueio=bloqueadosSelecionados.length>0;
        return(
          <button className="btn-glow" onClick={submit}
            disabled={loading||selectedSvcs.length===0||temBloqueio}
            style={{opacity:selectedSvcs.length===0||temBloqueio?.5:1}}>
            {loading?<div className="spinner spin"/>:<>
              <Icon name="Plus" size={18} color="#fff"/>
              {temBloqueio?"Remova o serviço com limite atingido":selectedSvcs.length>0?`Adicionar à Fila — ${fmtBRL(totalValue)}`:"Adicionar à Fila"}
            </>}
          </button>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   HISTORY SCREEN — histórico de lavagens + lançamentos manuais de caixa
══════════════════════════════════════════════════════════════════════════ */
function HistoryScreen({empresaId,embedded,isOwner}){
  const [subTab,setSubTab]=useState("historico");
  const [hist,setHist]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [paymentFilter,setPaymentFilter]=useState("todos");
  const [filtrarHoje,setFiltrarHoje]=useState(false);
  const [dataFiltro,setDataFiltro]=useState(new Date().toISOString().split("T")[0]);
  const [editando,setEditando]=useState(null);     // id do registro em edição
  const [editForm,setEditForm]=useState({});        // {forma_pagamento, status_pagamento, lavado_por}
  const [salvandoEdit,setSalvandoEdit]=useState(false);
  const [funcionarios,setFuncionarios]=useState([]);

  // Caixa manual
  const [movs,setMovs]=useState([]);
  const [movLoading,setMovLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({tipo:"entrada",categoria:"lavagem",descricao:"",valor:""});
  const [saving,setSaving]=useState(false);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    sb.from('historico').select('*, criador:profiles!criado_por(name), lavador:profiles!lavado_por(name)')
      .eq('empresa_id',empresaId).order('completed_at',{ascending:false}).limit(100)
      .then(({data})=>{setHist(data||[]);setLoading(false);});
    // Buscar funcionários para o seletor de edição
    sb.from('profiles').select('id,name').eq('empresa_id',empresaId).eq('ativo',true)
      .then(({data})=>setFuncionarios(data||[]));
  },[empresaId]);

  const fetchMovs=useCallback(async()=>{
    const{data}=await sb.from('caixa_movimentos').select('id,tipo,categoria,descricao,valor,data').eq('empresa_id',empresaId)
      .gte('data',new Date(Date.now()-30*86400000).toISOString().split("T")[0])
      .order('created_at',{ascending:false});
    setMovs(data||[]);setMovLoading(false);
  },[empresaId]);

  useEffect(()=>{if(subTab==="caixa")fetchMovs();},[subTab,fetchMovs]);

  // Salvar edição — atualiza localmente sem refetch
  const salvarEdicao=async()=>{
    if(!editando)return;
    setSalvandoEdit(true);
    const{error}=await sb.from('historico').update({
      forma_pagamento:editForm.forma_pagamento||null,
      status_pagamento:editForm.status_pagamento||"pago",
      lavado_por:editForm.lavado_por||null,
    }).eq('id',editando);
    if(!error){
      setHist(prev=>prev.map(h=>h.id===editando?{...h,...editForm}:h));
      setEditando(null);
    }
    setSalvandoEdit(false);
  };

  const abrirEdicao=(h)=>{
    // h.lavado_por pode vir como UUID direto ou estar ausente quando
    // o join aninhado (lavador:profiles!lavado_por) é usado.
    // Garantimos o UUID lendo o campo direto do registro.
    const lavadoPorId=h.lavado_por||"";
    setEditForm({
      forma_pagamento:h.forma_pagamento||"",   // "" = Nenhum
      status_pagamento:h.status_pagamento||"pago",
      lavado_por:lavadoPorId,
    });
    setEditando(h.id);
  };

  // Filtros cumulativos: busca + pagamento + hoje
  const filtered=useMemo(()=>
    hist.filter(h=>{
      const matchSearch=
        h.client?.toLowerCase().includes(search.toLowerCase())||
        h.plate?.toLowerCase().includes(search.toLowerCase())||
        h.model?.toLowerCase().includes(search.toLowerCase());
      const matchPayment=paymentFilter==="todos"||h.forma_pagamento===paymentFilter;
      const matchHoje=!filtrarHoje||(h.completed_at&&h.completed_at.slice(0,10)===dataFiltro);
      return matchSearch&&matchPayment&&matchHoje;
    })
  ,[hist,search,paymentFilter,filtrarHoje,dataFiltro]);

  // Detecta recuperados pelo padrão de visita: gap de 30+ dias ANTES desta visita
  // Funciona mesmo sem cliente_recuperado no banco
  const recuperadosSet=useMemo(()=>{
    const set=new Set();
    // Agrupa registros por placa
    const byPlaca={};
    hist.forEach(r=>{
      const k=(r.plate||'').toUpperCase();
      if(!k)return;
      if(!byPlaca[k])byPlaca[k]=[];
      byPlaca[k].push(new Date(r.completed_at).getTime());
    });
    Object.entries(byPlaca).forEach(([placa,datas])=>{
      const sorted=datas.sort((a,b)=>a-b); // mais antigo → mais recente
      for(let i=1;i<sorted.length;i++){
        const gap=(sorted[i]-sorted[i-1])/(86400000);
        if(gap>=30)set.add(placa); // esta placa teve um retorno após 30+ dias de ausência
      }
    });
    return set;
  },[hist]);

  // Totalizador exclui estornados — não contam para receita
  const totalFiltrado=useMemo(()=>
    filtered.filter(h=>h.status_pagamento!=="estornado")
      .reduce((s,h)=>s+(parseFloat(h.value)||0),0)
  ,[filtered]);

  const total=hist.filter(h=>h.status_pagamento!=="estornado")
    .reduce((s,h)=>s+(parseFloat(h.value)||0),0);
  const tod=hist.filter(h=>daysSince(h.completed_at)===0&&h.status_pagamento!=="estornado")
    .reduce((s,h)=>s+(parseFloat(h.value)||0),0);

  const hoje=new Date().toISOString().split("T")[0];
  const entradasHoje=movs.filter(m=>m.tipo==="entrada"&&m.data===hoje).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saidasHoje=movs.filter(m=>m.tipo==="saida"&&m.data===hoje).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saldoHoje=entradasHoje-saidasHoje;

  const catEntrada=["lavagem","detalhamento","produto_venda","outro"];
  const catSaida=["produto_compra","despesa","salario","manutencao","outro"];

  const PAYMENT_FILTERS=[
    {id:"todos",   label:"Todos",    color:"#38bdf8"},
    {id:"pix",     label:"Pix",      color:"#4ade80"},
    {id:"dinheiro",label:"Dinheiro", color:"#fbbf24"},
    {id:"cartao",  label:"Cartão",   color:"#a78bfa"},
  ];

  const STATUS_PGTO={
    pago:     {label:"Pago",      color:"#4ade80", bg:"rgba(74,222,128,.15)",  border:"rgba(74,222,128,.3)"},
    pendente: {label:"Fiado",     color:"#fbbf24", bg:"rgba(251,191,36,.15)",  border:"rgba(251,191,36,.3)"},
    agendado: {label:"Agendado",  color:"#38bdf8", bg:"rgba(56,189,248,.15)",  border:"rgba(56,189,248,.3)"},
    estornado:{label:"Estornado", color:"#94a3b8", bg:"rgba(148,163,184,.1)",  border:"rgba(148,163,184,.25)"},
  };

  // Totais por método calculados a partir da base já filtrada por data e busca
  // Isso garante que ao ativar "Limpo hoje" os valores das pílulas mudem
  const totaisPorMetodo=useMemo(()=>{
    const base=hist.filter(h=>{
      const matchSearch=
        h.client?.toLowerCase().includes(search.toLowerCase())||
        h.plate?.toLowerCase().includes(search.toLowerCase())||
        h.model?.toLowerCase().includes(search.toLowerCase());
      const matchHoje=!filtrarHoje||(h.completed_at&&h.completed_at.slice(0,10)===dataFiltro);
      return matchSearch&&matchHoje&&h.status_pagamento!=="estornado";
    });
    return{
      todos:   base.reduce((s,h)=>s+(parseFloat(h.value)||0),0),
      pix:     base.filter(h=>h.forma_pagamento==="pix").reduce((s,h)=>s+(parseFloat(h.value)||0),0),
      dinheiro:base.filter(h=>h.forma_pagamento==="dinheiro").reduce((s,h)=>s+(parseFloat(h.value)||0),0),
      cartao:  base.filter(h=>h.forma_pagamento==="cartao").reduce((s,h)=>s+(parseFloat(h.value)||0),0),
    };
  },[hist,search,filtrarHoje,dataFiltro]);

  const saveMov=async()=>{
    if(!form.valor||!form.descricao)return;
    setSaving(true);
    await sb.from('caixa_movimentos').insert({empresa_id:empresaId,tipo:form.tipo,categoria:form.categoria,descricao:form.descricao,valor:parseFloat(form.valor),data:hoje});
    setForm({tipo:"entrada",categoria:"lavagem",descricao:"",valor:""});
    setShowForm(false);setSaving(false);fetchMovs();
  };

  return(
    <div className={embedded?"":"scroll screen-enter"}>
      {/* Sub-abas — Caixa Manual visível apenas para o owner */}
      <div style={{display:"flex",marginBottom:18,borderBottom:"1px solid rgba(125,211,252,.15)"}}>
        {[["historico","🚗 Lavagens"],...(isOwner?[["caixa","💰 Caixa Manual"]]:[])].map(([k,l])=>(
          <button key={k} onClick={()=>setSubTab(k)}
            className={subTab===k?"tab-active":"tab-inactive"}
            style={{flex:1,padding:"10px 0",fontSize:12,fontWeight:700,background:"transparent",border:"none",cursor:"pointer",transition:"all .2s"}}>
            {l}
          </button>
        ))}
      </div>

      {subTab==="historico"?(
        <>
          {/* Receita Total e Hoje são dados financeiros sensíveis do negócio
              — visíveis apenas para o dono, nunca para funcionários. */}
          {isOwner&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
              {[{label:"Receita Total",val:fmtBRL(total),color:"#4ade80",icon:"TrendingUp",pct:100},
                {label:"Hoje",         val:fmtBRL(tod),  color:"#38bdf8",icon:"Droplets",  pct:total?tod/total*100:0}].map(c=>(
                <div key={c.label} className="glass-card" style={{padding:16}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.5)"}}>{c.label}</span>
                    <Icon name={c.icon} size={14} color={c.color}/>
                  </div>
                  <div style={{fontSize:17,fontWeight:900,color:c.color,marginBottom:8}}>{c.val}</div>
                  <ProgressBar pct={c.pct} color={c.color}/>
                </div>
              ))}
            </div>
          )}
          <div style={{position:"relative",marginBottom:12}}>
            <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Icon name="Search" size={14} color="rgba(186,230,253,.4)"/></span>
            <input className="glass-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cliente, placa, modelo..." style={{paddingLeft:38}}/>
          </div>

          {/* Chips de filtro por forma de pagamento com totais */}
          <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            {PAYMENT_FILTERS.map(f=>{
              const ativo=paymentFilter===f.id;
              const total=totaisPorMetodo[f.id]||0;
              const showTotal=total>0;
              return(
                <button key={f.id} onClick={()=>setPaymentFilter(f.id)}
                  style={{padding:"5px 12px",borderRadius:99,fontSize:12,fontWeight:700,cursor:"pointer",
                    border:`1px solid ${ativo?`${f.color}99`:"rgba(125,211,252,.15)"}`,
                    background:ativo?`${f.color}22`:"rgba(255,255,255,.04)",
                    color:ativo?f.color:"rgba(186,230,253,.4)",
                    transition:"all .15s",display:"flex",alignItems:"center",gap:5}}>
                  {f.label}
                  {showTotal&&(
                    <span style={{fontSize:10,fontWeight:800,
                      color:ativo?f.color:"rgba(186,230,253,.3)"}}>
                      {fmtBRL(total)}
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          {/* Filtro de data avançado */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            <div style={{position:"relative",flex:1,minWidth:140}}>
              <input type="date" value={dataFiltro}
                onChange={e=>{setDataFiltro(e.target.value);setFiltrarHoje(true);}}
                style={{width:"100%",padding:"7px 12px 7px 32px",borderRadius:99,
                  background:filtrarHoje?"rgba(14,165,233,.18)":"rgba(255,255,255,.04)",
                  border:`1px solid ${filtrarHoje?"rgba(14,165,233,.5)":"rgba(125,211,252,.15)"}`,
                  color:filtrarHoje?"#38bdf8":"rgba(186,230,253,.5)",
                  fontSize:12,fontWeight:700,outline:"none",
                  colorScheme:"dark",cursor:"pointer"}}/>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,pointerEvents:"none"}}>📅</span>
            </div>
            {filtrarHoje&&(
              <button onClick={()=>setFiltrarHoje(false)}
                style={{padding:"7px 10px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",
                  background:"transparent",border:"1px solid rgba(248,113,113,.3)",color:"#f87171"}}>
                ✕
              </button>
            )}
          </div>

          {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>
          :filtered.length===0?<div style={{textAlign:"center",color:"rgba(186,230,253,.4)",padding:"40px 0"}}>
            {paymentFilter!=="todos"
              ?`Nenhuma lavagem com pagamento em ${PAYMENT_FILTERS.find(f=>f.id===paymentFilter)?.label}`
              :"Nenhum registro encontrado"}
          </div>
          :filtered.map((h,i)=>{
            const PGTO_STYLE={
              pix:    {color:"#4ade80",bg:"rgba(74,222,128,.15)",border:"rgba(74,222,128,.3)",label:"Pix"},
              cartao: {color:"#38bdf8",bg:"rgba(56,189,248,.15)",border:"rgba(56,189,248,.3)",label:"Cartão"},
              dinheiro:{color:"#fbbf24",bg:"rgba(251,191,36,.15)",border:"rgba(251,191,36,.3)",label:"Dinheiro"},
            };
            const pgto=h.forma_pagamento?PGTO_STYLE[h.forma_pagamento]:null;
            const stPgto=STATUS_PGTO[h.status_pagamento||"pago"]||STATUS_PGTO.pago;
            const isEstornado=h.status_pagamento==="estornado";
            const estaEditando=editando===h.id;
            // isRecuperado: flag do banco OU placa identificada com gap 30+ dias no histórico local
            const isRecuperado=!isEstornado&&(
              h.cliente_recuperado===true||
              recuperadosSet.has((h.plate||'').toUpperCase())
            );
            return(
            <div key={h.id} className="glass-card car-enter" style={{marginBottom:10,animationDelay:`${i*.04}s`,
              opacity:isEstornado?.6:1,
              background:isRecuperado?"linear-gradient(135deg,rgba(251,191,36,.1),rgba(202,138,4,.05),rgba(255,255,255,.04))":undefined,
              border:isRecuperado?"1.5px solid rgba(251,191,36,.3)":isEstornado?"1px solid rgba(148,163,184,.2)":undefined,
              boxShadow:isRecuperado?"0 4px 16px rgba(251,191,36,.1)":undefined}}>
              <div style={{padding:14}}>
                {/* Badge reconquistado */}
                {isRecuperado&&(
                  <div style={{display:"inline-flex",alignItems:"center",gap:5,marginBottom:8,
                    padding:"3px 9px",borderRadius:8,
                    background:"rgba(251,191,36,.15)",border:"1px solid rgba(251,191,36,.3)"}}>
                    <Icon name="Sparkles" size={11} color="#fbbf24"/>
                    <span style={{fontSize:10,fontWeight:800,color:"#fbbf24",
                      textTransform:"uppercase",letterSpacing:".08em"}}>Reconquistado</span>
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:"#e0f2fe",fontWeight:800,fontSize:14,
                      textDecoration:isEstornado?"line-through":"none",
                      color:isEstornado?"rgba(186,230,253,.4)":"#e0f2fe"}}>{h.client}</div>
                    <div style={{color:isEstornado?"rgba(186,230,253,.3)":"#e0f2fe",fontWeight:600,fontSize:13,
                      textDecoration:isEstornado?"line-through":"none"}}>
                      {h.model} · <span style={{fontFamily:"monospace",fontWeight:700,letterSpacing:".06em"}}>{h.plate}</span>
                    </div>
                    {h.phone&&!isEstornado&&(
                      <a href={`tel:${h.phone}`}
                        style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:4,
                          padding:"3px 10px",borderRadius:99,textDecoration:"none",
                          background:"rgba(56,189,248,.12)",border:"1px solid rgba(56,189,248,.25)"}}>
                        <Icon name="MessageCircle" size={11} color="#38bdf8"/>
                        <span style={{fontSize:12,fontWeight:700,color:"#38bdf8",fontFamily:"monospace",letterSpacing:".04em"}}>{h.phone}</span>
                      </a>
                    )}
                  </div>
                  <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    <div style={{fontWeight:800,fontSize:14,
                      color:isEstornado?"rgba(186,230,253,.3)":"#4ade80",
                      textDecoration:isEstornado?"line-through":"none"}}>{fmtBRL(h.value)}</div>
                    <div style={{color:"rgba(186,230,253,.4)",fontSize:11}}>{fmtDate(h.completed_at)}</div>
                    {/* Botão de edição — só para owner */}
                    {isOwner&&(
                      <button onClick={()=>estaEditando?setEditando(null):abrirEdicao(h)}
                        style={{padding:"3px 8px",borderRadius:8,cursor:"pointer",
                          background:estaEditando?"rgba(14,165,233,.2)":"rgba(255,255,255,.05)",
                          border:`1px solid ${estaEditando?"rgba(14,165,233,.4)":"rgba(125,211,252,.15)"}`,
                          display:"flex",alignItems:"center",gap:4}}>
                        <Icon name={estaEditando?"X":"Edit"} size={10} color={estaEditando?"#38bdf8":"rgba(186,230,253,.4)"}/>
                        <span style={{fontSize:10,fontWeight:700,color:estaEditando?"#38bdf8":"rgba(186,230,253,.4)"}}>
                          {estaEditando?"Fechar":"Editar"}
                        </span>
                      </button>
                    )}
                  </div>
                </div>

                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,color:"rgba(186,230,253,.45)"}}>
                    {h.type}
                    {h.criador?.name&&<span style={{color:"rgba(186,230,253,.3)"}}> · por {h.criador.name}</span>}
                    {h.lavador?.name&&<span style={{color:"rgba(167,139,250,.5)"}}> · lavou {h.lavador.name}</span>}
                  </span>
                  {/* Badge de status_pagamento — substitui o StatusBadge fixo */}
                  <span style={{fontSize:11,fontWeight:700,padding:"2px 9px",borderRadius:99,
                    background:stPgto.bg,border:`1px solid ${stPgto.border}`,color:stPgto.color,
                    whiteSpace:"nowrap"}}>
                    {stPgto.label}
                  </span>
                </div>

                {/* Modal de edição inline */}
                {estaEditando&&(
                  <div style={{marginBottom:12,padding:12,borderRadius:14,
                    background:"rgba(14,165,233,.06)",border:"1px solid rgba(14,165,233,.2)"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#38bdf8",marginBottom:10}}>
                      ✏️ Editar lançamento
                    </div>
                    {/* Forma de pagamento */}
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.5)",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Forma de Pagamento</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {[
                          {id:"pix",     label:"Pix",     cor:"#4ade80"},
                          {id:"cartao",  label:"Cartão",  cor:"#38bdf8"},
                          {id:"dinheiro",label:"Dinheiro",cor:"#fbbf24"},
                          {id:"",        label:"Nenhum",  cor:"#94a3b8"},
                        ].map(({id:k,label:l,cor:c})=>(
                          <button key={k} onClick={()=>setEditForm(f=>({...f,forma_pagamento:k}))}
                            style={{flex:1,padding:"7px 4px",borderRadius:10,cursor:"pointer",fontSize:11,fontWeight:700,
                              border:`1px solid ${editForm.forma_pagamento===k?c:"rgba(125,211,252,.12)"}`,
                              background:editForm.forma_pagamento===k?`${c}22`:"rgba(255,255,255,.04)",
                              color:editForm.forma_pagamento===k?c:"rgba(186,230,253,.35)"}}>
                            {l}
                          </button>
                        ))}
                      </div>
                    </div>
                    {/* Status de pagamento */}
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.5)",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Status</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {Object.entries(STATUS_PGTO).map(([k,v])=>(
                          <button key={k} onClick={()=>setEditForm(f=>({...f,status_pagamento:k}))}
                            style={{flex:1,minWidth:60,padding:"7px 4px",borderRadius:10,cursor:"pointer",fontSize:11,fontWeight:700,
                              border:`1px solid ${editForm.status_pagamento===k?v.color:"rgba(125,211,252,.12)"}`,
                              background:editForm.status_pagamento===k?v.bg:"rgba(255,255,255,.04)",
                              color:editForm.status_pagamento===k?v.color:"rgba(186,230,253,.35)"}}>
                            {v.label}
                          </button>
                        ))}
                      </div>
                    </div>
                    {/* Funcionário que lavou */}
                    {funcionarios.length>0&&(
                      <div style={{marginBottom:10}}>
                        <div style={{fontSize:10,color:"rgba(186,230,253,.5)",fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Quem lavou</div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                          {[{id:"",name:"Nenhum"},...funcionarios].map(f=>(
                            <button key={f.id} onClick={()=>setEditForm(ef=>({...ef,lavado_por:f.id}))}
                              style={{padding:"6px 10px",borderRadius:10,cursor:"pointer",fontSize:11,fontWeight:700,
                                border:`1px solid ${editForm.lavado_por===f.id?"rgba(167,139,250,.6)":"rgba(125,211,252,.12)"}`,
                                background:editForm.lavado_por===f.id?"rgba(167,139,250,.2)":"rgba(255,255,255,.04)",
                                color:editForm.lavado_por===f.id?"#a78bfa":"rgba(186,230,253,.35)"}}>
                              {f.name}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                    <button onClick={salvarEdicao} disabled={salvandoEdit}
                      className="btn-glow" style={{padding:"10px 0",fontSize:13,opacity:salvandoEdit?.6:1}}>
                      {salvandoEdit?<div className="spinner spin"/>:<><Icon name="Save" size={14} color="#fff"/> Salvar alterações</>}
                    </button>
                  </div>
                )}

                {/* Linha de horários + forma de pagamento */}
                {(h.entrada_at||h.completed_at||pgto)&&(
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:8,borderTop:"1px solid rgba(125,211,252,.08)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                      {h.entrada_at&&(
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <Icon name="Clock" size={11} color="rgba(186,230,253,.35)"/>
                          <span style={{fontSize:11,color:"rgba(186,230,253,.4)"}}>
                            Entrada <b style={{color:"rgba(186,230,253,.6)"}}>{fmtTime(h.entrada_at)}</b>
                          </span>
                        </div>
                      )}
                      {h.completed_at&&(
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <Icon name="CheckCircle" size={11} color="rgba(74,222,128,.5)"/>
                          <span style={{fontSize:11,color:"rgba(186,230,253,.4)"}}>
                            Saída <b style={{color:"#4ade80"}}>{fmtTime(h.completed_at)}</b>
                          </span>
                        </div>
                      )}
                      {(()=>{
                        const tp=fmtTempoPatio(h.entrada_at,h.completed_at);
                        if(!tp)return null;
                        return(
                          <div style={{display:"flex",alignItems:"center",gap:3,
                            padding:"1px 7px",borderRadius:99,
                            background:tp.alerta?"rgba(251,191,36,.12)":"rgba(255,255,255,.04)",
                            border:`1px solid ${tp.alerta?"rgba(251,191,36,.3)":"rgba(125,211,252,.1)"}`}}>
                            <span style={{fontSize:10}}>⏱️</span>
                            <span style={{fontSize:10,fontWeight:700,
                              color:tp.alerta?"#fbbf24":"rgba(186,230,253,.4)"}}>
                              {tp.texto}
                            </span>
                          </div>
                        );
                      })()}
                    </div>
                    {pgto&&(
                      <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:99,
                        background:pgto.bg,border:`1px solid ${pgto.border}`,color:pgto.color}}>
                        {pgto.label}
                      </span>
                    )}
                  </div>
                )}
              </div>
            </div>
            );
          })}
        </>
      ):(
        <>
          {/* Resumo do dia */}
          <div className="glass-card" style={{padding:16,marginBottom:16,background:"rgba(14,165,233,.08)",border:"1px solid rgba(56,189,248,.2)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Resumo de Hoje</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[{label:"Entradas",val:fmtBRL(entradasHoje),color:"#4ade80"},{label:"Saídas",val:fmtBRL(saidasHoje),color:"#f87171"},{label:"Saldo",val:fmtBRL(saldoHoje),color:saldoHoje>=0?"#38bdf8":"#f87171"}].map(k=>(
                <div key={k.label} style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:900,color:k.color}}>{k.val}</div>
                  <div style={{fontSize:10,color:"rgba(186,230,253,.4)",marginTop:2}}>{k.label}</div>
                </div>
              ))}
            </div>
          </div>

          <button className="btn-glow" onClick={()=>setShowForm(!showForm)} style={{marginBottom:16,background:showForm?"linear-gradient(135deg,#64748b,#475569)":undefined}}>
            <Icon name={showForm?"XCircle":"PlusCircle"} size={16} color="#fff"/>
            {showForm?"Cancelar":"Registrar Movimento"}
          </button>

          {showForm&&(
            <div className="glass-card" style={{padding:16,marginBottom:16,background:"rgba(255,255,255,.06)"}}>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                {["entrada","saida"].map(t=>(
                  <button key={t} onClick={()=>{setF("tipo",t);setF("categoria",t==="entrada"?catEntrada[0]:catSaida[0]);}}
                    style={{flex:1,padding:"9px 0",borderRadius:12,border:`1.5px solid ${form.tipo===t?(t==="entrada"?"rgba(74,222,128,.6)":"rgba(248,113,113,.6)"):"rgba(125,211,252,.15)"}`,background:form.tipo===t?(t==="entrada"?"rgba(74,222,128,.15)":"rgba(248,113,113,.15)"):"rgba(255,255,255,.04)",color:form.tipo===t?(t==="entrada"?"#4ade80":"#f87171"):"rgba(186,230,253,.5)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    {t==="entrada"?"⬆ Entrada":"⬇ Saída"}
                  </button>
                ))}
              </div>
              <div style={{marginBottom:10}}>
                <label className="lbl">Categoria</label>
                <select className="glass-input" value={form.categoria} onChange={e=>setF("categoria",e.target.value)} style={{WebkitAppearance:"none"}}>
                  {(form.tipo==="entrada"?catEntrada:catSaida).map(c=><option key={c} value={c} style={{background:"#0d2847"}}>{c.replace("_"," ")}</option>)}
                </select>
              </div>
              <div style={{marginBottom:10}}>
                <label className="lbl">Descrição</label>
                <input className="glass-input" value={form.descricao} onChange={e=>setF("descricao",e.target.value)} placeholder="Ex: Compra de shampoo automotivo"/>
              </div>
              <div style={{marginBottom:14}}>
                <label className="lbl">Valor (R$)</label>
                <input className="glass-input" type="number" value={form.valor} onChange={e=>setF("valor",e.target.value)} placeholder="0,00"/>
              </div>
              <button className="btn-glow" onClick={saveMov} disabled={saving} style={{background:form.tipo==="entrada"?"linear-gradient(135deg,#16a34a,#15803d)":"linear-gradient(135deg,#dc2626,#b91c1c)"}}>
                {saving?<div className="spinner spin"/>:<><Icon name="Check" size={16} color="#fff"/> Salvar Movimento</>}
              </button>
            </div>
          )}

          <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Últimos 30 dias</div>
          {movLoading?<div style={{display:"flex",justifyContent:"center",padding:20}}><div className="spinner spin"/></div>
          :movs.length===0?<div style={{textAlign:"center",color:"rgba(186,230,253,.4)",padding:20}}>Nenhum movimento registrado</div>
          :movs.map((m,i)=>(
            <div key={m.id} className="glass-card car-enter" style={{marginBottom:8,animationDelay:`${i*.03}s`}}>
              <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:34,height:34,borderRadius:10,background:m.tipo==="entrada"?"rgba(74,222,128,.15)":"rgba(248,113,113,.15)",border:`1px solid ${m.tipo==="entrada"?"rgba(74,222,128,.25)":"rgba(248,113,113,.25)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Icon name={m.tipo==="entrada"?"PlusCircle":"MinusCircle"} size={15} color={m.tipo==="entrada"?"#4ade80":"#f87171"}/>
                  </div>
                  <div>
                    <div style={{color:"#e0f2fe",fontWeight:600,fontSize:13}}>{m.descricao||m.categoria}</div>
                    <div style={{color:"rgba(186,230,253,.4)",fontSize:11}}>{m.categoria?.replace("_"," ")} · {fmtDate(m.data)}</div>
                  </div>
                </div>
                <div style={{fontWeight:800,fontSize:14,color:m.tipo==="entrada"?"#4ade80":"#f87171"}}>
                  {m.tipo==="entrada"?"+":"-"}{fmtBRL(m.valor)}
                </div>
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

   CRM SCREEN
══════════════════════════════════════════════════════════════════════════ */
function CRMScreen({empresaId,onBadgeUpdate}){
  const [min,setMin]=useState(30);
  const [hist,setHist]=useState([]);
  const [filaAtiva,setFilaAtiva]=useState([]);
  const [histHoje,setHistHoje]=useState([]);
  const [loading,setLoading]=useState(true);
  const [disparados,setDisparados]=useState(new Set());

  useEffect(()=>{
    const hoje=new Date().toISOString().split('T')[0];
    Promise.all([
      sb.from('historico').select('phone,client,model,plate,type,completed_at,cliente_recuperado')
        .eq('empresa_id',empresaId).order('completed_at',{ascending:false}),
      sb.from('ordens_servico').select('plate,phone')
        .eq('empresa_id',empresaId).neq('status','Concluído'),
      sb.from('historico').select('plate,phone,completed_at')
        .eq('empresa_id',empresaId).gte('completed_at',hoje+'T00:00:00'),
    ]).then(([{data:h},{data:fila},{data:hj}])=>{
      setHist(h||[]);
      setFilaAtiva(fila||[]);
      setHistHoje(hj||[]);
      setLoading(false);
    });
  },[empresaId]);

  // Último registro por telefone
  const map={};
  hist.forEach(r=>{if(!map[r.phone]||new Date(r.completed_at)>new Date(map[r.phone].completed_at))map[r.phone]=r;});

  // Filtro definitivo: 30+ dias ausente, não recuperado, e não ativo hoje
  const sumidos=Object.values(map)
    .map(r=>({...r,dias:daysSince(r.completed_at)}))
    .filter(r=>{
      if(r.dias<min)return false;
      if(r.cliente_recuperado===true)return false;
      if(clienteEstaAtivoHoje(r.phone,r.plate,filaAtiva,histHoje))return false;
      return true;
    })
    .sort((a,b)=>b.dias-a.dias);

  // Clientes que completaram exatamente 45 dias hoje (±1 dia) — gatilho de ação rápida
  const gatilho45=useMemo(()=>
    Object.values(map).map(r=>({...r,dias:daysSince(r.completed_at)}))
      .filter(r=>r.dias>=44&&r.dias<=46)
      .sort((a,b)=>b.dias-a.dias)
  ,[hist]);

  const waLink=(r)=>{
    const msg=encodeURIComponent(`Olá ${r.client}! 👋 Notamos que faz ${r.dias} dias desde a última vez que cuidamos do seu ${r.model} (placa ${r.plate}) aqui no nosso lava-jato. Queremos você de volta! 🎁 Preparamos *10% de desconto* na sua próxima lavagem, válido somente até esta semana. Responda essa mensagem ou venha nos visitar para garantir sua vaga — não queremos que essa oferta acabe sem você aproveitar! 🚗💦✨`);
    return`https://api.whatsapp.com/send?phone=${r.phone}&text=${msg}`;
  };

  const dispararTodos=()=>{
    gatilho45.forEach(r=>{
      window.open(waLink(r),"_blank");
      setDisparados(s=>new Set([...s,r.phone]));
    });
    if(onBadgeUpdate)onBadgeUpdate();
  };

  return(
    <div className="scroll screen-enter">

      {/* Painel de Ações Recomendadas — aparece só quando há clientes no gatilho de 45 dias */}
      {!loading&&gatilho45.length>0&&(
        <div style={{marginBottom:16,padding:16,borderRadius:20,
          background:"linear-gradient(135deg,rgba(239,68,68,.15),rgba(251,191,36,.08))",
          border:"1.5px solid rgba(239,68,68,.35)"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}}>
            <div style={{width:36,height:36,borderRadius:12,background:"rgba(239,68,68,.2)",
              border:"1px solid rgba(239,68,68,.4)",display:"flex",alignItems:"center",
              justifyContent:"center",flexShrink:0}}>
              <Icon name="AlertTriangle" size={18} color="#f87171"/>
            </div>
            <div>
              <div style={{color:"#f87171",fontWeight:800,fontSize:14,marginBottom:2}}>
                {gatilho45.length} cliente{gatilho45.length>1?"s":""} completou{gatilho45.length>1?"ram":""} 45 dias sumido{gatilho45.length>1?"s":""}
              </div>
              <div style={{color:"rgba(186,230,253,.5)",fontSize:12}}>
                Deseja disparar o lembrete agora?
              </div>
            </div>
          </div>
          {/* Lista dos clientes no gatilho */}
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
            {gatilho45.map(r=>(
              <div key={r.phone} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                padding:"8px 12px",borderRadius:12,background:"rgba(255,255,255,.05)"}}>
                <div>
                  <span style={{fontSize:13,fontWeight:700,color:"#e0f2fe"}}>{r.client}</span>
                  <span style={{fontSize:11,color:"rgba(186,230,253,.4)",marginLeft:8}}>{r.model} · {r.dias}d</span>
                </div>
                <a href={waLink(r)} target="_blank" rel="noreferrer"
                  onClick={()=>setDisparados(s=>new Set([...s,r.phone]))}
                  style={{padding:"4px 10px",borderRadius:99,background:"rgba(22,163,74,.2)",
                    border:"1px solid rgba(22,163,74,.4)",color:"#4ade80",
                    fontSize:11,fontWeight:700,textDecoration:"none",
                    opacity:disparados.has(r.phone)?.5:1}}>
                  {disparados.has(r.phone)?"Enviado ✓":"Enviar"}
                </a>
              </div>
            ))}
          </div>
          <button onClick={dispararTodos}
            style={{width:"100%",padding:"12px 0",borderRadius:14,cursor:"pointer",fontWeight:800,fontSize:14,
              background:"linear-gradient(135deg,#dc2626,#b91c1c)",border:"none",color:"#fff",
              display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              boxShadow:"0 6px 18px rgba(239,68,68,.3)"}}>
            <Icon name="Send" size={16} color="#fff"/>
            Disparar para todos ({gatilho45.length})
          </button>
        </div>
      )}
      <div className="glass-card" style={{padding:16,marginBottom:18,background:"rgba(124,58,237,.12)",border:"1px solid rgba(167,139,250,.25)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style={{width:42,height:42,borderRadius:14,background:"rgba(124,58,237,.2)",border:"1px solid rgba(167,139,250,.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Icon name="Award" size={20} color="#a78bfa"/>
          </div>
          <div>
            <div style={{color:"#e0f2fe",fontWeight:800,fontSize:15}}>Clientes Sumidos</div>
            <div style={{color:"rgba(186,230,253,.5)",fontSize:12}}>Recupere inativos via WhatsApp</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:36,fontWeight:900,color:"#a78bfa",lineHeight:1}}>{loading?"…":sumidos.length}</div>
          <div>
            <div style={{fontSize:11,color:"rgba(186,230,253,.4)",marginBottom:6,textAlign:"right"}}>Filtro: ≥ {min} dias</div>
            <div style={{display:"flex",gap:6}}>
              {[30,45,60].map(d=><button key={d} onClick={()=>setMin(d)} style={{padding:"5px 12px",borderRadius:99,fontSize:12,fontWeight:700,border:`1.5px solid ${min===d?"#a78bfa":"rgba(125,211,252,.2)"}`,background:min===d?"rgba(124,58,237,.4)":"rgba(255,255,255,.05)",color:min===d?"#e9d5ff":"rgba(186,230,253,.5)",cursor:"pointer",transition:"all .15s"}}>{d}d</button>)}
            </div>
          </div>
        </div>
        <ProgressBar pct={Math.min(sumidos.length*10,100)} color="#a78bfa"/>
      </div>

      {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>
      :sumidos.length===0?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"56px 0",textAlign:"center"}}>
          <div style={{width:64,height:64,borderRadius:20,background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.2)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <Icon name="CheckCircle" size={28} color="#4ade80"/>
          </div>
          <div style={{color:"#e0f2fe",fontWeight:700,fontSize:16}}>Nenhum cliente sumido!</div>
          <div style={{color:"rgba(186,230,253,.4)",fontSize:13,marginTop:6}}>Todos lavaram dentro de {min} dias</div>
        </div>
      ):(
        sumidos.map((r,i)=>{
          const hot=r.dias>=60;
          return(
            <div key={r.phone} className="glass-card car-enter" style={{marginBottom:12,animationDelay:`${i*.06}s`}}>
              <div style={{padding:14}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(125,211,252,.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Icon name="Car" size={16} color="rgba(186,230,253,.5)"/>
                    </div>
                    <div>
                      <div style={{color:"#e0f2fe",fontWeight:800,fontSize:14}}>{r.client}</div>
                      <div style={{color:"rgba(186,230,253,.45)",fontSize:12}}>{r.model}</div>
                    </div>
                  </div>
                  <div style={{padding:"6px 10px",borderRadius:12,background:hot?"rgba(239,68,68,.15)":"rgba(251,191,36,.12)",border:`1px solid ${hot?"rgba(239,68,68,.3)":"rgba(251,191,36,.25)"}`,textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:900,color:hot?"#f87171":"#fbbf24",lineHeight:1}}>{r.dias}d</div>
                    <div style={{fontSize:10,color:hot?"#f87171":"#fbbf24",opacity:.75}}>sem lavar</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,fontSize:12}}>
                  <span style={{fontFamily:"monospace",background:"rgba(255,255,255,.06)",border:"1px solid rgba(125,211,252,.15)",padding:"2px 8px",borderRadius:6,color:"#bae6fd"}}>{r.plate}</span>
                  <span style={{color:"rgba(186,230,253,.3)"}}>·</span>
                  <span style={{color:"rgba(186,230,253,.5)"}}>{r.phone}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(186,230,253,.4)",marginBottom:12}}>
                  <span>Última: {fmtDate(r.completed_at)}</span><span>{r.type}</span>
                </div>
                <a href={waLink(r)} target="_blank" rel="noreferrer" style={{width:"100%",padding:"12px 0",borderRadius:14,background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontWeight:700,fontSize:14,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,textDecoration:"none",boxShadow:"0 6px 18px rgba(22,163,74,.3)"}}>
                  <Icon name="MessageCircle" size={16} color="#fff"/> Enviar via WhatsApp
                </a>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   ADMIN SCREEN — gerenciar equipe
══════════════════════════════════════════════════════════════════════════ */
function AdminScreen({empresaId,currentUser,embedded}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({name:"",email:"",password:"",role:"employee"});
  const [errors,setErrors]=useState({});
  const [saving,setSaving]=useState(false);
  const [success,setSuccess]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const fetchUsers=useCallback(async()=>{
    const{data}=await sb.from('profiles').select('*').eq('empresa_id',empresaId).order('created_at');
    setUsers(data||[]);setLoading(false);
  },[empresaId]);

  useEffect(()=>{fetchUsers();},[fetchUsers]);

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name="Obrigatório";
    if(!form.email.trim()||!form.email.includes("@"))e.email="E-mail inválido";
    if(form.password.length<6)e.password="Mínimo 6 caracteres";
    setErrors(e);return Object.keys(e).length===0;
  };

  const addUser=async()=>{
    if(!validate())return;
    setSaving(true);
    try{
      // Chama Edge Function (roda no servidor com Service Role Key).
      // Isso evita o bug de "sequestro de sessão": sb.auth.signUp() direto
      // do client troca a sessão ativa do navegador para o usuário recém-criado.
      // A Edge Function usa supabase.auth.admin.createUser(), que não afeta
      // a sessão de quem está chamando, e também valida o limite de
      // funcionários do plano ANTES de criar o usuário.
      //
      // IMPORTANTE: getSession() sozinho pode devolver um token JÁ EXPIRADO
      // se o app ficou em segundo plano por um tempo (o navegador suspende
      // o timer de renovação automática nesse caso) — o SDK só percebe e
      // renova na próxima chamada de rede que fizer. Por isso, chamamos
      // refreshSession() explicitamente antes, forçando um token válido na
      // hora, em vez de confiar que a renovação em segundo plano já rodou.
      let{data:sessionData}=await sb.auth.getSession();
      const expiresAt=sessionData?.session?.expires_at;
      const jaExpirado=expiresAt&&(expiresAt*1000)<Date.now();
      if(!sessionData?.session||jaExpirado){
        const{data:refreshed}=await sb.auth.refreshSession();
        if(refreshed?.session)sessionData=refreshed;
      }
      // NOTA: no painel do Supabase, o campo "Name" da função é apenas um
      // rótulo de exibição — a rota real (slug da URL) é fixada no momento
      // da criação e não muda mesmo renomeando o "Name" depois. A função
      // foi criada com o slug "bright-processor", então chamamos essa rota
      // aqui, mesmo o nome exibido no painel sendo "create-employee".
      const res=await fetch(`${SUPABASE_URL}/functions/v1/bright-processor`,{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":`Bearer ${sessionData?.session?.access_token||""}`,
        },
        body:JSON.stringify({
          email:form.email.trim().toLowerCase(),
          password:form.password,
          name:form.name.trim(),
          role:form.role,
          empresa_id:empresaId,
        }),
      });
      const result=await res.json();
      if(!result.success){
        // Mensagem mais clara especificamente para o caso de sessão
        // expirada — orienta a ação certa (relogar) em vez de deixar o
        // usuário sem saber o que fazer com um "Não autenticado." seco.
        const msg=result.message==="Não autenticado."
          ?"Sua sessão expirou. Saia e entre novamente no app, depois tente cadastrar o funcionário de novo."
          :(result.message||"Erro ao criar usuário.");
        setErrors({email:msg});
        setSaving(false);
        return;
      }
      setSuccess(`Usuário "${form.name}" criado com sucesso!`);
      setTimeout(()=>setSuccess(""),5000);
      setForm({name:"",email:"",password:"",role:"employee"});
      fetchUsers();
    }catch(e){
      setErrors({email:"Falha de conexão. Verifique sua internet e tente novamente."});
    }
    setSaving(false);
  };

  const removeUser=async(uid)=>{
    if(uid===currentUser.id)return;
    await sb.from('profiles').update({ativo:false}).eq('id',uid);
    fetchUsers();
  };

  return(
    <div className={embedded?"":"scroll screen-enter"}>
      <div className="glass-card" style={{padding:16,marginBottom:18,background:"rgba(14,165,233,.08)",border:"1px solid rgba(56,189,248,.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(14,165,233,.3)"}}>
            <Icon name="UserPlus" size={17} color="#fff"/>
          </div>
          <div>
            <div style={{color:"#e0f2fe",fontWeight:800,fontSize:15}}>Adicionar Funcionário</div>
            <div style={{color:"rgba(186,230,253,.5)",fontSize:12}}>Crie um novo acesso ao sistema</div>
          </div>
        </div>
        {[["name","Nome completo","Maria Silva","text"],["email","E-mail","maria@email.com","email"],["password","Senha","••••••••","password"]].map(([field,label,ph,type])=>(
          <div key={field} style={{marginBottom:12}}>
            <label className="lbl">{label}</label>
            <input className="glass-input" type={type} value={form[field]} onChange={e=>set(field,e.target.value)} placeholder={ph} autoCapitalize="none" style={{borderColor:errors[field]?"rgba(239,68,68,.5)":undefined}}/>
            {errors[field]&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors[field]}</div>}
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <label className="lbl">Nível de acesso</label>
          <div style={{display:"flex",gap:8}}>
            {[["employee","👷 Funcionário"],["owner","👑 Dono"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>set("role",val)} style={{flex:1,padding:"10px 0",borderRadius:12,border:`1.5px solid ${form.role===val?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,background:form.role===val?"rgba(14,165,233,.2)":"rgba(255,255,255,.04)",color:form.role===val?"#38bdf8":"rgba(186,230,253,.5)",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                {lbl}
              </button>
            ))}
          </div>
        </div>
        {success&&<div style={{background:"rgba(34,197,94,.15)",border:"1px solid rgba(34,197,94,.3)",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}><Icon name="CheckCircle" size={15} color="#4ade80"/><span style={{color:"#4ade80",fontSize:13,fontWeight:600}}>{success}</span></div>}
        <button className="btn-glow" onClick={addUser} disabled={saving}>
          {saving?<div className="spinner spin"/>:<><Icon name="UserPlus" size={16} color="#fff"/> Criar Usuário</>}
        </button>
      </div>
      <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Equipe ({users.length})</div>
      {loading?<div style={{display:"flex",justifyContent:"center",padding:20}}><div className="spinner spin"/></div>
      :users.map(u=>(
        <div key={u.id} className="glass-card" style={{marginBottom:10}}>
          <div style={{padding:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,borderRadius:14,background:u.role==="owner"?"rgba(251,191,36,.15)":"rgba(14,165,233,.12)",border:`1px solid ${u.role==="owner"?"rgba(251,191,36,.3)":"rgba(14,165,233,.25)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Icon name={u.role==="owner"?"Shield":"User"} size={18} color={u.role==="owner"?"#fbbf24":"#38bdf8"}/>
              </div>
              <div>
                <div style={{color:u.ativo?"#e0f2fe":"rgba(186,230,253,.3)",fontWeight:800,fontSize:14}}>{u.name}</div>
                <div style={{color:"rgba(186,230,253,.4)",fontSize:12}}>{u.role==="owner"?"Dono":"Funcionário"}{!u.ativo?" · Inativo":""}</div>
              </div>
            </div>
            {u.id!==currentUser.id
              ?<button onClick={()=>removeUser(u.id)} style={{padding:"9px 11px",borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",color:"#f87171",cursor:"pointer",display:"flex",alignItems:"center"}}><Icon name="Trash2" size={14} color="#f87171"/></button>
              :<span style={{fontSize:11,color:"#38bdf8",fontWeight:700,background:"rgba(14,165,233,.15)",padding:"4px 10px",borderRadius:99,border:"1px solid rgba(56,189,248,.25)"}}>Você</span>
            }
          </div>
        </div>
      ))}
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════════════════
   MINI BAR CHART (sem lib externa)
══════════════════════════════════════════════════════════════════════════ */
function BarChartBar({d,max,color,height,delay}){
  const pct=d.v/max;
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct),delay);return()=>clearTimeout(t);},[pct,delay]);
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div style={{fontSize:9,color:"rgba(186,230,253,.5)",fontWeight:600}}>{d.v>0?fmtBRL(d.v).replace("R$","").trim():""}</div>
      <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:`${color}22`,position:"relative",height:height-20,display:"flex",alignItems:"flex-end"}}>
        <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:`linear-gradient(180deg,${color},${color}99)`,height:`${w*100}%`,transition:"height .6s cubic-bezier(.25,.46,.45,.94)"}}/>
      </div>
      <div style={{fontSize:9,color:"rgba(186,230,253,.4)",textAlign:"center",lineHeight:1.2}}>{d.l}</div>
    </div>
  );
}

function BarChart({data,color="#0ea5e9",height=80}){
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height,paddingTop:8}}>
      {data.map((d,i)=>(
        <BarChartBar key={`${d.l}-${i}`} d={d} max={max} color={color} height={height} delay={i*60+100}/>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   FOLHA SCREEN — pagamentos semanais de funcionários
   Separado do caixa_movimentos para não misturar receitas de lavagem
