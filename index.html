            <div><span style={{color:"rgba(186,230,253,.4)",display:"block",marginBottom:2}}>Entrada</span><span style={{color:"#bae6fd",fontWeight:600}}>{fmtDate(item.created_at)}</span></div>
            {item.criador?.name&&<div><span style={{color:"rgba(186,230,253,.4)",display:"block",marginBottom:2}}>Criado por</span><span style={{color:"#bae6fd",fontWeight:600}}>{item.criador.name}</span></div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {next&&<button onClick={handleAdvance} disabled={loading} style={{flex:1,padding:"10px 0",borderRadius:12,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",color:"#fff",fontWeight:700,fontSize:12,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,boxShadow:"0 4px 12px rgba(14,165,233,.3)",opacity:loading?.6:1}}>
              {loading?<div className="spinner spin" style={{width:14,height:14}}/>:<><Icon name="Zap" size={13} color="#fff"/> Avançar: {next}</>}
            </button>}
            <button onClick={()=>onDelete(item.id)} style={{padding:"10px 12px",borderRadius:12,background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",cursor:"pointer",display:"flex",alignItems:"center"}}>
              <Icon name="Trash2" size={14} color="#f87171"/>
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════════════════════════════════════ */
function HomeScreen({empresaId}){
  const [queue,setQueue]=useState([]);
  const [loading,setLoading]=useState(true);
  const [errorMsg,setErrorMsg]=useState("");

  const fetchQueue=useCallback(async()=>{
    // Join com profiles para mostrar quem criou cada lavagem — útil para
    // controle de processo entre múltiplos funcionários da mesma empresa.
    const{data,error}=await sb.from('ordens_servico').select('*, criador:profiles!criado_por(name)').eq('empresa_id',empresaId).order('created_at',{ascending:true});
    if(error){setErrorMsg("Não foi possível carregar a fila. Verifique sua conexão.");}
    setQueue(data||[]);setLoading(false);
  },[empresaId]);

  useEffect(()=>{
    fetchQueue();
    // Realtime subscription — usa o payload do evento para atualizar o
    // estado local de forma incremental (merge), em vez de refazer um
    // SELECT * completo a cada mudança. Antes, qualquer INSERT/UPDATE/DELETE
    // em qualquer linha disparava um refetch de toda a tabela para todos os
    // clientes conectados, multiplicando chamadas à API do Supabase sem
    // necessidade — relevante para não estourar a cota do plano gratuito.
    // Apenas em caso de evento inesperado (sem payload reconhecível) cai
    // no fallback de refetch completo, como rede de segurança.
    const ch=sb.channel(`queue_${empresaId}`)
      .on('postgres_changes',{event:'*',schema:'public',table:'ordens_servico',filter:`empresa_id=eq.${empresaId}`},(payload)=>{
        if(payload.eventType==='INSERT'&&payload.new){
          // Eventos Realtime trazem só a linha pura, sem o join com
          // profiles — então um INSERT vindo de outro celular não tem
          // .criador.name ainda. Um refetch leve corrige isso sem
          // impactar a percepção de "tempo real" (a linha já aparece
          // na hora, só sem o nome do criador por um instante).
          setQueue(prev=>prev.some(v=>v.id===payload.new.id)?prev:[...prev,payload.new]);
          fetchQueue();
        }else if(payload.eventType==='UPDATE'&&payload.new){
          // Preserva o campo .criador já carregado anteriormente, já que
          // o payload do Realtime não inclui dados de tabelas relacionadas.
          setQueue(prev=>prev.map(v=>v.id===payload.new.id?{...payload.new,criador:v.criador}:v));
        }else if(payload.eventType==='DELETE'&&payload.old){
          setQueue(prev=>prev.filter(v=>v.id!==payload.old.id));
        }else{
          fetchQueue(); // fallback de segurança, raramente acionado
        }
      })
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[fetchQueue,empresaId]);

  const advance=async(id,nextStatus,currentStatus)=>{
    setErrorMsg("");
    // Lock otimista: o UPDATE só é aplicado se o status no banco ainda for
    // o mesmo que o app tinha quando o usuário clicou. Isso evita que dois
    // funcionários avançando o mesmo carro simultaneamente causem updates
    // duplicados ou pulem um estágio sem perceber — se outro funcionário já
    // mudou o status entre o clique e o envio, esta query não afeta nenhuma
    // linha (count=0), e avisamos o usuário para recarregar.
    const{error,count}=await sb.from('ordens_servico')
      .update({status:nextStatus,updated_at:new Date().toISOString()},{count:'exact'})
      .eq('id',id)
      .eq('status',currentStatus);
    if(error){
      setErrorMsg("Falha ao atualizar status. Verifique sua conexão e tente novamente.");
      setTimeout(()=>setErrorMsg(""),5000);
      return;
    }
    if(count===0){
      setErrorMsg("Este veículo já foi atualizado por outro usuário. A fila foi recarregada.");
      setTimeout(()=>setErrorMsg(""),5000);
    }
    // trigger fn_ordem_paga no banco cuida de mover para histórico se Pago
    fetchQueue();
  };

  const del=async(id)=>{
    setErrorMsg("");
    const{error}=await sb.from('ordens_servico').delete().eq('id',id);
    if(error){
      setErrorMsg("Não foi possível remover o veículo. Tente novamente.");
      setTimeout(()=>setErrorMsg(""),5000);
      return;
    }
    setQueue(q=>q.filter(v=>v.id!==id));
  };

  const pills=[
    {label:"Aguardando",count:queue.filter(v=>v.status==="Aguardando").length,color:"#fbbf24",pct:queue.length?queue.filter(v=>v.status==="Aguardando").length/queue.length*100:0},
    {label:"Lavando",   count:queue.filter(v=>v.status==="Lavando").length,   color:"#38bdf8",pct:queue.length?queue.filter(v=>v.status==="Lavando").length/queue.length*100:0},
    {label:"Concluído", count:queue.filter(v=>v.status==="Concluído").length, color:"#4ade80",pct:queue.length?queue.filter(v=>v.status==="Concluído").length/queue.length*100:0},
  ];

  return(
    <div className="scroll screen-enter">
      {errorMsg&&(
        <div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.35)",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
          <Icon name="AlertTriangle" size={14} color="#f87171" style={{marginTop:1,flexShrink:0}}/>
          <span style={{color:"#f87171",fontSize:12,fontWeight:600,lineHeight:1.4,flex:1}}>{errorMsg}</span>
          <button onClick={()=>setErrorMsg("")} style={{background:"transparent",border:"none",cursor:"pointer",padding:0,flexShrink:0}}>
            <Icon name="XCircle" size={14} color="#f87171"/>
          </button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
        {pills.map(p=>(
          <div key={p.label} className="glass-card" style={{padding:"12px 8px",textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:p.color,lineHeight:1}}>{p.count}</div>
            <div style={{fontSize:10,fontWeight:600,color:"rgba(186,230,253,.5)",marginTop:4,marginBottom:6}}>{p.label}</div>
            <ProgressBar pct={p.pct} color={p.color}/>
          </div>
        ))}
      </div>
      {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>
      :queue.length===0?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 0",textAlign:"center"}}>
          <div style={{width:68,height:68,borderRadius:22,background:"rgba(14,165,233,.1)",border:"1px solid rgba(14,165,233,.2)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <Icon name="Droplets" size={30} color="rgba(56,189,248,.5)"/>
          </div>
          <div style={{color:"rgba(186,230,253,.7)",fontWeight:700,fontSize:16}}>Fila vazia</div>
          <div style={{color:"rgba(186,230,253,.4)",fontSize:13,marginTop:6}}>Adicione um veículo na aba Nova Lavagem</div>
        </div>
      ):(queue.map((v,i)=><CarCard key={v.id} item={v} onAdvance={advance} onDelete={del} idx={i}/>))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   NEW WASH SCREEN
══════════════════════════════════════════════════════════════════════════ */
function NewWashScreen({empresaId,userId,onSuccess}){
  // Usar refs para inputs — evita perda de foco a cada keystroke no mobile
  const refs={
    plate:useRef(null),model:useRef(null),
    client:useRef(null),phone:useRef(null),
    observacoes:useRef(null),value:useRef(null),
  };
  const [svcType,setSvcType]=useState(SVC_DEFAULT[0].label);
  const [svcValue,setSvcValue]=useState(SVC_DEFAULT[0].value);
  const [color,setColor]=useState(CAR_COLORS[0]);
  const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false);
  const [svcs,setSvcs]=useState(SVC_DEFAULT);

  useEffect(()=>{
    sb.from('servicos_catalogo').select('*').eq('empresa_id',empresaId).eq('ativo',true)
      .then(({data})=>{if(data&&data.length>0)setSvcs(data.map(s=>({label:s.nome,value:s.valor})));});
  },[empresaId]);

  const getVal=k=>refs[k]?.current?.value||"";

  const validate=()=>{
    const e={};
    if(!getVal("plate").trim())e.plate="Obrigatório";
    if(!getVal("model").trim())e.model="Obrigatório";
    if(!getVal("client").trim())e.client="Obrigatório";
    if(!getVal("phone").trim())e.phone="Obrigatório";
    setErrors(e);return Object.keys(e).length===0;
  };

  const [limitError,setLimitError]=useState("");

  const submit=async()=>{
    if(!validate())return;
    setLoading(true);
    setLimitError("");
    const v=parseFloat(refs.value?.current?.value)||svcValue;
    const{error}=await sb.from('ordens_servico').insert({
      empresa_id:empresaId,
      plate:getVal("plate").trim().toUpperCase(),
      model:getVal("model").trim(),
      client:getVal("client").trim(),
      phone:getVal("phone").trim(),
      type:svcType,value:v,color,
      observacoes:getVal("observacoes")||null,
      status:"Aguardando",
      criado_por:userId||null
    });
    setLoading(false);
    if(error){
      // O trigger fn_verificar_limite_ordens no banco bloqueia o INSERT
      // e retorna uma mensagem prefixada com LIMITE_PLANO_EXCEDIDO quando
      // a empresa atingiu o limite mensal de ordens do plano atual.
      if(error.message?.includes("LIMITE_PLANO_EXCEDIDO")){
        setLimitError("Limite de ordens deste mês atingido pelo seu plano. Acesse Configurações para ver detalhes ou faça upgrade.");
      }else{
        setLimitError("Não foi possível adicionar o veículo. Verifique sua conexão e tente novamente.");
      }
      return;
    }
    // Limpar inputs manualmente
    Object.values(refs).forEach(r=>{if(r.current)r.current.value="";});
    if(refs.value.current)refs.value.current.value=SVC_DEFAULT[0].value;
    setSvcType(svcs[0]?.label||SVC_DEFAULT[0].label);
    setSvcValue(svcs[0]?.value||SVC_DEFAULT[0].value);
    setColor(CAR_COLORS[0]);
    setErrors({});
    onSuccess();
  };

  const pickSvc=(label,value)=>{
    setSvcType(label);setSvcValue(value);
    if(refs.value.current)refs.value.current.value=value;
  };

  return(
    <div className="scroll screen-enter">
      {/* Placa */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Placa</label>
        <input ref={refs.plate} className="glass-input" type="text" defaultValue="" placeholder="ABC-1234"
          style={{borderColor:errors.plate?"rgba(239,68,68,.5)":undefined}}
          autoCapitalize="characters"/>
        {errors.plate&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.plate}</div>}
      </div>
      {/* Modelo */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Modelo / Marca</label>
        <input ref={refs.model} className="glass-input" type="text" defaultValue="" placeholder="Honda Civic"
          style={{borderColor:errors.model?"rgba(239,68,68,.5)":undefined}}/>
        {errors.model&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.model}</div>}
      </div>
      {/* Cliente */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Nome do Cliente</label>
        <input ref={refs.client} className="glass-input" type="text" defaultValue="" placeholder="João da Silva"
          style={{borderColor:errors.client?"rgba(239,68,68,.5)":undefined}}/>
        {errors.client&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.client}</div>}
      </div>
      {/* Telefone */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Telefone (com DDD)</label>
        <input ref={refs.phone} className="glass-input" type="tel" defaultValue="" placeholder="5549991234567"
          style={{borderColor:errors.phone?"rgba(239,68,68,.5)":undefined}}/>
        {errors.phone&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors.phone}</div>}
      </div>
      {/* Serviço */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Tipo de Serviço</label>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {svcs.map(sv=>(
            <button key={sv.label} onClick={()=>pickSvc(sv.label,sv.value)}
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:14,
                border:`1.5px solid ${svcType===sv.label?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,
                background:svcType===sv.label?"rgba(14,165,233,.15)":"rgba(255,255,255,.04)",
                color:svcType===sv.label?"#38bdf8":"rgba(186,230,253,.7)",
                fontWeight:svcType===sv.label?700:500,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
              <span>{sv.label}</span><span style={{fontWeight:800,color:"#4ade80"}}>{fmtBRL(sv.value)}</span>
            </button>
          ))}
        </div>
      </div>
      {/* Cor */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Cor do Ícone</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {CAR_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} style={{width:34,height:34,borderRadius:99,background:c,border:`3px solid ${color===c?"#fff":"transparent"}`,cursor:"pointer",boxShadow:color===c?`0 0 12px ${c}88`:"none",transition:"all .15s"}}/>)}
        </div>
      </div>
      {/* Valor */}
      <div style={{marginBottom:14}}>
        <label className="lbl">Valor (R$)</label>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:"rgba(186,230,253,.4)",fontSize:13,fontWeight:600}}>R$</span>
          <input ref={refs.value} className="glass-input" type="number" defaultValue={svcValue} style={{paddingLeft:40}}/>
        </div>
      </div>
      {/* Observações */}
      <div style={{marginBottom:20}}>
        <label className="lbl">Observações (opcional)</label>
        <textarea ref={refs.observacoes} className="glass-input" defaultValue="" placeholder="Arranhado no para-choque, etc." rows={2} style={{resize:"none"}}/>
      </div>
      {limitError&&(
        <div style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.35)",borderRadius:12,padding:"12px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
          <Icon name="AlertTriangle" size={15} color="#f87171" style={{marginTop:1,flexShrink:0}}/>
          <span style={{color:"#f87171",fontSize:13,fontWeight:600,lineHeight:1.4}}>{limitError}</span>
        </div>
      )}
      <button className="btn-glow" onClick={submit} disabled={loading}>
        {loading?<div className="spinner spin"/>:<><Icon name="Plus" size={18} color="#fff"/> Adicionar à Fila</>}
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   HISTORY SCREEN — histórico de lavagens + lançamentos manuais de caixa
══════════════════════════════════════════════════════════════════════════ */
function HistoryScreen({empresaId,embedded,isOwner}){
  const [subTab,setSubTab]=useState("historico");
  const [hist,setHist]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");

  // Caixa manual
  const [movs,setMovs]=useState([]);
  const [movLoading,setMovLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({tipo:"entrada",categoria:"lavagem",descricao:"",valor:""});
  const [saving,setSaving]=useState(false);
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(()=>{
    sb.from('historico').select('*, criador:profiles!criado_por(name)').eq('empresa_id',empresaId).order('completed_at',{ascending:false}).limit(100)
      .then(({data})=>{setHist(data||[]);setLoading(false);});
  },[empresaId]);

  const fetchMovs=useCallback(async()=>{
    // select() limitado às colunas realmente usadas na tela — reduz bytes
    // transferidos, relevante em conexões 3G/4G de campo.
    const{data}=await sb.from('caixa_movimentos').select('id,tipo,categoria,descricao,valor,data').eq('empresa_id',empresaId)
      .gte('data',new Date(Date.now()-30*86400000).toISOString().split("T")[0])
      .order('created_at',{ascending:false});
    setMovs(data||[]);setMovLoading(false);
  },[empresaId]);

  useEffect(()=>{if(subTab==="caixa")fetchMovs();},[subTab,fetchMovs]);

  const filtered=hist.filter(h=>h.client?.toLowerCase().includes(search.toLowerCase())||h.plate?.toLowerCase().includes(search.toLowerCase())||h.model?.toLowerCase().includes(search.toLowerCase()));
  const total=hist.reduce((s,h)=>s+(parseFloat(h.value)||0),0);
  const tod=hist.filter(h=>daysSince(h.completed_at)===0).reduce((s,h)=>s+(parseFloat(h.value)||0),0);

  const hoje=new Date().toISOString().split("T")[0];
  const entradasHoje=movs.filter(m=>m.tipo==="entrada"&&m.data===hoje).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saidasHoje=movs.filter(m=>m.tipo==="saida"&&m.data===hoje).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saldoHoje=entradasHoje-saidasHoje;

  const catEntrada=["lavagem","detalhamento","produto_venda","outro"];
  const catSaida=["produto_compra","despesa","salario","manutencao","outro"];

  const saveMov=async()=>{
    if(!form.valor||!form.descricao)return;
    setSaving(true);
    await sb.from('caixa_movimentos').insert({empresa_id:empresaId,tipo:form.tipo,categoria:form.categoria,descricao:form.descricao,valor:parseFloat(form.valor),data:hoje});
    setForm({tipo:"entrada",categoria:"lavagem",descricao:"",valor:""});
    setShowForm(false);setSaving(false);fetchMovs();
  };

  return(
    <div className={embedded?"":"scroll screen-enter"}>
      {/* Sub-abas */}
      <div style={{display:"flex",marginBottom:18,borderBottom:"1px solid rgba(125,211,252,.15)"}}>
        {[["historico","🚗 Lavagens"],["caixa","💰 Caixa Manual"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSubTab(k)}
            className={subTab===k?"tab-active":"tab-inactive"}
            style={{flex:1,padding:"10px 0",fontSize:12,fontWeight:700,background:"transparent",border:"none",cursor:"pointer",transition:"all .2s"}}>
            {l}
          </button>
        ))}
      </div>

      {subTab==="historico"?(
        <>
          {/* Receita Total e Hoje são dados financeiros sensíveis do negócio
              — visíveis apenas para o dono, nunca para funcionários. */}
          {isOwner&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
              {[{label:"Receita Total",val:fmtBRL(total),color:"#4ade80",icon:"TrendingUp",pct:100},
                {label:"Hoje",         val:fmtBRL(tod),  color:"#38bdf8",icon:"Droplets",  pct:total?tod/total*100:0}].map(c=>(
                <div key={c.label} className="glass-card" style={{padding:16}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.5)"}}>{c.label}</span>
                    <Icon name={c.icon} size={14} color={c.color}/>
                  </div>
                  <div style={{fontSize:17,fontWeight:900,color:c.color,marginBottom:8}}>{c.val}</div>
                  <ProgressBar pct={c.pct} color={c.color}/>
                </div>
              ))}
            </div>
          )}
          <div style={{position:"relative",marginBottom:14}}>
            <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Icon name="Search" size={14} color="rgba(186,230,253,.4)"/></span>
            <input className="glass-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cliente, placa, modelo..." style={{paddingLeft:38}}/>
          </div>
          {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>
          :filtered.length===0?<div style={{textAlign:"center",color:"rgba(186,230,253,.4)",padding:"40px 0"}}>Nenhum registro encontrado</div>
          :filtered.map((h,i)=>(
            <div key={h.id} className="glass-card car-enter" style={{marginBottom:10,animationDelay:`${i*.04}s`}}>
              <div style={{padding:14}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <div>
                    <div style={{color:"#e0f2fe",fontWeight:800,fontSize:14}}>{h.client}</div>
                    <div style={{color:"rgba(186,230,253,.45)",fontSize:12}}>{h.model} · <span style={{fontFamily:"monospace"}}>{h.plate}</span></div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:14,color:"#4ade80"}}>{fmtBRL(h.value)}</div>
                    <div style={{color:"rgba(186,230,253,.4)",fontSize:11}}>{fmtDate(h.completed_at)}</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:12,color:"rgba(186,230,253,.45)"}}>
                    {h.type}{h.criador?.name&&<span style={{color:"rgba(186,230,253,.3)"}}> · por {h.criador.name}</span>}
                  </span>
                  <StatusBadge status={h.status||"Pago"}/>
                </div>
              </div>
            </div>
          ))}
        </>
      ):(
        <>
          {/* Resumo do dia */}
          <div className="glass-card" style={{padding:16,marginBottom:16,background:"rgba(14,165,233,.08)",border:"1px solid rgba(56,189,248,.2)"}}>
            <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:12}}>Resumo de Hoje</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[{label:"Entradas",val:fmtBRL(entradasHoje),color:"#4ade80"},{label:"Saídas",val:fmtBRL(saidasHoje),color:"#f87171"},{label:"Saldo",val:fmtBRL(saldoHoje),color:saldoHoje>=0?"#38bdf8":"#f87171"}].map(k=>(
                <div key={k.label} style={{textAlign:"center"}}>
                  <div style={{fontSize:14,fontWeight:900,color:k.color}}>{k.val}</div>
                  <div style={{fontSize:10,color:"rgba(186,230,253,.4)",marginTop:2}}>{k.label}</div>
                </div>
              ))}
            </div>
          </div>

          <button className="btn-glow" onClick={()=>setShowForm(!showForm)} style={{marginBottom:16,background:showForm?"linear-gradient(135deg,#64748b,#475569)":undefined}}>
            <Icon name={showForm?"XCircle":"PlusCircle"} size={16} color="#fff"/>
            {showForm?"Cancelar":"Registrar Movimento"}
          </button>

          {showForm&&(
            <div className="glass-card" style={{padding:16,marginBottom:16,background:"rgba(255,255,255,.06)"}}>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                {["entrada","saida"].map(t=>(
                  <button key={t} onClick={()=>{setF("tipo",t);setF("categoria",t==="entrada"?catEntrada[0]:catSaida[0]);}}
                    style={{flex:1,padding:"9px 0",borderRadius:12,border:`1.5px solid ${form.tipo===t?(t==="entrada"?"rgba(74,222,128,.6)":"rgba(248,113,113,.6)"):"rgba(125,211,252,.15)"}`,background:form.tipo===t?(t==="entrada"?"rgba(74,222,128,.15)":"rgba(248,113,113,.15)"):"rgba(255,255,255,.04)",color:form.tipo===t?(t==="entrada"?"#4ade80":"#f87171"):"rgba(186,230,253,.5)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    {t==="entrada"?"⬆ Entrada":"⬇ Saída"}
                  </button>
                ))}
              </div>
              <div style={{marginBottom:10}}>
                <label className="lbl">Categoria</label>
                <select className="glass-input" value={form.categoria} onChange={e=>setF("categoria",e.target.value)} style={{WebkitAppearance:"none"}}>
                  {(form.tipo==="entrada"?catEntrada:catSaida).map(c=><option key={c} value={c} style={{background:"#0d2847"}}>{c.replace("_"," ")}</option>)}
                </select>
              </div>
              <div style={{marginBottom:10}}>
                <label className="lbl">Descrição</label>
                <input className="glass-input" value={form.descricao} onChange={e=>setF("descricao",e.target.value)} placeholder="Ex: Compra de shampoo automotivo"/>
              </div>
              <div style={{marginBottom:14}}>
                <label className="lbl">Valor (R$)</label>
                <input className="glass-input" type="number" value={form.valor} onChange={e=>setF("valor",e.target.value)} placeholder="0,00"/>
              </div>
              <button className="btn-glow" onClick={saveMov} disabled={saving} style={{background:form.tipo==="entrada"?"linear-gradient(135deg,#16a34a,#15803d)":"linear-gradient(135deg,#dc2626,#b91c1c)"}}>
                {saving?<div className="spinner spin"/>:<><Icon name="Check" size={16} color="#fff"/> Salvar Movimento</>}
              </button>
            </div>
          )}

          <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Últimos 30 dias</div>
          {movLoading?<div style={{display:"flex",justifyContent:"center",padding:20}}><div className="spinner spin"/></div>
          :movs.length===0?<div style={{textAlign:"center",color:"rgba(186,230,253,.4)",padding:20}}>Nenhum movimento registrado</div>
          :movs.map((m,i)=>(
            <div key={m.id} className="glass-card car-enter" style={{marginBottom:8,animationDelay:`${i*.03}s`}}>
              <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:34,height:34,borderRadius:10,background:m.tipo==="entrada"?"rgba(74,222,128,.15)":"rgba(248,113,113,.15)",border:`1px solid ${m.tipo==="entrada"?"rgba(74,222,128,.25)":"rgba(248,113,113,.25)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Icon name={m.tipo==="entrada"?"PlusCircle":"MinusCircle"} size={15} color={m.tipo==="entrada"?"#4ade80":"#f87171"}/>
                  </div>
                  <div>
                    <div style={{color:"#e0f2fe",fontWeight:600,fontSize:13}}>{m.descricao||m.categoria}</div>
                    <div style={{color:"rgba(186,230,253,.4)",fontSize:11}}>{m.categoria?.replace("_"," ")} · {fmtDate(m.data)}</div>
                  </div>
                </div>
                <div style={{fontWeight:800,fontSize:14,color:m.tipo==="entrada"?"#4ade80":"#f87171"}}>
                  {m.tipo==="entrada"?"+":"-"}{fmtBRL(m.valor)}
                </div>
              </div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   CRM SCREEN

function CRMScreen({empresaId}){
  const [min,setMin]=useState(30);
  const [hist,setHist]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.from('historico').select('phone,client,model,plate,type,completed_at').eq('empresa_id',empresaId).order('completed_at',{ascending:false})
      .then(({data})=>{setHist(data||[]);setLoading(false);});
  },[empresaId]);

  // Latest per phone
  const map={};
  hist.forEach(r=>{if(!map[r.phone]||new Date(r.completed_at)>new Date(map[r.phone].completed_at))map[r.phone]=r;});
  const sumidos=Object.values(map).map(r=>({...r,dias:daysSince(r.completed_at)})).filter(r=>r.dias>=min).sort((a,b)=>b.dias-a.dias);

  const waLink=r=>{
    // Mensagem com gatilho de desconto + urgência (validade de 7 dias) —
    // testes de copywriting mostram que oferta concreta + prazo claro
    // converte mais que convite genérico sem benefício tangível.
    const msg=encodeURIComponent(`Olá ${r.client}! 👋 Notamos que faz ${r.dias} dias desde a última vez que cuidamos do seu ${r.model} (placa ${r.plate}) aqui no nosso lava-jato. Queremos você de volta! 🎁 Preparamos *10% de desconto* na sua próxima lavagem, válido somente até esta semana. Responda essa mensagem ou venha nos visitar para garantir sua vaga — não queremos que essa oferta acabe sem você aproveitar! 🚗💦✨`);
    return`https://api.whatsapp.com/send?phone=${r.phone}&text=${msg}`;
  };

  return(
    <div className="scroll screen-enter">
      <div className="glass-card" style={{padding:16,marginBottom:18,background:"rgba(124,58,237,.12)",border:"1px solid rgba(167,139,250,.25)"}}>

            <Icon name="Award" size={20} color="#a78bfa"/>
          </div>
          <div>
            <div style={{color:"#e0f2fe",fontWeight:800,fontSize:15}}>Clientes Sumidos</div>
            <div style={{color:"rgba(186,230,253,.5)",fontSize:12}}>Recupere inativos via WhatsApp</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{fontSize:36,fontWeight:900,color:"#a78bfa",lineHeight:1}}>{loading?"…":sumidos.length}</div>
          <div>
            <div style={{fontSize:11,color:"rgba(186,230,253,.4)",marginBottom:6,textAlign:"right"}}>Filtro: ≥ {min} dias</div>
            <div style={{display:"flex",gap:6}}>
              {[30,45,60].map(d=><button key={d} onClick={()=>setMin(d)} style={{padding:"5px 12px",borderRadius:99,fontSize:12,fontWeight:700,border:`1.5px solid ${min===d?"#a78bfa":"rgba(125,211,252,.2)"}`,background:min===d?"rgba(124,58,237,.4)":"rgba(255,255,255,.05)",color:min===d?"#e9d5ff":"rgba(186,230,253,.5)",cursor:"pointer",transition:"all .15s"}}>{d}d</button>)}
            </div>
          </div>
        </div>
        <ProgressBar pct={Math.min(sumidos.length*10,100)} color="#a78bfa"/>
      </div>

      {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>
      :sumidos.length===0?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"56px 0",textAlign:"center"}}>
          <div style={{width:64,height:64,borderRadius:20,background:"rgba(34,197,94,.1)",border:"1px solid rgba(34,197,94,.2)",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <Icon name="CheckCircle" size={28} color="#4ade80"/>
          </div>
          <div style={{color:"#e0f2fe",fontWeight:700,fontSize:16}}>Nenhum cliente sumido!</div>
          <div style={{color:"rgba(186,230,253,.4)",fontSize:13,marginTop:6}}>Todos lavaram dentro de {min} dias</div>
        </div>
      ):(
        sumidos.map((r,i)=>{
          const hot=r.dias>=60;
          return(
            <div key={r.phone} className="glass-card car-enter" style={{marginBottom:12,animationDelay:`${i*.06}s`}}>
              <div style={{padding:14}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:40,height:40,borderRadius:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(125,211,252,.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

                    </div>

                      <div style={{color:"#e0f2fe",fontWeight:800,fontSize:14}}>{r.client}</div>
                      <div style={{color:"rgba(186,230,253,.45)",fontSize:12}}>{r.model}</div>
                    </div>
                  </div>
                  <div style={{padding:"6px 10px",borderRadius:12,background:hot?"rgba(239,68,68,.15)":"rgba(251,191,36,.12)",border:`1px solid ${hot?"rgba(239,68,68,.3)":"rgba(251,191,36,.25)"}`,textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:900,color:hot?"#f87171":"#fbbf24",lineHeight:1}}>{r.dias}d</div>
                    <div style={{fontSize:10,color:hot?"#f87171":"#fbbf24",opacity:.75}}>sem lavar</div>
                  </div>

                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(186,230,253,.4)",marginBottom:12}}>
                  <span>Última: {fmtDate(r.completed_at)}</span><span>{r.type}</span>
                </div>
                <a href={waLink(r)} target="_blank" rel="noreferrer" style={{width:"100%",padding:"12px 0",borderRadius:14,background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",fontWeight:700,fontSize:14,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,textDecoration:"none",boxShadow:"0 6px 18px rgba(22,163,74,.3)"}}>

/* ══════════════════════════════════════════════════════════════════════════
   ADMIN SCREEN — gerenciar equipe
══════════════════════════════════════════════════════════════════════════ */
function AdminScreen({empresaId,currentUser,embedded}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({name:"",email:"",password:"",role:"employee"});
  const [errors,setErrors]=useState({});
  const [saving,setSaving]=useState(false);
  const [success,setSuccess]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const fetchUsers=useCallback(async()=>{
    const{data}=await sb.from('profiles').select('*').eq('empresa_id',empresaId).order('created_at');
    setUsers(data||[]);setLoading(false);
  },[empresaId]);

  useEffect(()=>{fetchUsers();},[fetchUsers]);

  const validate=()=>{
    const e={};
    if(!form.name.trim())e.name="Obrigatório";
    if(!form.email.trim()||!form.email.includes("@"))e.email="E-mail inválido";
    if(form.password.length<6)e.password="Mínimo 6 caracteres";
    setErrors(e);return Object.keys(e).length===0;
  };

  const addUser=async()=>{
    if(!validate())return;
    setSaving(true);
    try{
      // Chama Edge Function (roda no servidor com Service Role Key).
      // Isso evita o bug de "sequestro de sessão": sb.auth.signUp() direto
      // do client troca a sessão ativa do navegador para o usuário recém-criado.
      // A Edge Function usa supabase.auth.admin.createUser(), que não afeta
      // a sessão de quem está chamando, e também valida o limite de
      // funcionários do plano ANTES de criar o usuário.
      //
      // IMPORTANTE: getSession() sozinho pode devolver um token JÁ EXPIRADO
      // se o app ficou em segundo plano por um tempo (o navegador suspende
      // o timer de renovação automática nesse caso) — o SDK só percebe e
      // renova na próxima chamada de rede que fizer. Por isso, chamamos
      // refreshSession() explicitamente antes, forçando um token válido na
      // hora, em vez de confiar que a renovação em segundo plano já rodou.
      let{data:sessionData}=await sb.auth.getSession();
      const expiresAt=sessionData?.session?.expires_at;
      const jaExpirado=expiresAt&&(expiresAt*1000)<Date.now();
      if(!sessionData?.session||jaExpirado){
        const{data:refreshed}=await sb.auth.refreshSession();
        if(refreshed?.session)sessionData=refreshed;
      }
      // NOTA: no painel do Supabase, o campo "Name" da função é apenas um
      // rótulo de exibição — a rota real (slug da URL) é fixada no momento
      // da criação e não muda mesmo renomeando o "Name" depois. A função
      // foi criada com o slug "bright-processor", então chamamos essa rota
      // aqui, mesmo o nome exibido no painel sendo "create-employee".
      const res=await fetch(`${SUPABASE_URL}/functions/v1/bright-processor`,{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization":`Bearer ${sessionData?.session?.access_token||""}`,
        },
        body:JSON.stringify({
          email:form.email.trim().toLowerCase(),
          password:form.password,
          name:form.name.trim(),
          role:form.role,
          empresa_id:empresaId,
        }),
      });
      const result=await res.json();
      if(!result.success){
        // Mensagem mais clara especificamente para o caso de sessão
        // expirada — orienta a ação certa (relogar) em vez de deixar o
        // usuário sem saber o que fazer com um "Não autenticado." seco.
        const msg=result.message==="Não autenticado."
          ?"Sua sessão expirou. Saia e entre novamente no app, depois tente cadastrar o funcionário de novo."
          :(result.message||"Erro ao criar usuário.");
        setErrors({email:msg});
        setSaving(false);
        return;
      }
      setSuccess(`Usuário "${form.name}" criado com sucesso!`);
      setTimeout(()=>setSuccess(""),5000);
      setForm({name:"",email:"",password:"",role:"employee"});
      fetchUsers();
    }catch(e){
      setErrors({email:"Falha de conexão. Verifique sua internet e tente novamente."});
    }
    setSaving(false);
  };

  const removeUser=async(uid)=>{
    if(uid===currentUser.id)return;
    await sb.from('profiles').update({ativo:false}).eq('id',uid);
    fetchUsers();
  };

  return(
    <div className={embedded?"":"scroll screen-enter"}>
      <div className="glass-card" style={{padding:16,marginBottom:18,background:"rgba(14,165,233,.08)",border:"1px solid rgba(56,189,248,.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <div style={{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(14,165,233,.3)"}}>
            <Icon name="UserPlus" size={17} color="#fff"/>
          </div>
          <div>
            <div style={{color:"#e0f2fe",fontWeight:800,fontSize:15}}>Adicionar Funcionário</div>
            <div style={{color:"rgba(186,230,253,.5)",fontSize:12}}>Crie um novo acesso ao sistema</div>
          </div>
        </div>
        {[["name","Nome completo","Maria Silva","text"],["email","E-mail","maria@email.com","email"],["password","Senha (min. 6 chars)","••••••••","password"]].map(([field,label,ph,type])=>(
          <div key={field} style={{marginBottom:12}}>
            <label className="lbl">{label}</label>
            <input className="glass-input" type={type} value={form[field]} onChange={e=>set(field,e.target.value)} placeholder={ph} autoCapitalize="none" style={{borderColor:errors[field]?"rgba(239,68,68,.5)":undefined}}/>
            {errors[field]&&<div style={{fontSize:11,color:"#f87171",marginTop:4}}>{errors[field]}</div>}
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <label className="lbl">Nível de acesso</label>
          <div style={{display:"flex",gap:8}}>
            {[["employee","👷 Funcionário"],["owner","👑 Dono"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>set("role",val)} style={{flex:1,padding:"10px 0",borderRadius:12,border:`1.5px solid ${form.role===val?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,background:form.role===val?"rgba(14,165,233,.2)":"rgba(255,255,255,.04)",color:form.role===val?"#38bdf8":"rgba(186,230,253,.5)",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .15s"}}>
                {lbl}
              </button>
            ))}
          </div>
        </div>
        {success&&<div style={{background:"rgba(34,197,94,.15)",border:"1px solid rgba(34,197,94,.3)",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}><Icon name="CheckCircle" size={15} color="#4ade80"/><span style={{color:"#4ade80",fontSize:13,fontWeight:600}}>{success}</span></div>}
        <button className="btn-glow" onClick={addUser} disabled={saving}>
          {saving?<div className="spinner spin"/>:<><Icon name="UserPlus" size={16} color="#fff"/> Criar Usuário</>}
        </button>
      </div>
      <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Equipe ({users.length})</div>
      {loading?<div style={{display:"flex",justifyContent:"center",padding:20}}><div className="spinner spin"/></div>
      :users.map(u=>(
        <div key={u.id} className="glass-card" style={{marginBottom:10}}>
          <div style={{padding:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,borderRadius:14,background:u.role==="owner"?"rgba(251,191,36,.15)":"rgba(14,165,233,.12)",border:`1px solid ${u.role==="owner"?"rgba(251,191,36,.3)":"rgba(14,165,233,.25)"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Icon name={u.role==="owner"?"Shield":"User"} size={18} color={u.role==="owner"?"#fbbf24":"#38bdf8"}/>
              </div>
              <div>
                <div style={{color:u.ativo?"#e0f2fe":"rgba(186,230,253,.3)",fontWeight:800,fontSize:14}}>{u.name}</div>
                <div style={{color:"rgba(186,230,253,.4)",fontSize:12}}>{u.role==="owner"?"Dono":"Funcionário"}{!u.ativo?" · Inativo":""}</div>
              </div>
            </div>
            {u.id!==currentUser.id
              ?<button onClick={()=>removeUser(u.id)} style={{padding:"9px 11px",borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",color:"#f87171",cursor:"pointer",display:"flex",alignItems:"center"}}><Icon name="Trash2" size={14} color="#f87171"/></button>
              :<span style={{fontSize:11,color:"#38bdf8",fontWeight:700,background:"rgba(14,165,233,.15)",padding:"4px 10px",borderRadius:99,border:"1px solid rgba(56,189,248,.25)"}}>Você</span>
            }
          </div>
        </div>
      ))}
    </div>
  );
}


/* ══════════════════════════════════════════════════════════════════════════
   MINI BAR CHART (sem lib externa)
══════════════════════════════════════════════════════════════════════════ */
function BarChartBar({d,max,color,height,delay}){
  const pct=d.v/max;
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct),delay);return()=>clearTimeout(t);},[pct,delay]);
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div style={{fontSize:9,color:"rgba(186,230,253,.5)",fontWeight:600}}>{d.v>0?fmtBRL(d.v).replace("R$","").trim():""}</div>
      <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:`${color}22`,position:"relative",height:height-20,display:"flex",alignItems:"flex-end"}}>
        <div style={{width:"100%",borderRadius:"4px 4px 0 0",background:`linear-gradient(180deg,${color},${color}99)`,height:`${w*100}%`,transition:"height .6s cubic-bezier(.25,.46,.45,.94)"}}/>
      </div>
      <div style={{fontSize:9,color:"rgba(186,230,253,.4)",textAlign:"center",lineHeight:1.2}}>{d.l}</div>
    </div>
  );
}

function BarChart({data,color="#0ea5e9",height=80}){
  const max=Math.max(...data.map(d=>d.v),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:4,height,paddingTop:8}}>
      {data.map((d,i)=>(
        <BarChartBar key={`${d.l}-${i}`} d={d} max={max} color={color} height={height} delay={i*60+100}/>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   RELATORIOS SCREEN
══════════════════════════════════════════════════════════════════════════ */
function RelatoriosScreen({empresaId,embedded}){
  const [periodo,setPeriodo]=useState("semana");
  const [movs,setMovs]=useState([]);
  const [hist,setHist]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setLoading(true);
    const dias=periodo==="dia"?1:periodo==="semana"?7:30;
    const desde=new Date(Date.now()-dias*86400000).toISOString().split("T")[0];
    Promise.all([
      sb.from('caixa_movimentos').select('tipo,categoria,valor,data').eq('empresa_id',empresaId).gte('data',desde).order('data'),
      sb.from('historico').select('type,value,completed_at').eq('empresa_id',empresaId).gte('completed_at',new Date(Date.now()-dias*86400000).toISOString()).order('completed_at'),
    ]).then(([{data:m},{data:h}])=>{
      setMovs(m||[]);setHist(h||[]);setLoading(false);
    });
  },[empresaId,periodo]);

  const entradas=movs.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saidas=movs.filter(m=>m.tipo==="saida").reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saldo=entradas-saidas;
  const totalAtend=hist.length;

  // Agrupar para o gráfico. Importante: no período de 30 dias, agregamos
  // por SEMANA (4-5 barras cobrindo os 30 dias reais) em vez de amostrar
  // apenas 5 dias arbitrários espaçados a cada ~7 dias — a versão anterior
  // mostrava 5 barras de dias isolados, dando a falsa impressão de ser uma
  // visão diária completa do mês, quando na real ignorava 25 dos 30 dias.
  const hoje=new Date();
  let chartData;
  if(periodo==="dia"){
    const key=hoje.toISOString().split("T")[0];
    const v=movs.filter(m=>m.tipo==="entrada"&&m.data===key).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
    chartData=[{l:"Hoje",v}];
  }else if(periodo==="semana"){
    chartData=[6,5,4,3,2,1,0].map(d=>{
      const dt=new Date(hoje);dt.setDate(dt.getDate()-d);
      const key=dt.toISOString().split("T")[0];
      const v=movs.filter(m=>m.tipo==="entrada"&&m.data===key).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
      return{l:["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dt.getDay()],v};
    });
  }else{
    // 30 dias: agrupado por semana, cobrindo os 30 dias reais sem pular nenhum
    const semanas=[];
    for(let w=4;w>=0;w--){
      const fim=new Date(hoje);fim.setDate(fim.getDate()-w*7);
      const inicio=new Date(fim);inicio.setDate(inicio.getDate()-6);
      const inicioKey=inicio.toISOString().split("T")[0];
      const fimKey=fim.toISOString().split("T")[0];
      const v=movs.filter(m=>m.tipo==="entrada"&&m.data>=inicioKey&&m.data<=fimKey).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
      semanas.push({l:`${inicio.getDate()}/${inicio.getMonth()+1}`,v});
    }
    chartData=semanas;
  }

  // Por categoria
  const catMap={};
  movs.filter(m=>m.tipo==="entrada").forEach(m=>{catMap[m.categoria]=(catMap[m.categoria]||0)+(parseFloat(m.valor)||0);});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);

  // Serviços mais realizados
  const svcMap={};
  hist.forEach(h=>{svcMap[h.type]=(svcMap[h.type]||0)+1;});
  const svcs=Object.entries(svcMap).sort((a,b)=>b[1]-a[1]);

  return(
    <div className={embedded?"":"scroll screen-enter"}>
      {/* Período */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["dia","Hoje"],["semana","7 dias"],["mes","30 dias"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriodo(k)}
            style={{flex:1,padding:"9px 0",borderRadius:12,border:`1.5px solid ${periodo===k?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,background:periodo===k?"rgba(14,165,233,.2)":"rgba(255,255,255,.04)",color:periodo===k?"#38bdf8":"rgba(186,230,253,.5)",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>

      {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>:(
        <>
          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[
              {l:"Receita",v:fmtBRL(entradas),c:"#4ade80",icon:"TrendingUp"},
              {l:"Despesas",v:fmtBRL(saidas),c:"#f87171",icon:"MinusCircle"},
              {l:"Saldo",v:fmtBRL(saldo),c:saldo>=0?"#38bdf8":"#f87171",icon:"Wallet"},
              {l:"Atendimentos",v:totalAtend,c:"#a78bfa",icon:"Car"},
            ].map(k=>(
              <div key={k.l} className="glass-card" style={{padding:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:11,color:"rgba(186,230,253,.5)",fontWeight:600}}>{k.l}</span>
                  <Icon name={k.icon} size={13} color={k.c}/>
                </div>
                <div style={{fontSize:17,fontWeight:900,color:k.c}}>{k.v}</div>
              </div>
            ))}
          </div>

          {/* Gráfico de receita */}
          <div className="glass-card" style={{padding:16,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:12}}>
              📊 Receita {periodo==="dia"?"de Hoje":periodo==="semana"?"por Dia (últimos 7 dias)":"por Semana (últimos 30 dias)"}
            </div>
            <BarChart data={chartData} color="#0ea5e9" height={100}/>
          </div>

          {/* Serviços mais realizados */}
          {svcs.length>0&&(
            <div className="glass-card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:12}}>🏆 Serviços Mais Realizados</div>
              {svcs.map(([nome,qtd],i)=>(
                <div key={nome} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:22,height:22,borderRadius:6,background:"rgba(14,165,233,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:11,fontWeight:800,color:"#38bdf8"}}>{i+1}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:13,color:"#e0f2fe",fontWeight:600}}>{nome}</span>
                      <span style={{fontSize:12,color:"#38bdf8",fontWeight:700}}>{qtd}x</span>
                    </div>
                    <div className="progress-bar">
                      <div className="progress-fill" style={{width:`${(qtd/svcs[0][1])*100}%`,background:"linear-gradient(90deg,#0ea5e9,#38bdf8)"}}/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Por categoria financeira */}
          {cats.length>0&&(
            <div className="glass-card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:12}}>💰 Receita por Categoria</div>
              {cats.map(([cat,val])=>(
                <div key={cat} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:13,color:"rgba(186,230,253,.7)",textTransform:"capitalize"}}>{cat.replace("_"," ")}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#4ade80"}}>{fmtBRL(val)}</span>
                </div>
              ))}
            </div>
          )}

          {cats.length===0&&svcs.length===0&&(
            <div style={{textAlign:"center",color:"rgba(186,230,253,.3)",padding:"30px 0",fontSize:13}}>Nenhum dado no período selecionado</div>
          )}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   SUPPORT SCREEN
══════════════════════════════════════════════════════════════════════════ */
function SupportScreen({embedded}){
  const [open,setOpen]=useState(null);
  const [form,setForm]=useState({name:"",msg:""});
  const [sent,setSent]=useState(false);
  const send=()=>{if(!form.name||!form.msg)return;setSent(true);setTimeout(()=>{setSent(false);setForm({name:"",msg:""});},3000);};
  return(
    <div className={embedded?"":"scroll screen-enter"}>
      <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Perguntas Frequentes</div>
      <div style={{marginBottom:20}}>
        {FAQ.map((item,i)=>(
          <div key={i} className="glass-card" style={{marginBottom:8}}>
            <button onClick={()=>setOpen(open===i?null:i)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
              <span style={{color:"#bae6fd",fontWeight:600,fontSize:14,flex:1,paddingRight:8}}>{item.q}</span>
              <Icon name={open===i?"ChevronUp":"ChevronDown"} size={14} color="rgba(186,230,253,.4)"/>
            </button>
            {open===i&&<div style={{padding:"0 16px 14px",paddingTop:12,color:"rgba(186,230,253,.6)",fontSize:13,lineHeight:1.65,borderTop:"1px solid rgba(125,211,252,.1)"}}>{item.a}</div>}
          </div>
        ))}
      </div>
      <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Contato / Suporte</div>
      <div className="glass-card" style={{padding:16}}>
        <input className="glass-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Seu nome" style={{marginBottom:10}}/>
        <textarea className="glass-input" value={form.msg} onChange={e=>setForm(f=>({...f,msg:e.target.value}))} placeholder="Descreva sua dúvida..." rows={3} style={{marginBottom:10,resize:"none"}}/>
        <button className="btn-glow" onClick={send} style={{background:sent?"linear-gradient(135deg,#16a34a,#15803d)":undefined}}>
          {sent?<><Icon name="Check" size={15} color="#fff"/> Enviado!</>:<><Icon name="Send" size={15} color="#fff"/> Enviar Mensagem</>}
        </button>
      </div>
      <div style={{textAlign:"center",color:"rgba(186,230,253,.25)",fontSize:11,marginTop:20}}>Lava Rápido SaaS v3.0.0</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════════════════ */
function App(){
  const [session,setSession]=useState(undefined);
  const [profile,setProfile]=useState(null);
  const [empresa,setEmpresa]=useState(null);
  const [assInfo,setAssInfo]=useState(null);
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [weekWeather,setWeekWeather]=useState(null);
  const [showWeeklyPopup,setShowWeeklyPopup]=useState(false);
  const [showSupport,setShowSupport]=useState(false);

  // Mostra o popup de resumo semanal uma vez por dia, por empresa — a
  // chave do localStorage inclui o empresa_id porque, sem isso, trocar de
  // conta no mesmo navegador (ex: o master testando múltiplas empresas)
  // faria o app pensar "já mostrei hoje" mesmo sendo uma empresa diferente,
  // já que o localStorage é vinculado ao navegador, não à conta logada.
  useEffect(()=>{
    if(!weekWeather||!profile?.empresa_id)return;
    const hoje=new Date().toISOString().split("T")[0];
    const chave=`weeklyWeatherPopupDate_${profile.empresa_id}`;
    const ultimaVez=localStorage.getItem(chave);
    if(ultimaVez!==hoje){
      setShowWeeklyPopup(true);
      localStorage.setItem(chave,hoje);
    }
  },[weekWeather,profile]);

  // Auth listener
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setAuthReady(true);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{
      setSession(s);
      if(!s){setProfile(null);setAssInfo(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load profile + assinatura after session
  useEffect(()=>{
    if(!session)return;
    (async()=>{
      // Tentar buscar perfil com retry (RLS pode demorar após signup)
      let prof=null;
      for(let i=0;i<3;i++){
        const{data,error}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        if(data){prof=data;break;}
        await new Promise(r=>setTimeout(r,600));
      }
      // Se ainda null, criar profile básico via upsert
      if(!prof){
        const{data:upserted}=await sb.from('profiles').upsert({
          id:session.user.id,
          name:session.user.user_metadata?.name||session.user.email?.split('@')[0]||'Usuário',
          role:session.user.user_metadata?.role||'owner',
          empresa_id:null
        },{onConflict:'id'}).select().single();
        prof=upserted;
      }
      setProfile(prof||{id:session.user.id,name:session.user.email?.split('@')[0]||'Usuário',role:'owner',empresa_id:null});
      if(prof?.empresa_id){
        const[{data:ass},{data:emp}]=await Promise.all([
          sb.rpc('fn_assinatura_valida',{p_empresa_id:prof.empresa_id}),
          sb.from('empresas').select('id,nome_fantasia,telefone').eq('id',prof.empresa_id).single(),
        ]);
        setAssInfo(ass);
        setEmpresa(emp);
      }
    })();
  },[session]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const logout=async()=>{await sb.auth.signOut();setTab("home");};

  // Loading state
  if(!authReady||session===undefined){
    return(
      <div style={{height:"var(--app-height)",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        <AquaBg/>
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div style={{width:72,height:72,borderRadius:24,background:"rgba(14,165,233,.2)",border:"2px solid rgba(56,189,248,.4)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
            <Icon name="Droplets" size={36} color="#38bdf8"/>
          </div>
          <div className="spinner spin" style={{margin:"0 auto",width:28,height:28,borderWidth:3}}/>
        </div>
      </div>
    );
  }

  if(!session) return <LoginScreen onLogin={s=>setSession(s)}/>;

  // Profile ainda carregando
  if(!profile){
    return(
      <div style={{height:"var(--app-height)",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        <AquaBg/>
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div className="spinner spin" style={{margin:"0 auto",width:28,height:28,borderWidth:3}}/>
          <div style={{color:"rgba(186,230,253,.6)",marginTop:16,fontSize:14}}>Carregando perfil...</div>
        </div>
      </div>
    );
  }

  // Master → painel da plataforma
  if(profile.role==="master"){
    return(
      <div style={{height:"var(--app-height)",width:"100%",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
        <AquaBg/>
        <div className="glass" style={{padding:"env(safe-area-inset-top,12px) 16px 12px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:10,borderTop:"none",borderLeft:"none",borderRight:"none",borderRadius:0}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:22,height:22,borderRadius:7,background:"rgba(251,191,36,.2)",border:"1px solid rgba(251,191,36,.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon name="Crown" size={12} color="#fbbf24"/>
              </div>
              <span style={{color:"#e0f2fe",fontWeight:900,fontSize:18}}>Admin Master</span>
            </div>
            <div style={{color:"rgba(186,230,253,.5)",fontSize:12,marginTop:2}}>{profile.name} · Plataforma</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(245,158,11,.4)"}}>
              <Icon name="Crown" size={17} color="#fff"/>
            </div>
            <button onClick={logout} style={{width:36,height:36,borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              <Icon name="LogOut" size={15} color="#f87171"/>
            </button>
          </div>
        </div>
        <div style={{flex:"1 1 auto",minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",zIndex:5}}>
          <MasterScreen/>
        </div>
      </div>
    );
  }

  // Sem empresa → cadastro
  if(!profile.empresa_id){
    return <CadastroEmpresaScreen user={session.user} onComplete={async()=>{
      // Retry com até 5 tentativas aguardando propagação do RLS
      let prof=null;
      for(let i=0;i<5;i++){
        await new Promise(r=>setTimeout(r,900));
        const{data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        if(data?.empresa_id){prof=data;break;}
      }
      if(prof){
        setProfile(prof);
        const{data:ass}=await sb.rpc('fn_assinatura_valida',{p_empresa_id:prof.empresa_id});
        setAssInfo(ass);
      } else {
        // Último recurso: forçar refresh da sessão
        await sb.auth.refreshSession();
        window.location.reload();
      }
    }}/>;
  }

  // Assinatura inválida
  if(assInfo&&!assInfo.valida){
    return <AssinaturaScreen info={assInfo} onLogout={logout}/>;
  }

  const isOwner=profile.role==="owner";
  const ALL_TABS=[
    {id:"home",    label:"Fila",      icon:"Home",     roles:["owner","employee"]},
    {id:"new",     label:"Nova",      icon:"Plus",     roles:["owner","employee"]},
    {id:"crm",     label:"CRM",       icon:"Users",    roles:["owner"]},
    {id:"history", label:"Histórico", icon:"History",  roles:["employee"]},
    {id:"config",  label:"Config",    icon:"Settings", roles:["owner"]},
  ];
  const TABS=ALL_TABS.filter(t=>t.roles.includes(profile.role));
  const TITLES={home:"Fila de Lavagem",new:"Nova Lavagem",crm:"CRM / Fidelização",history:"Histórico",config:"Configurações"};
  const safeTab=TABS.find(t=>t.id===tab)?tab:"home";

  // Trial banner
  const showTrialBanner=assInfo?.status==="trial"&&(assInfo?.dias_restantes<=7);

  return(
    <div style={{height:"var(--app-height)",width:"100%",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <AquaBg/>

      {/* Área superior: clima + trial — espaçamento próprio, separado visualmente do header */}
      <div style={{flexShrink:0,position:"relative",zIndex:15,paddingTop:"env(safe-area-inset-top,10px)"}}>
        <WeatherBanner onWeekForecast={setWeekWeather}/>
        {showTrialBanner&&<div style={{background:"rgba(251,191,36,.15)",border:"1px solid rgba(251,191,36,.25)",borderRadius:14,padding:"8px 16px",display:"flex",alignItems:"center",gap:8,margin:"8px 14px 0"}}>
          <Icon name="AlertTriangle" size={14} color="#fbbf24"/>
          <span style={{fontSize:12,color:"#fbbf24",fontWeight:600}}>Trial expira em {assInfo.dias_restantes} dia{assInfo.dias_restantes!==1?"s":""}. Contate o suporte para assinar.</span>
        </div>}
      </div>

      {/* Header — espaçado da área de clima por margin-top, sem mais competir pelo safe-area-top */}
      <div className="glass" style={{padding:"10px 16px 12px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:10,borderTop:"none",borderLeft:"none",borderRight:"none",borderRadius:0,marginTop:6}}>
        <div>
          <div style={{color:"#e0f2fe",fontWeight:900,fontSize:18,lineHeight:1,textShadow:"0 0 20px rgba(56,189,248,.3)"}}>{TITLES[safeTab]}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
            <div style={{width:18,height:18,borderRadius:6,background:isOwner?"rgba(251,191,36,.2)":"rgba(14,165,233,.2)",border:`1px solid ${isOwner?"rgba(251,191,36,.4)":"rgba(14,165,233,.4)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon name={isOwner?"Shield":"User"} size={10} color={isOwner?"#fbbf24":"#38bdf8"}/>
            </div>
            {empresa&&<span style={{fontSize:12,color:"#38bdf8",fontWeight:700}}>{empresa.nome_fantasia}</span>}
            <span style={{fontSize:11,color:"rgba(186,230,253,.35)"}}>· {profile.name}</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(14,165,233,.4)"}}>
            <Icon name="Droplets" size={17} color="#fff"/>
          </div>
          <button onClick={()=>setShowSupport(true)} style={{width:36,height:36,borderRadius:12,background:"rgba(56,189,248,.12)",border:"1px solid rgba(56,189,248,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Icon name="Headphones" size={15} color="#38bdf8"/>
          </button>
          <button onClick={logout} style={{width:36,height:36,borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Icon name="LogOut" size={15} color="#f87171"/>
          </button>
        </div>
      </div>

      {/* Screen — minHeight:0 é a correção crítica: sem isso, este flex item nunca encolhe
          abaixo do tamanho do seu conteúdo, o que estoura a altura do container pai e
          empurra a bottom nav para fora da viewport visível em navegadores mobile. */}
      <div style={{flex:"1 1 auto",minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",zIndex:5}}>
        {safeTab==="home"    &&<HomeScreen     key="home"    empresaId={profile.empresa_id}/>}
        {safeTab==="new"     &&<NewWashScreen  key="new"     empresaId={profile.empresa_id} userId={profile.id} onSuccess={()=>{setTab("home");showToast("✅ Veículo adicionado à fila!");}}/>}
        {safeTab==="crm"     &&isOwner&&<CRMScreen     key="crm"     empresaId={profile.empresa_id}/>}
        {safeTab==="history" &&!isOwner&&<HistoryScreen key="history" empresaId={profile.empresa_id} isOwner={false}/>}
        {safeTab==="config"  &&isOwner&&<ConfigScreen  key="config"  empresaId={profile.empresa_id} currentUser={profile} isOwner={isOwner} onUpdate={name=>showToast("✅ "+name+" atualizado!")}/>}
      </div>

      {/* Bottom nav — flexShrink:0 garante que nunca seja comprimida nem empurrada para fora */}
      <div className="glass" style={{flexShrink:0,display:"flex",padding:`8px 8px env(safe-area-inset-bottom,14px)`,zIndex:10,borderBottom:"none",borderLeft:"none",borderRight:"none",borderRadius:0}}>
        {TABS.map(({id,label,icon})=>{
          const active=safeTab===id;
          return(
            <button key={id} className="nav-btn" onClick={()=>setTab(id)}>
              <div className={`nav-icon${active?" active":""}`}>
                <Icon name={icon} size={16} color={active?"#fff":"rgba(186,230,253,.4)"}/>
              </div>
              <span style={{fontSize:10,fontWeight:700,color:active?"#38bdf8":"rgba(186,230,253,.35)"}}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* Toast */}
      {toast&&<div className="toast" style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",background:"rgba(15,23,42,.92)",backdropFilter:"blur(16px)",border:"1px solid rgba(56,189,248,.2)",color:"#e0f2fe",fontSize:13,fontWeight:600,padding:"10px 20px",borderRadius:16,boxShadow:"0 8px 24px rgba(0,0,0,.4)",zIndex:99,whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Popup de resumo semanal do clima — aparece uma vez por dia */}
      {showWeeklyPopup&&<WeeklyWeatherPopup week={weekWeather} onClose={()=>setShowWeeklyPopup(false)}/>}

      {/* Suporte agora acessível direto do cabeçalho, em qualquer tela —
          não depende mais de navegar até Config para encontrar a aba. */}
      {showSupport&&(
        <div style={{position:"fixed",inset:0,zIndex:150,background:"rgba(8,15,28,.85)",backdropFilter:"blur(4px)",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 12px",flexShrink:0}}>
            <div style={{color:"#e0f2fe",fontWeight:900,fontSize:18}}>Suporte</div>
            <button onClick={()=>setShowSupport(false)} style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,.08)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              <Icon name="XCircle" size={16} color="#bae6fd"/>
            </button>
          </div>
          <div style={{flex:1,minHeight:0,overflow:"hidden"}}>
            <SupportScreen embedded/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
</script>
</body>
</html>
