══════════════════════════════════════════════════════════════════════════ */
function FolhaScreen({empresaId,embedded,faturamentoExterno,onFaturamentoChange}){
  const [funcionarios,setFuncionarios]=useState([]);
  const [diarias,setDiarias]=useState({});
  const [pagamentos,setPagamentos]=useState([]);
  const [diasMap,setDiasMap]=useState({});
  const [comissoes,setComissoes]=useState({});
  const [performance,setPerformance]=useState(null);
  const [loading,setLoading]=useState(true);
  const [semana,setSemana]=useState(getSemanaAtual());
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({profile_id:"",valor:"",tipo:"pagamento",observacao:""});
  const [saving,setSaving]=useState(false);
  const [editandoDiaria,setEditandoDiaria]=useState(null);
  const [novaDiaria,setNovaDiaria]=useState("");
  const [editandoConfig,setEditandoConfig]=useState(null);
  const [configForm,setConfigForm]=useState({tipo_pagamento:"diaria",taxa_comissao:""});
  const [savingConfig,setSavingConfig]=useState(false);
  const [savingDias,setSavingDias]=useState(null);
  const [searchTerm,setSearchTerm]=useState("");
  const [debugPerf,setDebugPerf]=useState("");
  const [fatSemana,setFatSemana]=useState(0);

  function getSemanaAtual(){
    const d=new Date();
    const jan1=new Date(d.getFullYear(),0,1);
    const semNum=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
    return `${d.getFullYear()}-W${String(semNum).padStart(2,"0")}`;
  }
  function semanaLabel(s){
    const [ano,w]=s.split("-W");const semNum=parseInt(w);
    const jan1=new Date(parseInt(ano),0,1);
    const diasAteSegunda=(semNum-1)*7-(jan1.getDay()||7)+1;
    const inicio=new Date(jan1.getTime()+diasAteSegunda*86400000);
    const fim=new Date(inicio.getTime()+6*86400000);
    const fmt=d=>`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
    return `${fmt(inicio)} – ${fmt(fim)}`;
  }
  function semanaParaDatas(s){
    const [ano,w]=s.split("-W");const semNum=parseInt(w);
    const jan1=new Date(parseInt(ano),0,1);
    const diasAteSegunda=(semNum-1)*7-(jan1.getDay()||7)+1;
    const inicio=new Date(jan1.getTime()+diasAteSegunda*86400000);
    const fim=new Date(inicio.getTime()+6*86400000);
    const fmt=d=>d.toISOString().split("T")[0];
    return{inicio:fmt(inicio),fim:fmt(fim)};
  }

  const fetchTudo=useCallback(async()=>{
    setLoading(true);
    const{inicio,fim}=semanaParaDatas(semana);
    const[{data:funcs},{data:dirs},{data:pgtos},{data:dias}]=await Promise.all([
      sb.from("profiles").select("id,name,role").eq("empresa_id",empresaId).eq("role","employee"),
      sb.from("funcionario_diaria").select("*").eq("empresa_id",empresaId),
      sb.from("folha_pagamentos").select("*").eq("empresa_id",empresaId).eq("semana_ref",semana).order("created_at",{ascending:false}),
      sb.from("folha_dias_trabalhados").select("*").eq("empresa_id",empresaId).eq("semana_ref",semana),
    ]);
    setFuncionarios(funcs||[]);
    const dMap={};
    (dirs||[]).forEach(d=>{dMap[d.profile_id]={
      valor_diaria:d.valor_diaria||0,
      tipo_pagamento:d.tipo_pagamento||"diaria",
      taxa_comissao:d.taxa_comissao||0,
    };});
    setDiarias(dMap);
    setPagamentos(pgtos||[]);
    const dmMap={};(dias||[]).forEach(d=>{dmMap[d.profile_id]=d.dias;});
    setDiasMap(dmMap);

    // Faturamento calculado pelo useEffect próprio (reage à semana ativa)
    const faturamento=fatSemana;
    const folha=(pgtos||[]).reduce((s,p)=>s+(parseFloat(p.valor)||0),0);
    const percentual=faturamento>0?Math.round((folha/faturamento)*1000)/10:null;
    setPerformance({faturamento,folha,percentual});
    setDebugPerf(`fat:${faturamento} folha:${folha} pct:${percentual}`);

    // Buscar comissões para funcionários com tipo comissao/misto
    const funcsComissao=(funcs||[]).filter(f=>dMap[f.id]?.tipo_pagamento!=="diaria");
    if(funcsComissao.length>0){
      const results=await Promise.all(funcsComissao.map(f=>
        sb.rpc("fn_comissao_semana",{p_empresa_id:empresaId,p_profile_id:f.id,p_data_inicio:inicio,p_data_fim:fim})
      ));
      const cMap={};
      funcsComissao.forEach((f,i)=>{if(results[i].data)cMap[f.id]=results[i].data;});
      setComissoes(cMap);
    }else{setComissoes({});}
    setLoading(false);
  },[empresaId,semana]);

  useEffect(()=>{
    fetchTudo();

    // Realtime: recalcula quando qualquer lavagem é paga (afeta faturamento semanal)
    const chFaturamento=sb.channel("folha-fat-"+empresaId)
      .on("postgres_changes",{event:"*",schema:"public",table:"historico",
        filter:`empresa_id=eq.${empresaId}`},()=>fetchTudo())
      .subscribe();

    // Realtime: recalcula quando pagamentos da folha são lançados/alterados
    const chFolha=sb.channel("folha-pgto-"+empresaId)
      .on("postgres_changes",{event:"*",schema:"public",table:"folha_pagamentos",
        filter:`empresa_id=eq.${empresaId}`},()=>fetchTudo())
      .subscribe();

    // Realtime: recalcula quando dias trabalhados são alterados (afeta comissões e saldo)
    const chDias=sb.channel("folha-dias-"+empresaId)
      .on("postgres_changes",{event:"*",schema:"public",table:"folha_dias_trabalhados",
        filter:`empresa_id=eq.${empresaId}`},()=>fetchTudo())
      .subscribe();

    return()=>{
      sb.removeChannel(chFaturamento);
      sb.removeChannel(chFolha);
      sb.removeChannel(chDias);
    };
  },[fetchTudo]);

  // Faturamento por semana — todas as pílulas usam a mesma lógica agora
  useEffect(()=>{
    const semanaCorrente=getSemanaAtual();
    if(semana===semanaCorrente&&faturamentoExterno>0){
      // Semana atual: usar o valor calculado no ConfigScreen (mais confiável)
      setFatSemana(faturamentoExterno);
      return;
    }
    const{inicio,fim}=semanaParaDatas(semana);
    const d1=new Date(inicio);d1.setHours(0,0,0,0);
    const d2=new Date(fim);d2.setHours(23,59,59,999);
    sb.from("historico").select("*")
      .eq("empresa_id",empresaId)
      .gte("completed_at",d1.toISOString())
      .lte("completed_at",d2.toISOString())
      .then(({data})=>{
        const fat=(data||[])
          .filter(h=>h.status_pagamento!=="estornado")
          .reduce((s,h)=>s+(parseFloat(h.value)||0),0);
        setFatSemana(fat);
      });
  },[empresaId,semana,faturamentoExterno]);
  // Recalcula performance quando fatSemana muda (busca assíncrona por semana)
  useEffect(()=>{
    const folha=pagamentos.reduce((s,p)=>s+(parseFloat(p.valor)||0),0);
    const percentual=fatSemana>0?Math.round((folha/fatSemana)*1000)/10:null;
    setPerformance(prev=>prev?{...prev,faturamento:fatSemana,folha,percentual}:{faturamento:fatSemana,folha,percentual});
  },[fatSemana,pagamentos]);

  const saldoPorFunc=useMemo(()=>{
    return funcionarios.reduce((acc,f)=>{
      const dias=diasMap[f.id]||0;
      const cfg=diarias[f.id]||{};
      const tipo=cfg.tipo_pagamento||"diaria";
      const valorDiaria=cfg.valor_diaria||0;
      const taxa=cfg.taxa_comissao||0;
      const comissao=comissoes[f.id]?.comissao||0;
      const totalLavagens=comissoes[f.id]?.total_lavagens||0;
      let totalDevido=0;
      if(tipo==="diaria")totalDevido=valorDiaria*dias;
      else if(tipo==="comissao")totalDevido=comissao;
      else if(tipo==="misto")totalDevido=(valorDiaria*dias)+comissao;
      const totalPago=pagamentos.filter(p=>p.profile_id===f.id).reduce((s,p)=>s+parseFloat(p.valor),0);
      acc[f.id]={totalDevido,totalPago,saldo:totalDevido-totalPago,tipo,taxa,comissao,totalLavagens};
      return acc;
    },{});
  },[funcionarios,diarias,pagamentos,diasMap,comissoes]);

  const totalSemana=pagamentos.reduce((s,p)=>s+parseFloat(p.valor),0);

  const salvarDias=async(profileId,dias)=>{
    setSavingDias(profileId);
    await sb.from("folha_dias_trabalhados").upsert({
      empresa_id:empresaId,profile_id:profileId,semana_ref:semana,dias:parseInt(dias)||0
    },{onConflict:"empresa_id,profile_id,semana_ref"});
    setDiasMap(m=>({...m,[profileId]:parseInt(dias)||0}));
    setSavingDias(null);
  };

  const salvarDiaria=async(profileId)=>{
    const v=parseFloat(novaDiaria);if(isNaN(v)||v<0)return;
    const cfg=diarias[profileId]||{};
    await sb.from("funcionario_diaria").upsert({
      empresa_id:empresaId,profile_id:profileId,
      valor_diaria:v,
      tipo_pagamento:cfg.tipo_pagamento||"diaria",
      taxa_comissao:cfg.taxa_comissao||0,
    },{onConflict:"empresa_id,profile_id"});
    setDiarias(d=>({...d,[profileId]:{...(d[profileId]||{}),valor_diaria:v}}));
    setEditandoDiaria(null);
  };

  const salvarConfig=async(profileId)=>{
    setSavingConfig(true);
    const cfg=diarias[profileId]||{};
    await sb.from("funcionario_diaria").upsert({
      empresa_id:empresaId,profile_id:profileId,
      valor_diaria:cfg.valor_diaria||0,
      tipo_pagamento:configForm.tipo_pagamento,
      taxa_comissao:parseFloat(configForm.taxa_comissao)||0,
    },{onConflict:"empresa_id,profile_id"});
    setDiarias(d=>({...d,[profileId]:{
      ...(d[profileId]||{}),
      tipo_pagamento:configForm.tipo_pagamento,
      taxa_comissao:parseFloat(configForm.taxa_comissao)||0,
    }}));
    setEditandoConfig(null);
    setSavingConfig(false);
    fetchTudo(); // recarregar comissões com nova taxa
  };

  const salvarPagamento=async()=>{
    if(!form.profile_id||!form.valor)return;
    setSaving(true);
    await sb.from("folha_pagamentos").insert({
      empresa_id:empresaId,profile_id:form.profile_id,
      valor:parseFloat(form.valor),tipo:form.tipo,
      observacao:form.observacao||null,
      data_pgto:new Date().toISOString().split("T")[0],
      semana_ref:semana,
    });
    setForm({profile_id:"",valor:"",tipo:"pagamento",observacao:""});
    setShowForm(false);setSaving(false);fetchTudo();
  };

  const excluirPagamento=async(id)=>{
    if(!window.confirm("Excluir este lançamento?"))return;
    await sb.from("folha_pagamentos").delete().eq("id",id);
    fetchTudo();
  };

  const semanas=Array.from({length:5},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i*7);
    const jan1=new Date(d.getFullYear(),0,1);
    const n=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
    const key=`${d.getFullYear()}-W${String(n).padStart(2,"0")}`;
    const intervalo=semanaLabel(key);
    const label=i===0?`Esta semana (${intervalo})`:intervalo;
    return{key,label};
  });

  if(loading)return<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>;

  const pct=performance?.percentual;
  const perfColor=pct==null?"rgba(186,230,253,.4)":pct<=35?"#4ade80":pct<=50?"#fbbf24":"#f87171";
  const perfLabel=pct==null?"Sem faturamento nesta semana":pct<=35?"Operação saudável ✓":pct<=50?"Atenção: folha elevada":"Alerta: folha crítica";

  // Filtro local por nome — sem nova query ao Supabase,
  // usando os dados já carregados para máxima performance.
  const funcionariosFiltrados=funcionarios.filter(f=>
    f.name.toLowerCase().includes(searchTerm.toLowerCase())
  );

  return(
    <div style={{padding:embedded?"0":"0 0 20px"}}>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {semanas.map(({key,label})=>(
          <button key={key} onClick={()=>setSemana(key)}
            style={{flexShrink:0,padding:"6px 12px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",
              border:`1px solid ${semana===key?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,
              background:semana===key?"rgba(14,165,233,.2)":"rgba(255,255,255,.04)",
              color:semana===key?"#38bdf8":"rgba(186,230,253,.4)"}}>
            {label}
          </button>
        ))}
      </div>

      {/* Card de performance */}
      {performance&&(
        <div className="glass-card" style={{padding:14,marginBottom:14,
          borderColor:pct!=null&&pct>50?"rgba(248,113,113,.3)":pct!=null&&pct>35?"rgba(251,191,36,.3)":"rgba(125,211,252,.2)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.5)",textTransform:"uppercase",letterSpacing:".08em"}}>Custo de Pessoal</span>
            <span style={{fontSize:11,fontWeight:700,color:perfColor}}>{perfLabel}</span>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:10}}>
            <div>
              <div style={{fontSize:11,color:"rgba(186,230,253,.4)",marginBottom:2}}>Faturamento</div>
              <div style={{fontSize:17,fontWeight:900,color:"#4ade80"}}>{fmtBRL(performance.faturamento)}</div>
            </div>
            <div style={{textAlign:"center"}}>
              {pct!=null?<div style={{fontSize:28,fontWeight:900,color:perfColor}}>{pct}%</div>
              :<div style={{fontSize:13,color:"rgba(186,230,253,.3)"}}>—</div>}
              <div style={{fontSize:10,color:"rgba(186,230,253,.4)"}}>da receita</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"rgba(186,230,253,.4)",marginBottom:2}}>Folha</div>
              <div style={{fontSize:17,fontWeight:900,color:"#f87171"}}>{fmtBRL(performance.folha)}</div>
            </div>
          </div>
          {pct!=null&&(
            <div style={{height:6,borderRadius:99,background:"rgba(255,255,255,.08)",overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:99,width:`${Math.min(pct,100)}%`,
                background:`linear-gradient(90deg,#4ade80,${pct>50?"#f87171":pct>35?"#fbbf24":"#4ade80"})`,
                transition:"width .8s ease"}}/>
            </div>
          )}
        </div>
      )}

      {/* Campo de busca por funcionário */}
      <div style={{position:"relative",marginBottom:14}}>
        <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}>
          <Icon name="Search" size={15} color="rgba(186,230,253,.4)"/>
        </span>
        <input
          className="glass-input"
          value={searchTerm}
          onChange={e=>setSearchTerm(e.target.value)}
          placeholder="Buscar funcionário..."
          style={{paddingLeft:40}}
        />
      </div>

      {/* Resumo com saldo + comissão */}
      <div className="glass-card" style={{padding:16,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <span style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.5)"}}>FOLHA DA SEMANA</span>
          <span style={{fontSize:18,fontWeight:900,color:"#f87171"}}>{fmtBRL(totalSemana)}</span>
        </div>
        {funcionariosFiltrados.length===0?(
          <div style={{textAlign:"center",padding:"20px 0",color:"rgba(186,230,253,.3)"}}>
            <Icon name="Search" size={24} color="rgba(56,189,248,.2)"/>
            <div style={{fontSize:13,marginTop:8}}>Nenhum funcionário encontrado com este nome</div>
          </div>
        ):funcionariosFiltrados.map(f=>{
          const saldo=saldoPorFunc[f.id]||{totalDevido:0,totalPago:0,saldo:0,tipo:"diaria",comissao:0,totalLavagens:0};
          const dias=diasMap[f.id]||0;
          const quitado=dias>0&&saldo.saldo<=0;
          const adiantado=dias>0&&saldo.saldo<0;
          const cfg=diarias[f.id]||{};
          const tipoLabel=saldo.tipo==="comissao"?`${saldo.taxa}% comissão`:
                          saldo.tipo==="misto"?`${cfg.valor_diaria?fmtBRL(cfg.valor_diaria):"—"} + ${saldo.taxa}%`:
                          cfg.valor_diaria?fmtBRL(cfg.valor_diaria):"—";
          return(
            <div key={f.id} style={{marginBottom:14,paddingBottom:14,borderBottom:"1px solid rgba(125,211,252,.08)"}}>

              {/* ── Linha 1: Avatar + Nome + Tipo + Badge ── */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:"rgba(56,189,248,.15)",
                    border:"1px solid rgba(56,189,248,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Icon name="User" size={16} color="#38bdf8"/>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:800,color:"#e0f2fe"}}>{f.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                      {editandoDiaria===f.id?(
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <input autoFocus value={novaDiaria} onChange={e=>setNovaDiaria(e.target.value)}
                            type="number" style={{width:64,padding:"2px 6px",borderRadius:6,
                              background:"rgba(255,255,255,.1)",border:"1px solid rgba(56,189,248,.4)",
                              color:"#e0f2fe",fontSize:12}}/>
                          <button onClick={()=>salvarDiaria(f.id)}
                            style={{background:"rgba(74,222,128,.2)",border:"none",borderRadius:6,
                              padding:"3px 8px",color:"#4ade80",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
                          <button onClick={()=>setEditandoDiaria(null)}
                            style={{background:"transparent",border:"none",color:"rgba(186,230,253,.4)",fontSize:12,cursor:"pointer"}}>✕</button>
                        </div>
                      ):(
                        <button onClick={()=>{setEditandoDiaria(f.id);setNovaDiaria(cfg.valor_diaria||"");}}
                          style={{background:"transparent",border:"none",padding:0,cursor:"pointer",
                            display:"flex",alignItems:"center",gap:3}}>
                          <span style={{fontSize:11,color:"rgba(186,230,253,.45)"}}>{tipoLabel}</span>
                          <Icon name="Edit" size={9} color="rgba(186,230,253,.25)"/>
                        </button>
                      )}
                      {/* Botão de configuração — abre BottomSheet */}
                      <button onClick={()=>{
                          setConfigForm({tipo_pagamento:cfg.tipo_pagamento||"diaria",taxa_comissao:String(cfg.taxa_comissao||"")});
                          setEditandoConfig(editandoConfig===f.id?null:f.id);
                        }}
                        style={{display:"flex",alignItems:"center",gap:3,padding:"2px 8px",borderRadius:99,cursor:"pointer",
                          background:saldo.tipo!=="diaria"?"rgba(167,139,250,.15)":"rgba(255,255,255,.04)",
                          border:`1px solid ${saldo.tipo!=="diaria"?"rgba(167,139,250,.3)":"rgba(125,211,252,.1)"}`}}>
                        <Icon name="Settings" size={9} color={saldo.tipo!=="diaria"?"#a78bfa":"rgba(186,230,253,.3)"}/>
                        <span style={{fontSize:10,fontWeight:700,
                          color:saldo.tipo!=="diaria"?"#a78bfa":"rgba(186,230,253,.3)"}}>
                          {saldo.tipo==="diaria"?"+ comissão":saldo.tipo==="comissao"?"comissão":"misto"}
                        </span>
                      </button>
                    </div>
                    {/* Mini badge de comissão */}
                    {saldo.tipo!=="diaria"&&saldo.totalLavagens>0&&(
                      <div style={{display:"flex",alignItems:"center",gap:4,marginTop:3}}>
                        <Icon name="TrendingUp" size={9} color="#a78bfa"/>
                        <span style={{fontSize:10,color:"#a78bfa"}}>{saldo.totalLavagens} lavagens = {fmtBRL(saldo.comissao)}</span>
                      </div>
                    )}
                  </div>
                </div>

                {/* Badge de saldo — direita */}
                {dias>0&&(
                  quitado?(
                    <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:99,
                      background:adiantado?"rgba(56,189,248,.12)":"rgba(74,222,128,.12)",
                      border:`1px solid ${adiantado?"rgba(56,189,248,.3)":"rgba(74,222,128,.25)"}`}}>
                      <Icon name="CheckCircle" size={11} color={adiantado?"#38bdf8":"#4ade80"}/>
                      <span style={{fontSize:11,fontWeight:800,color:adiantado?"#38bdf8":"#4ade80",whiteSpace:"nowrap"}}>
                        {adiantado?`Adiantado ${fmtBRL(Math.abs(saldo.saldo))}`:"Quitado"}
                      </span>
                    </div>
                  ):(
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.4)",fontWeight:600}}>Pendente</div>
                      <div style={{fontSize:17,fontWeight:900,color:"#fbbf24"}}>{fmtBRL(saldo.saldo)}</div>
                    </div>
                  )
                )}
              </div>

              {/* ── Linha 2: Seletor +/- dias + resumo financeiro ── */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                {/* Seletor +/- minimalista */}
                {saldo.tipo!=="comissao"&&(
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <button
                      onClick={()=>dias>0&&salvarDias(f.id,dias-1)}
                      disabled={dias===0||savingDias===f.id}
                      style={{width:30,height:30,borderRadius:10,cursor:dias>0?"pointer":"not-allowed",
                        background:"rgba(255,255,255,.06)",border:"1px solid rgba(125,211,252,.15)",
                        color:dias>0?"#e0f2fe":"rgba(186,230,253,.2)",fontSize:16,fontWeight:700,
                        display:"flex",alignItems:"center",justifyContent:"center",opacity:dias===0?.4:1}}>
                      −
                    </button>
                    <div style={{textAlign:"center",minWidth:52}}>
                      {savingDias===f.id?(
                        <div className="spinner spin" style={{width:14,height:14,margin:"0 auto"}}/>
                      ):(
                        <>
                          <div style={{fontSize:18,fontWeight:900,color:"#38bdf8",lineHeight:1}}>{dias}</div>
                          <div style={{fontSize:10,color:"rgba(186,230,253,.4)",marginTop:1}}>
                            {dias===1?"dia":"dias"}
                          </div>
                        </>
                      )}
                    </div>
                    <button
                      onClick={()=>dias<7&&salvarDias(f.id,dias+1)}
                      disabled={dias===7||savingDias===f.id}
                      style={{width:30,height:30,borderRadius:10,cursor:dias<7?"pointer":"not-allowed",
                        background:"rgba(255,255,255,.06)",border:"1px solid rgba(125,211,252,.15)",
                        color:dias<7?"#e0f2fe":"rgba(186,230,253,.2)",fontSize:16,fontWeight:700,
                        display:"flex",alignItems:"center",justifyContent:"center",opacity:dias===7?.4:1}}>
                      +
                    </button>
                  </div>

                {/* Mini-grade financeira */}
                {dias>0&&(
                  <div style={{display:"flex",gap:14,marginLeft:"auto"}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.4)",fontWeight:600,marginBottom:1}}>A receber</div>

                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.4)",fontWeight:600,marginBottom:1}}>Pago</div>

                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.4)",fontWeight:600,marginBottom:1}}>A receber</div>
                      <div style={{fontSize:13,fontWeight:800,color:"rgba(186,230,253,.7)"}}>{fmtBRL(saldo.totalDevido)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:10,color:"rgba(186,230,253,.4)",fontWeight:600,marginBottom:1}}>Pago</div>
                      <div style={{fontSize:13,fontWeight:800,color:"#f87171"}}>{fmtBRL(saldo.totalPago)}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── BottomSheet de configuração de remuneração ── */}
      {editandoConfig&&(
        <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
          onClick={()=>setEditandoConfig(null)}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)"}}/>
          <div onClick={e=>e.stopPropagation()}
            style={{position:"relative",background:"linear-gradient(180deg,#0f1f38,#0c1a2e)",
              borderRadius:"24px 24px 0 0",padding:24,
              border:"1px solid rgba(125,211,252,.15)",borderBottom:"none",
              boxShadow:"0 -20px 60px rgba(0,0,0,.5)"}}>
            {/* Handle */}
            <div style={{width:40,height:4,borderRadius:99,background:"rgba(125,211,252,.2)",margin:"0 auto 20px"}}/>
            <div style={{fontSize:15,fontWeight:800,color:"#e0f2fe",marginBottom:4}}>
              Tipo de Remuneração
            </div>
            <div style={{fontSize:12,color:"rgba(186,230,253,.4)",marginBottom:20}}>
              {funcionarios.find(f=>f.id===editandoConfig)?.name}
            </div>
            {/* Tipo */}
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              {[["diaria","📅 Diária","Valor fixo por dia"],
                ["comissao","💹 Comissão","% por lavagem"],
                ["misto","🔀 Misto","Diária + %"]].map(([k,l,sub])=>(
                <button key={k} onClick={()=>setConfigForm(p=>({...p,tipo_pagamento:k}))}
                  style={{flex:1,padding:"12px 6px",borderRadius:14,cursor:"pointer",
                    border:`1.5px solid ${configForm.tipo_pagamento===k?"rgba(167,139,250,.6)":"rgba(125,211,252,.12)"}`,
                    background:configForm.tipo_pagamento===k?"rgba(167,139,250,.2)":"rgba(255,255,255,.04)"}}>
                  <div style={{fontSize:13,fontWeight:800,
                    color:configForm.tipo_pagamento===k?"#a78bfa":"#e0f2fe",marginBottom:3}}>{l}</div>
                  <div style={{fontSize:10,color:"rgba(186,230,253,.35)"}}>{sub}</div>
                </button>
              ))}
            </div>
            {/* Taxa */}
            {configForm.tipo_pagamento!=="diaria"&&(
              <div style={{marginBottom:20}}>
                <label className="lbl">Taxa de Comissão</label>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <input value={configForm.taxa_comissao}
                    onChange={e=>setConfigForm(p=>({...p,taxa_comissao:e.target.value}))}
                    type="number" placeholder="10" min="0" max="100" className="glass-input"
                    style={{flex:1}}/>
                  <span style={{fontSize:14,fontWeight:700,color:"rgba(186,230,253,.5)",whiteSpace:"nowrap"}}>
                    % / lavagem
                  </span>
                </div>
                {(()=>{
                  const func=funcionarios.find(f=>f.id===editandoConfig);
                  const s=func?saldoPorFunc[func.id]:null;
                  if(!s||s.totalLavagens===0)return null;
                  const est=comissoes[func.id]?.valor_base*(parseFloat(configForm.taxa_comissao)||0)/100||0;
                  return(
                    <div style={{marginTop:8,fontSize:11,color:"rgba(186,230,253,.4)"}}>
                      {s.totalLavagens} lavagens esta semana → comissão estimada{" "}
                      <b style={{color:"#a78bfa"}}>{fmtBRL(est)}</b>
                    </div>
                  );
                })()}
              </div>
            )}
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setEditandoConfig(null)}
                style={{flex:1,padding:"14px 0",borderRadius:16,cursor:"pointer",fontWeight:700,fontSize:14,
                  background:"rgba(255,255,255,.04)",border:"1px solid rgba(125,211,252,.15)",color:"rgba(186,230,253,.4)"}}>
                Cancelar
              </button>
              <button onClick={()=>salvarConfig(editandoConfig)} disabled={savingConfig}
                style={{flex:2,padding:"14px 0",borderRadius:16,cursor:"pointer",fontWeight:800,fontSize:14,
                  background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",color:"#fff",
                  boxShadow:"0 6px 20px rgba(124,58,237,.4)",opacity:savingConfig?.6:1}}>
                {savingConfig?<div className="spinner spin" style={{width:16,height:16,margin:"0 auto"}}/>:"Salvar"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Botão novo lançamento */}
      <button onClick={()=>{
          if(!showForm)setForm({profile_id:funcionarios[0]?.id||"",valor:String(diarias[funcionarios[0]?.id]?.valor_diaria||""),tipo:"pagamento",observacao:""});
          setShowForm(v=>!v);
        }} className="btn-glow" style={{marginBottom:14}}>
        <Icon name="Plus" size={16} color="#fff"/>
        {showForm?"Cancelar":"Registrar Pagamento"}
      </button>

      {showForm&&(
        <div className="glass-card" style={{padding:16,marginBottom:14}}>
          <div style={{marginBottom:10}}>
            <label className="lbl">Funcionário</label>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {funcionarios.map(f=>(
                <button key={f.id} onClick={()=>setForm(p=>({...p,profile_id:f.id,valor:String(diarias[f.id]?.valor_diaria||p.valor)}))}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:12,cursor:"pointer",
                    border:`1.5px solid ${form.profile_id===f.id?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,
                    background:form.profile_id===f.id?"rgba(14,165,233,.15)":"rgba(255,255,255,.04)",
                    color:form.profile_id===f.id?"#38bdf8":"rgba(186,230,253,.7)",fontWeight:form.profile_id===f.id?700:500,fontSize:13}}>
                  <span>{f.name}</span>
                  {diarias[f.id]?.valor_diaria&&<span style={{fontSize:11,color:"rgba(186,230,253,.4)"}}>diária {fmtBRL(diarias[f.id].valor_diaria)}</span>}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {[["pagamento","💰 Pagamento"],["adiantamento","⚡ Adiantamento"]].map(([k,l])=>(
              <button key={k} onClick={()=>setForm(p=>({...p,tipo:k}))}
                style={{flex:1,padding:"9px 0",borderRadius:12,cursor:"pointer",fontSize:12,fontWeight:700,
                  border:`1.5px solid ${form.tipo===k?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,
                  background:form.tipo===k?"rgba(14,165,233,.2)":"rgba(255,255,255,.04)",
                  color:form.tipo===k?"#38bdf8":"rgba(186,230,253,.4)"}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{marginBottom:10}}>
            <label className="lbl">Valor (R$)</label>
            <input className="glass-input" type="number" value={form.valor}
              onChange={e=>setForm(p=>({...p,valor:e.target.value}))} placeholder="0,00"/>
          </div>
          <div style={{marginBottom:14}}>
            <label className="lbl">Observação (opcional)</label>
            <input className="glass-input" type="text" value={form.observacao}
              onChange={e=>setForm(p=>({...p,observacao:e.target.value}))} placeholder="ex: semana completa, adiantamento..."/>
          </div>
          <button onClick={salvarPagamento} disabled={saving||!form.profile_id||!form.valor}
            className="btn-glow" style={{opacity:(!form.profile_id||!form.valor)?.5:1}}>
            {saving?<div className="spinner spin"/>:<><Icon name="CheckCircle" size={15} color="#fff"/> Confirmar Pagamento</>}
          </button>
        </div>
      )}

      {pagamentos.length>0&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>
            Lançamentos — {semanaLabel(semana)}
          </div>
          {pagamentos.map(p=>{
            const func=funcionarios.find(f=>f.id===p.profile_id);
            const isAdiant=p.tipo==="adiantamento";
            return(
              <div key={p.id} className="glass-card" style={{marginBottom:8,padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:32,height:32,borderRadius:10,background:isAdiant?"rgba(251,191,36,.15)":"rgba(248,113,113,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <Icon name={isAdiant?"Zap":"DollarSign"} size={14} color={isAdiant?"#fbbf24":"#f87171"}/>
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:"#e0f2fe"}}>{func?.name||"—"}</div>
                      <div style={{fontSize:11,color:"rgba(186,230,253,.4)"}}>
                        {isAdiant?"Adiantamento":"Pagamento"}{p.observacao&&` · ${p.observacao}`}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:15,fontWeight:900,color:"#f87171"}}>{fmtBRL(p.valor)}</span>
                    <button onClick={()=>excluirPagamento(p.id)}
                      style={{background:"transparent",border:"none",cursor:"pointer",padding:4,opacity:.5}}>
                      <Icon name="Trash2" size={14} color="#f87171"/>
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {pagamentos.length===0&&!showForm&&(
        <div style={{textAlign:"center",padding:"30px 0",color:"rgba(186,230,253,.3)"}}>
          <Icon name="DollarSign" size={32} color="rgba(56,189,248,.2)"/>
          <div style={{fontSize:13,marginTop:10}}>Nenhum pagamento registrado nesta semana</div>
        </div>
      )}
    </div>
  );
}


function RelatoriosScreen({empresaId,embedded}){
  const [periodo,setPeriodo]=useState("semana");
  const [movs,setMovs]=useState([]);
  const [hist,setHist]=useState([]);
  const [histAll,setHistAll]=useState([]); // histórico completo para comparativo mensal
  const [folhaTotal,setFolhaTotal]=useState(0);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setLoading(true);
    const dias=periodo==="dia"?1:periodo==="semana"?7:30;
    const desde=new Date(Date.now()-dias*86400000).toISOString().split("T")[0];
    const desdeISO=new Date(Date.now()-dias*86400000).toISOString();
    Promise.all([
      sb.from('caixa_movimentos').select('tipo,categoria,valor,data').eq('empresa_id',empresaId).gte('data',desde).order('data'),
      sb.from('historico').select('type,value,completed_at,forma_pagamento').eq('empresa_id',empresaId).gte('completed_at',desdeISO).order('completed_at'),
      sb.from('folha_pagamentos').select('valor').eq('empresa_id',empresaId).gte('data_pgto',desde),
    ]).then(([{data:m},{data:h},{data:f}])=>{
      setMovs(m||[]);
      setHist(h||[]);
      setFolhaTotal((f||[]).reduce((s,p)=>s+(parseFloat(p.valor)||0),0));
      setLoading(false);
    });
  },[empresaId,periodo]);

  // Busca histórico completo (todos os meses) para comparativo — roda uma só vez
  useEffect(()=>{
    sb.from('historico').select('value,completed_at')
      .eq('empresa_id',empresaId)
      .order('completed_at',{ascending:true})
      .then(({data})=>setHistAll(data||[]));
  },[empresaId]);

  const entradas=movs.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saidas=movs.filter(m=>m.tipo==="saida").reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
  const saldo=entradas-saidas;
  const totalAtend=hist.length;

  // ── Métricas avançadas via useMemo ─────────────────────────────────────

  // Ticket médio: receita total / número de carros lavados
  const ticketMedio=useMemo(()=>{
    const receita=hist.reduce((s,h)=>s+(parseFloat(h.value)||0),0);
    return hist.length>0?receita/hist.length:0;
  },[hist]);

  // Quebra por forma de pagamento
  const pgtoBreakdown=useMemo(()=>{
    const totalReceitaHist=hist.reduce((s,h)=>s+(parseFloat(h.value)||0),0);
    const grupos={pix:0,cartao:0,dinheiro:0,sem_info:0};
    hist.forEach(h=>{
      const k=h.forma_pagamento||"sem_info";
      grupos[k]=(grupos[k]||0)+(parseFloat(h.value)||0);
    });
    return[
      {id:"pix",     label:"Pix",         color:"#4ade80", valor:grupos.pix,     pct:totalReceitaHist?Math.round(grupos.pix/totalReceitaHist*100):0},
      {id:"cartao",  label:"Cartão",       color:"#38bdf8", valor:grupos.cartao,  pct:totalReceitaHist?Math.round(grupos.cartao/totalReceitaHist*100):0},
      {id:"dinheiro",label:"Dinheiro",     color:"#fbbf24", valor:grupos.dinheiro,pct:totalReceitaHist?Math.round(grupos.dinheiro/totalReceitaHist*100):0},
      {id:"sem_info",label:"Não informado",color:"rgba(186,230,253,.3)",valor:grupos.sem_info,pct:totalReceitaHist?Math.round(grupos.sem_info/totalReceitaHist*100):0},
    ].filter(g=>g.valor>0);
  },[hist]);

  // Lucro líquido estimado = faturamento bruto - custos folha
  const receitaBruta=hist.reduce((s,h)=>s+(parseFloat(h.value)||0),0);
  const lucroLiquido=receitaBruta-folhaTotal;
  const margemLiquida=receitaBruta>0?Math.round(lucroLiquido/receitaBruta*100):null;

  // ── Visão Anual — 12 meses resiliente a dados nulos ──────────────────
  const anoAtual=new Date().getFullYear();
  const NOMES_MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
    "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  const visaoAnual=useMemo(()=>{
    // Base: 12 meses zerados
    const base=NOMES_MESES.map((nome,i)=>({mes:i+1,nome,fat:0,gastos:0}));
    // Merge faturamento do historico
    histAll.forEach(h=>{
      if(!h.completed_at)return;
      const d=new Date(h.completed_at);
      if(d.getFullYear()!==anoAtual)return;
      const m=d.getMonth(); // 0-indexed
      base[m].fat+=(parseFloat(h.value)||0);
    });
    // Merge gastos do caixa_movimentos (via movs do periodo atual não cobre o ano todo,
    // por isso usamos o histAll de movimentos se disponível — aqui estimamos via folha)
    return base.map(m=>({...m,lucro:m.fat-m.gastos}));
  },[histAll,anoAtual]);

  const maxFat=Math.max(...visaoAnual.map(m=>m.fat),1);
  const campeao=visaoAnual.reduce((a,b)=>b.fat>a.fat?b:a,visaoAnual[0]);
  const mesesComDados=visaoAnual.filter(m=>m.fat>0).length;
  const totalAnual=visaoAnual.reduce((s,m)=>s+m.fat,0);

  const hoje=new Date();
  let chartData;
  if(periodo==="dia"){
    const key=hoje.toISOString().split("T")[0];
    const v=movs.filter(m=>m.tipo==="entrada"&&m.data===key).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
    chartData=[{l:"Hoje",v}];
  }else if(periodo==="semana"){
    chartData=[6,5,4,3,2,1,0].map(d=>{
      const dt=new Date(hoje);dt.setDate(dt.getDate()-d);
      const key=dt.toISOString().split("T")[0];
      const v=movs.filter(m=>m.tipo==="entrada"&&m.data===key).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
      return{l:["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dt.getDay()],v};
    });
  }else{
    const semanas=[];
    for(let w=4;w>=0;w--){
      const fim=new Date(hoje);fim.setDate(fim.getDate()-w*7);
      const inicio=new Date(fim);inicio.setDate(inicio.getDate()-6);
      const inicioKey=inicio.toISOString().split("T")[0];
      const fimKey=fim.toISOString().split("T")[0];
      const v=movs.filter(m=>m.tipo==="entrada"&&m.data>=inicioKey&&m.data<=fimKey).reduce((s,m)=>s+(parseFloat(m.valor)||0),0);
      semanas.push({l:`${inicio.getDate()}/${inicio.getMonth()+1}`,v});
    }
    chartData=semanas;
  }

  const catMap={};
  movs.filter(m=>m.tipo==="entrada").forEach(m=>{catMap[m.categoria]=(catMap[m.categoria]||0)+(parseFloat(m.valor)||0);});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const svcMap={};
  hist.forEach(h=>{svcMap[h.type]=(svcMap[h.type]||0)+1;});
  const svcs=Object.entries(svcMap).sort((a,b)=>b[1]-a[1]);

  return(
    <div className={embedded?"":"scroll screen-enter"}>
      {/* Período */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["dia","Hoje"],["semana","7 dias"],["mes","30 dias"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriodo(k)}
            style={{flex:1,padding:"9px 0",borderRadius:12,border:`1.5px solid ${periodo===k?"rgba(14,165,233,.6)":"rgba(125,211,252,.15)"}`,background:periodo===k?"rgba(14,165,233,.2)":"rgba(255,255,255,.04)",color:periodo===k?"#38bdf8":"rgba(186,230,253,.5)",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>

      {loading?<div style={{display:"flex",justifyContent:"center",padding:40}}><div className="spinner spin"/></div>:(
        <>
          {/* KPIs base */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[
              {l:"Receita",v:fmtBRL(entradas),c:"#4ade80",icon:"TrendingUp"},
              {l:"Despesas",v:fmtBRL(saidas),c:"#f87171",icon:"MinusCircle"},
              {l:"Saldo",v:fmtBRL(saldo),c:saldo>=0?"#38bdf8":"#f87171",icon:"Wallet"},
              {l:"Atendimentos",v:totalAtend,c:"#a78bfa",icon:"Car"},
            ].map(k=>(
              <div key={k.l} className="glass-card" style={{padding:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:11,color:"rgba(186,230,253,.5)",fontWeight:600}}>{k.l}</span>
                  <Icon name={k.icon} size={13} color={k.c}/>
                </div>
                <div style={{fontSize:17,fontWeight:900,color:k.c}}>{k.v}</div>
              </div>
            ))}
          </div>

          {/* ── Ticket médio + Lucro Líquido ── */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            <div className="glass-card" style={{padding:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"rgba(186,230,253,.5)",fontWeight:600}}>Ticket Médio</span>
                <Icon name="Tag" size={13} color="#fbbf24"/>
              </div>
              <div style={{fontSize:20,fontWeight:900,color:"#fbbf24"}}>{fmtBRL(ticketMedio)}</div>
              <div style={{fontSize:10,color:"rgba(186,230,253,.35)",marginTop:4}}>receita ÷ {totalAtend} carro{totalAtend!==1?"s":""}</div>
            </div>
            <div className="glass-card" style={{padding:14,
              background:lucroLiquido>=0?"rgba(74,222,128,.06)":"rgba(248,113,113,.06)",
              borderColor:lucroLiquido>=0?"rgba(74,222,128,.2)":"rgba(248,113,113,.2)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"rgba(186,230,253,.5)",fontWeight:600}}>Lucro Líquido</span>
                <Icon name="DollarSign" size={13} color={lucroLiquido>=0?"#4ade80":"#f87171"}/>
              </div>
              <div style={{fontSize:17,fontWeight:900,color:lucroLiquido>=0?"#4ade80":"#f87171"}}>{fmtBRL(lucroLiquido)}</div>
              {margemLiquida!=null&&(
                <div style={{fontSize:10,color:"rgba(186,230,253,.35)",marginTop:4}}>
                  margem {margemLiquida}% · folha {fmtBRL(folhaTotal)}
                </div>
              )}
            </div>
          </div>

          {/* ── Quebra por forma de pagamento ── */}
          {pgtoBreakdown.length>0&&(
            <div className="glass-card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:14}}>
                💳 Métodos de Pagamento
              </div>
              {/* Barra empilhada */}
              <div style={{display:"flex",height:10,borderRadius:99,overflow:"hidden",marginBottom:14,gap:2}}>
                {pgtoBreakdown.map(g=>(
                  <div key={g.id} style={{width:`${g.pct}%`,background:g.color,borderRadius:99,transition:"width .6s ease"}}/>
                ))}
              </div>
              {pgtoBreakdown.map(g=>(
                <div key={g.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:10,height:10,borderRadius:99,background:g.color,flexShrink:0}}/>
                    <span style={{fontSize:13,color:"#e0f2fe",fontWeight:600}}>{g.label}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:13,fontWeight:800,color:g.color}}>{g.pct}%</span>
                    <span style={{fontSize:11,color:"rgba(186,230,253,.4)",marginLeft:8}}>{fmtBRL(g.valor)}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Gráfico de receita */}
          <div className="glass-card" style={{padding:16,marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:12}}>
              📊 Receita {periodo==="dia"?"de Hoje":periodo==="semana"?"por Dia (últimos 7 dias)":"por Semana (últimos 30 dias)"}
            </div>
            <BarChart data={chartData} color="#0ea5e9" height={100}/>
          </div>

          {/* ── Visão Anual ── */}
          <div className="glass-card" style={{padding:16,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)"}}>
                📅 Faturamento Anual {anoAtual}
              </div>
              <div style={{fontSize:10,color:"rgba(186,230,253,.3)",fontWeight:600}}>
                {mesesComDados}/{NOMES_MESES.length} meses com dados
              </div>
            </div>

            {/* Lista dos 12 meses */}
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
              {visaoAnual.map(m=>{
                const temDados=m.fat>0;
                const barW=Math.round((m.fat/maxFat)*100);
                const isCampeao=temDados&&m.fat===campeao.fat;
                return(
                  <div key={m.mes} style={{padding:"10px 12px",borderRadius:12,
                    background:isCampeao?"rgba(251,191,36,.08)":"rgba(255,255,255,.03)",
                    border:`1px solid ${isCampeao?"rgba(251,191,36,.25)":"rgba(125,211,252,.08)"}`,
                    opacity:temDados?1:.55}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:temDados?6:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        {isCampeao&&<span style={{fontSize:11}}>🏆</span>}
                        <span style={{fontSize:12,fontWeight:700,
                          color:isCampeao?"#fbbf24":temDados?"#e0f2fe":"rgba(186,230,253,.3)",
                          minWidth:80}}>{m.nome}</span>
                      </div>
                      <div style={{display:"flex",gap:12,alignItems:"center"}}>
                        <span style={{fontSize:12,fontWeight:800,
                          color:temDados?"#4ade80":"rgba(186,230,253,.2)"}}>
                          {temDados?fmtBRL(m.fat):"—"}
                        </span>
                        {m.gastos>0&&(
                          <span style={{fontSize:11,color:"#f87171"}}>
                            -{fmtBRL(m.gastos)}
                          </span>
                        )}
                      </div>
                    </div>
                    {temDados&&(
                      <div style={{height:4,borderRadius:99,background:"rgba(255,255,255,.06)",overflow:"hidden"}}>
                        <div style={{height:"100%",borderRadius:99,
                          width:`${barW}%`,
                          background:isCampeao
                            ?"linear-gradient(90deg,#fbbf24,#f59e0b)"
                            :"linear-gradient(90deg,#0ea5e9,#38bdf8)",
                          transition:"width .6s ease"}}/>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Total anual */}
            {totalAnual>0&&(
              <div style={{padding:"10px 14px",borderRadius:12,marginBottom:14,
                background:"rgba(14,165,233,.08)",border:"1px solid rgba(14,165,233,.2)",
                display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.5)"}}>
                  TOTAL {anoAtual}
                </span>
                <span style={{fontSize:16,fontWeight:900,color:"#38bdf8"}}>
                  {fmtBRL(totalAnual)}
                </span>
              </div>
            )}

            {/* 💡 Inteligência de Mercado */}
            <div style={{padding:"12px 14px",borderRadius:14,
              background:"rgba(167,139,250,.07)",border:"1px solid rgba(167,139,250,.15)"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:8}}>
                💡 Inteligência de Mercado
              </div>
              {campeao.fat>0?(
                <div style={{fontSize:12,color:"rgba(186,230,253,.6)",lineHeight:1.6,marginBottom:8}}>
                  🔥 <b style={{color:"#fbbf24"}}>{campeao.nome}</b> é o seu mês recorde atual com{" "}
                  <b style={{color:"#4ade80"}}>{fmtBRL(campeao.fat)}</b> faturados.
                </div>
              ):(
                <div style={{fontSize:12,color:"rgba(186,230,253,.4)",lineHeight:1.6,marginBottom:8}}>
                  Registre seus primeiros atendimentos para ver o campeão do ano.
                </div>
              )}
              <div style={{fontSize:11,color:"rgba(186,230,253,.4)",lineHeight:1.6,
                padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,.04)"}}>
                {mesesComDados<3
                  ?"📊 Conforme você registrar os próximos meses, o sistema identificará automaticamente os períodos de alta e baixa do seu pátio para ajudar a prever sua receita."
                  :mesesComDados<6
                    ?"📈 Você já tem dados suficientes para começar a perceber tendências. Continue registrando para uma análise de sazonalidade mais precisa."
                    :"✅ Você já tem um histórico sólido! Use esses dados para planejar promoções nos meses mais fracos e reforçar o estoque nos meses de pico."}
              </div>
            </div>
          </div>

          {/* Serviços mais realizados */}
          {svcs.length>0&&(
            <div className="glass-card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:12}}>🏆 Serviços Mais Realizados</div>
              {svcs.map(([nome,qtd],i)=>(
                <div key={nome} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:22,height:22,borderRadius:6,background:"rgba(14,165,233,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:11,fontWeight:800,color:"#38bdf8"}}>{i+1}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:13,color:"#e0f2fe",fontWeight:600}}>{nome}</span>
                      <span style={{fontSize:12,color:"#38bdf8",fontWeight:700}}>{qtd}x</span>
                    </div>
                    <div className="progress-bar">
                      <div className="progress-fill" style={{width:`${(qtd/svcs[0][1])*100}%`,background:"linear-gradient(90deg,#0ea5e9,#38bdf8)"}}/>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Por categoria financeira */}
          {cats.length>0&&(
            <div className="glass-card" style={{padding:16,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:"rgba(186,230,253,.6)",marginBottom:12}}>💰 Receita por Categoria</div>
              {cats.map(([cat,val])=>(
                <div key={cat} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:13,color:"rgba(186,230,253,.7)",textTransform:"capitalize"}}>{cat.replace("_"," ")}</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#4ade80"}}>{fmtBRL(val)}</span>
                </div>
              ))}
            </div>
          )}

          {cats.length===0&&svcs.length===0&&(
            <div style={{textAlign:"center",color:"rgba(186,230,253,.3)",padding:"30px 0",fontSize:13}}>Nenhum dado no período selecionado</div>
          )}
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   SUPPORT SCREEN
══════════════════════════════════════════════════════════════════════════ */
function SupportScreen({embedded}){
  const [open,setOpen]=useState(null);
  const [form,setForm]=useState({name:"",msg:""});
  const [sent,setSent]=useState(false);
  const send=()=>{if(!form.name||!form.msg)return;setSent(true);setTimeout(()=>{setSent(false);setForm({name:"",msg:""});},3000);};
  return(
    <div className={embedded?"":"scroll screen-enter"}>
      <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Perguntas Frequentes</div>
      <div style={{marginBottom:20}}>
        {FAQ.map((item,i)=>(
          <div key={i} className="glass-card" style={{marginBottom:8}}>
            <button onClick={()=>setOpen(open===i?null:i)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
              <span style={{color:"#bae6fd",fontWeight:600,fontSize:14,flex:1,paddingRight:8}}>{item.q}</span>
              <Icon name={open===i?"ChevronUp":"ChevronDown"} size={14} color="rgba(186,230,253,.4)"/>
            </button>
            {open===i&&<div style={{padding:"0 16px 14px",paddingTop:12,color:"rgba(186,230,253,.6)",fontSize:13,lineHeight:1.65,borderTop:"1px solid rgba(125,211,252,.1)"}}>{item.a}</div>}
          </div>
        ))}
      </div>
      <div style={{fontSize:11,fontWeight:700,color:"rgba(186,230,253,.4)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>Contato / Suporte</div>
      <div className="glass-card" style={{padding:16}}>
        <input className="glass-input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Seu nome" style={{marginBottom:10}}/>
        <textarea className="glass-input" value={form.msg} onChange={e=>setForm(f=>({...f,msg:e.target.value}))} placeholder="Descreva sua dúvida..." rows={3} style={{marginBottom:10,resize:"none"}}/>
        <button className="btn-glow" onClick={send} style={{background:sent?"linear-gradient(135deg,#16a34a,#15803d)":undefined}}>
          {sent?<><Icon name="Check" size={15} color="#fff"/> Enviado!</>:<><Icon name="Send" size={15} color="#fff"/> Enviar Mensagem</>}
        </button>
      </div>
      <div style={{textAlign:"center",color:"rgba(186,230,253,.25)",fontSize:11,marginTop:20}}>Lava Rápido SaaS v3.0.0</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════════════════════════════════ */
function App(){
  const [session,setSession]=useState(undefined);
  const [profile,setProfile]=useState(null);
  const [empresa,setEmpresa]=useState(null);
  const [assInfo,setAssInfo]=useState(null);
  const [tab,setTab]=useState("home");
  const [toast,setToast]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [weekWeather,setWeekWeather]=useState(null);
  const [showWeeklyPopup,setShowWeeklyPopup]=useState(false);
  const [showSupport,setShowSupport]=useState(false);
  const [crmBadge,setCrmBadge]=useState(0);

  // Badge CRM — mesma lógica do CRMScreen usando clienteEstaAtivoHoje
  useEffect(()=>{
    if(!profile?.empresa_id||profile.role==="master")return;
    const hoje=new Date().toISOString().split('T')[0];
    Promise.all([
      sb.from("historico").select("phone,plate,completed_at,cliente_recuperado")
        .eq("empresa_id",profile.empresa_id).order("completed_at",{ascending:false}),
      sb.from("ordens_servico").select("plate,phone")
        .eq("empresa_id",profile.empresa_id).neq("status","Concluído"),
      sb.from("historico").select("plate,phone,completed_at")
        .eq("empresa_id",profile.empresa_id).gte("completed_at",hoje+"T00:00:00"),
    ]).then(([{data:h},{data:fila},{data:hj}])=>{
      if(!h)return;
      const map={};
      h.forEach(r=>{if(!map[r.phone]||new Date(r.completed_at)>new Date(map[r.phone].completed_at))map[r.phone]=r;});
      const count=Object.values(map).filter(r=>{
        if(daysSince(r.completed_at)<30)return false;
        if(r.cliente_recuperado===true)return false;
        if(clienteEstaAtivoHoje(r.phone,r.plate,fila||[],hj||[]))return false;
        return true;
      }).length;
      setCrmBadge(count);
    });
  },[profile]);

  // Mostra o popup de resumo semanal uma vez por dia, por empresa — a
  // chave do localStorage inclui o empresa_id porque, sem isso, trocar de
  // conta no mesmo navegador (ex: o master testando múltiplas empresas)
  // faria o app pensar "já mostrei hoje" mesmo sendo uma empresa diferente,
  // já que o localStorage é vinculado ao navegador, não à conta logada.
  useEffect(()=>{
    if(!weekWeather||!profile?.empresa_id)return;
    const hoje=new Date().toISOString().split("T")[0];
    const chave=`weeklyWeatherPopupDate_${profile.empresa_id}`;
    const ultimaVez=localStorage.getItem(chave);
    if(ultimaVez!==hoje){
      setShowWeeklyPopup(true);
      localStorage.setItem(chave,hoje);
    }
  },[weekWeather,profile]);

  // Auth listener
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      setAuthReady(true);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{
      setSession(s);
      if(!s){setProfile(null);setAssInfo(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load profile + assinatura after session
  useEffect(()=>{
    if(!session)return;
    (async()=>{
      // Tentar buscar perfil com retry (RLS pode demorar após signup)
      let prof=null;
      for(let i=0;i<3;i++){
        const{data,error}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        if(data){prof=data;break;}
        await new Promise(r=>setTimeout(r,600));
      }
      // Se ainda null, criar profile básico via upsert
      if(!prof){
        const{data:upserted}=await sb.from('profiles').upsert({
          id:session.user.id,
          name:session.user.user_metadata?.name||session.user.email?.split('@')[0]||'Usuário',
          role:session.user.user_metadata?.role||'owner',
          empresa_id:null
        },{onConflict:'id'}).select().single();
        prof=upserted;
      }
      setProfile(prof||{id:session.user.id,name:session.user.email?.split('@')[0]||'Usuário',role:'owner',empresa_id:null});
      if(prof?.empresa_id){
        const[{data:ass},{data:emp}]=await Promise.all([
          sb.rpc('fn_assinatura_valida',{p_empresa_id:prof.empresa_id}),
          sb.from('empresas').select('id,nome_fantasia,telefone').eq('id',prof.empresa_id).single(),
        ]);
        setAssInfo(ass);
        setEmpresa(emp);
      }
    })();
  },[session]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};
  const logout=async()=>{await sb.auth.signOut();setTab("home");};

  // Loading state
  if(!authReady||session===undefined){
    return(
      <div style={{height:"var(--app-height)",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        <AquaBg/>
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div style={{width:72,height:72,borderRadius:24,background:"rgba(14,165,233,.2)",border:"2px solid rgba(56,189,248,.4)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
            <Icon name="Droplets" size={36} color="#38bdf8"/>
          </div>
          <div className="spinner spin" style={{margin:"0 auto",width:28,height:28,borderWidth:3}}/>
        </div>
      </div>
    );
  }

  if(!session) return <LoginScreen onLogin={s=>setSession(s)}/>;

  // Profile ainda carregando
  if(!profile){
    return(
      <div style={{height:"var(--app-height)",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
        <AquaBg/>
        <div style={{position:"relative",zIndex:1,textAlign:"center"}}>
          <div className="spinner spin" style={{margin:"0 auto",width:28,height:28,borderWidth:3}}/>
          <div style={{color:"rgba(186,230,253,.6)",marginTop:16,fontSize:14}}>Carregando perfil...</div>
        </div>
      </div>
    );
  }

  // Master → painel da plataforma
  if(profile.role==="master"){
    return(
      <div style={{height:"var(--app-height)",width:"100%",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
        <AquaBg/>
        <div className="glass" style={{padding:"env(safe-area-inset-top,12px) 16px 12px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:10,borderTop:"none",borderLeft:"none",borderRight:"none",borderRadius:0}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:22,height:22,borderRadius:7,background:"rgba(251,191,36,.2)",border:"1px solid rgba(251,191,36,.4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon name="Crown" size={12} color="#fbbf24"/>
              </div>
              <span style={{color:"#e0f2fe",fontWeight:900,fontSize:18}}>Admin Master</span>
            </div>
            <div style={{color:"rgba(186,230,253,.5)",fontSize:12,marginTop:2}}>{profile.name} · Plataforma</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#d97706)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(245,158,11,.4)"}}>
              <Icon name="Crown" size={17} color="#fff"/>
            </div>
            <button onClick={logout} style={{width:36,height:36,borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              <Icon name="LogOut" size={15} color="#f87171"/>
            </button>
          </div>
        </div>
        <div style={{flex:"1 1 auto",minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",zIndex:5}}>
          <MasterScreen/>
        </div>
      </div>
    );
  }

  // Sem empresa → cadastro
  if(!profile.empresa_id){
    return <CadastroEmpresaScreen user={session.user} onComplete={async()=>{
      // Retry com até 5 tentativas aguardando propagação do RLS
      let prof=null;
      for(let i=0;i<5;i++){
        await new Promise(r=>setTimeout(r,900));
        const{data}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        if(data?.empresa_id){prof=data;break;}
      }
      if(prof){
        setProfile(prof);
        const{data:ass}=await sb.rpc('fn_assinatura_valida',{p_empresa_id:prof.empresa_id});
        setAssInfo(ass);
      } else {
        // Último recurso: forçar refresh da sessão
        await sb.auth.refreshSession();
        window.location.reload();
      }
    }}/>;
  }

  // Assinatura inválida
  if(assInfo&&!assInfo.valida){
    return <AssinaturaScreen info={assInfo} onLogout={logout}/>;
  }

  const isOwner=profile.role==="owner";
  const planoApp=assInfo?.plano||empresa?.plano||"trial";
  const ALL_TABS=[
    {id:"home",    label:"Fila",      icon:"Home",     roles:["owner","employee"]},
    {id:"new",     label:"Nova",      icon:"Plus",     roles:["owner","employee"]},
    {id:"crm",     label:"CRM",       icon:"Users",    roles:["owner"]},
    {id:"history", label:"Histórico", icon:"History",  roles:["owner","employee"]},
    {id:"config",  label:"Config",    icon:"Settings", roles:["owner"]},
  ];
  const TABS=ALL_TABS.filter(t=>t.roles.includes(profile.role));
  const TITLES={home:"Fila de Lavagem",new:"Nova Lavagem",crm:"CRM / Fidelização",history:"Histórico",config:"Configurações"};
  const safeTab=TABS.find(t=>t.id===tab)?tab:"home";

  // Trial banner
  const showTrialBanner=assInfo?.status==="trial"&&(assInfo?.dias_restantes<=7);

  return(
    <div style={{height:"var(--app-height)",width:"100%",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <AquaBg/>

      {/* Área superior: clima + trial — espaçamento próprio, separado visualmente do header */}
      <div style={{flexShrink:0,position:"relative",zIndex:15,paddingTop:"env(safe-area-inset-top,10px)"}}>
        <WeatherBanner onWeekForecast={setWeekWeather}/>
        {showTrialBanner&&<div style={{background:"rgba(251,191,36,.15)",border:"1px solid rgba(251,191,36,.25)",borderRadius:14,padding:"8px 16px",display:"flex",alignItems:"center",gap:8,margin:"8px 14px 0"}}>
          <Icon name="AlertTriangle" size={14} color="#fbbf24"/>
          <span style={{fontSize:12,color:"#fbbf24",fontWeight:600}}>Trial expira em {assInfo.dias_restantes} dia{assInfo.dias_restantes!==1?"s":""}. Contate o suporte para assinar.</span>
        </div>}
      </div>

      {/* Header — espaçado da área de clima por margin-top, sem mais competir pelo safe-area-top */}
      <div style={{padding:"10px 16px 12px",flexShrink:0,display:"flex",alignItems:"center",
        justifyContent:"space-between",zIndex:10,marginTop:6,
        background:"rgba(8,15,30,.8)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",
        borderBottom:"1px solid rgba(125,211,252,.1)"}}>
        <div>
          <div style={{color:"#e0f2fe",fontWeight:900,fontSize:18,lineHeight:1,textShadow:"0 0 20px rgba(56,189,248,.3)"}}>{TITLES[safeTab]}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
            <div style={{width:18,height:18,borderRadius:6,background:isOwner?"rgba(251,191,36,.2)":"rgba(14,165,233,.2)",border:`1px solid ${isOwner?"rgba(251,191,36,.4)":"rgba(14,165,233,.4)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Icon name={isOwner?"Shield":"User"} size={10} color={isOwner?"#fbbf24":"#38bdf8"}/>
            </div>
            {empresa&&<span style={{fontSize:12,color:"#38bdf8",fontWeight:700}}>{empresa.nome_fantasia}</span>}
            <span style={{fontSize:11,color:"rgba(186,230,253,.35)"}}>· {profile.name}</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#0ea5e9,#0284c7)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(14,165,233,.4)"}}>
            <Icon name="Droplets" size={17} color="#fff"/>
          </div>
          <button onClick={()=>setShowSupport(true)} style={{width:36,height:36,borderRadius:12,background:"rgba(56,189,248,.12)",border:"1px solid rgba(56,189,248,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Icon name="Headphones" size={15} color="#38bdf8"/>
          </button>
          <button onClick={logout} style={{width:36,height:36,borderRadius:12,background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.25)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
            <Icon name="LogOut" size={15} color="#f87171"/>
          </button>
        </div>
      </div>

      {/* Screen — minHeight:0 é a correção crítica: sem isso, este flex item nunca encolhe
          abaixo do tamanho do seu conteúdo, o que estoura a altura do container pai e
          empurra a bottom nav para fora da viewport visível em navegadores mobile. */}
      <div style={{flex:"1 1 auto",minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column",position:"relative",zIndex:5}}>
        {safeTab==="home"    &&<HomeScreen     key="home"    empresaId={profile.empresa_id}/>}
        {safeTab==="new"     &&<NewWashScreen  key="new"     empresaId={profile.empresa_id} userId={profile.id} onSuccess={()=>{setTab("home");showToast("✅ Veículo adicionado à fila!");}}/>}
        {safeTab==="crm"     &&isOwner&&<CRMScreen     key="crm"     empresaId={profile.empresa_id} onBadgeUpdate={()=>setCrmBadge(0)}/>}
        {safeTab==="history"&&<HistoryScreen key="history" empresaId={profile.empresa_id} isOwner={isOwner}/>}
        {safeTab==="config"  &&isOwner&&<ConfigScreen  key="config"  empresaId={profile.empresa_id} currentUser={profile} isOwner={isOwner} plano={assInfo?.plano||empresa?.plano||"trial"} onUpgrade={()=>setTab("config")} onUpdate={name=>{setEmpresa(e=>({...e,nome_fantasia:name}));showToast("✅ "+name+" atualizado!");}}/>}
      </div>

      {/* Bottom nav — flexShrink:0 garante que nunca seja comprimida nem empurrada para fora */}
      <div style={{flexShrink:0,display:"flex",padding:"8px 8px env(safe-area-inset-bottom,14px)",zIndex:10,
        background:"rgba(5,12,28,.85)",backdropFilter:"blur(28px)",WebkitBackdropFilter:"blur(28px)",
        borderTop:"1px solid rgba(125,211,252,.1)"}}>
        {TABS.map(({id,label,icon})=>{
          const active=safeTab===id;
          const showBadge=id==="crm"&&crmBadge>0;
          const bloqueado=id==="crm"&&!checkFeature(planoApp,"crm");
          return(
            <button key={id} className="nav-btn" onClick={()=>{
              if(bloqueado){
                showToast("🔒 CRM exclusivo do Plano Enterprise. Acesse Config → Plano para fazer upgrade.");
              }
              else setTab(id);
            }}>
              <div className={`nav-icon${active&&!bloqueado?" active":""}`} style={{position:"relative",opacity:bloqueado?.6:1}}>
                <Icon name={icon} size={16} color={active&&!bloqueado?"#fff":"rgba(186,230,253,.4)"}/>
                {/* Cadeado sobreposto no ícone quando bloqueado */}
                {bloqueado&&(
                  <div style={{position:"absolute",bottom:-3,right:-3,width:13,height:13,borderRadius:99,
                    background:"#fbbf24",border:"1.5px solid #0c1a2e",
                    display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Icon name="Lock" size={7} color="#0c1a2e"/>
                  </div>
                )}
                {showBadge&&!bloqueado&&(
                  <div style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,borderRadius:99,
                    background:"#f87171",border:"2px solid #0c1a2e",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:9,fontWeight:900,color:"#fff",padding:"0 3px",lineHeight:1}}>
                    {crmBadge>99?"99+":crmBadge}
                  </div>
                )}
              </div>
              <span style={{fontSize:10,fontWeight:700,
                color:bloqueado?"#fbbf24":active?"#38bdf8":"rgba(186,230,253,.35)"}}>
                {label}
              </span>
            </button>
          );
        })}
      </div>

      {/* Toast */}
      {toast&&<div className="toast" style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",background:"rgba(15,23,42,.92)",backdropFilter:"blur(16px)",border:"1px solid rgba(56,189,248,.2)",color:"#e0f2fe",fontSize:13,fontWeight:600,padding:"10px 20px",borderRadius:16,boxShadow:"0 8px 24px rgba(0,0,0,.4)",zIndex:99,maxWidth:"calc(100vw - 32px)",textAlign:"center",lineHeight:1.4}}>{toast}</div>}

      {/* Popup de resumo semanal do clima — aparece uma vez por dia */}
      {showWeeklyPopup&&<WeeklyWeatherPopup week={weekWeather} onClose={()=>setShowWeeklyPopup(false)}/>}

      {/* Suporte agora acessível direto do cabeçalho, em qualquer tela —
          não depende mais de navegar até Config para encontrar a aba. */}
      {showSupport&&(
        <div style={{position:"fixed",inset:0,zIndex:150,background:"rgba(8,15,28,.85)",backdropFilter:"blur(4px)",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 16px 12px",flexShrink:0}}>
            <div style={{color:"#e0f2fe",fontWeight:900,fontSize:18}}>Suporte</div>
            <button onClick={()=>setShowSupport(false)} style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,.08)",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
              <Icon name="XCircle" size={16} color="#bae6fd"/>
            </button>
          </div>
          <div style={{flex:1,minHeight:0,overflow:"hidden"}}>
            <SupportScreen embedded/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
</script>
</body>
</html>
