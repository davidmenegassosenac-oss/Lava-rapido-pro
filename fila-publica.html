<!DOCTYPE html>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',system-ui,sans-serif;background:#0c1a2e;color:#e0f2fe;min-height:100vh;-webkit-font-smoothing:antialiased}
    .card{background:rgba(255,255,255,.05);border:1px solid rgba(125,211,252,.12);border-radius:16px;padding:14px;margin-bottom:8px;transition:border-color .2s}
    .card.hl{border-color:rgba(14,165,233,.7);box-shadow:0 0 20px rgba(14,165,233,.25);background:rgba(14,165,233,.08)}
    .inp{width:100%;padding:13px 16px;border-radius:14px;background:rgba(255,255,255,.07);border:1px solid rgba(125,211,252,.2);color:#e0f2fe;font-family:'Outfit',sans-serif;font-size:16px;outline:none;-webkit-appearance:none}

    .spin{width:22px;height:22px;border:2.5px solid rgba(56,189,248,.2);border-top-color:#38bdf8;border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .pulse{animation:pl 2s ease-in-out infinite}
    @keyframes pl{0%,100%{opacity:1}50%{opacity:.5}}
    #root{min-height:100vh}
  </style>
</head>

/* ── Busca de empresa ── */
function BuscaScreen({onSelect}){
  const [q,setQ]=useState('');
  const [res,setRes]=useState([]);
  const [load,setLoad]=useState(false);
  const [erro,setErro]=useState('');
  const [afiliadas,setAfiliadas]=useState([]);
  const [loadAfil,setLoadAfil]=useState(true);
  const t=useRef(null);

  useEffect(()=>{
    sb.from('empresas')
      .select('id,nome_fantasia,telefone')
      .limit(6)
      .then(({data,error})=>{
        if(error)console.error('afiliadas:',error.message);
        setAfiliadas(data||[]);
        setLoadAfil(false);
      });
  },[]);

  useEffect(()=>{
    clearTimeout(t.current);
    if(q.trim().length<2){setRes([]);return;}
    t.current=setTimeout(async()=>{
      setLoad(true);setErro('');
      const{data,error}=await sb.from('empresas')
        .select('id,nome_fantasia,telefone')
        .ilike('nome_fantasia','%'+q.trim()+'%')
        .limit(8);
      setLoad(false);
      if(error){setErro('Erro ao buscar. Tente novamente.');return;}
      setRes(data||[]);
    },400);
    return()=>clearTimeout(t.current);
  },[q]);

  return(
    <div style={{minHeight:'100vh',padding:'50px 20px 40px',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{textAlign:'center',marginBottom:36}}>
        <div style={{fontSize:48,marginBottom:10}}>🚗💧</div>
        <div style={{fontSize:22,fontWeight:900,color:'#e0f2fe',marginBottom:4}}>Fila em Tempo Real</div>
        <div style={{fontSize:13,color:'rgba(186,230,253,.4)'}}>Acompanhe seu carro sem sair de casa</div>
      </div>
      <div style={{width:'100%',maxWidth:440}}>
        <input value={q} onChange={e=>setQ(e.target.value)}
          placeholder='Digite o nome do lava-jato...'
          className='inp' style={{marginBottom:12}} autoFocus/>
        {!q&&(
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.4)',
              textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>
              🤝 Lavações Parceiras
            </div>
            {loadAfil
              ?<div style={{textAlign:'center',padding:16}}><div className='spin' style={{margin:'0 auto'}}/></div>
              :afiliadas.length===0
                ?<div style={{fontSize:12,color:'rgba(186,230,253,.3)',textAlign:'center',padding:12}}>Nenhuma lavação disponível</div>
                :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {afiliadas.map((e,i)=>{
                    const ICONS=['🚗','💧','✨','🧼','⭐'];
                    const COLORS=['rgba(14,165,233,.15)','rgba(74,222,128,.12)','rgba(167,139,250,.12)','rgba(251,191,36,.12)','rgba(56,189,248,.1)'];
                    const BORDERS=['rgba(14,165,233,.3)','rgba(74,222,128,.25)','rgba(167,139,250,.25)','rgba(251,191,36,.25)','rgba(56,189,248,.2)'];
                    return(
                      <button key={e.id} onClick={()=>onSelect(e)}
                        style={{padding:'16px 14px',borderRadius:16,cursor:'pointer',textAlign:'left',
                          background:COLORS[i%COLORS.length],
                          border:'1px solid '+BORDERS[i%BORDERS.length],
                          display:'flex',flexDirection:'column',gap:6}}>
                        <span style={{fontSize:22}}>{ICONS[i%ICONS.length]}</span>
                        <span style={{fontSize:13,fontWeight:800,color:'#e0f2fe',lineHeight:1.2}}>{e.nome_fantasia}</span>

                  })}

        )}
        {load&&<div style={{textAlign:'center',padding:20}}><div className='spin' style={{margin:'0 auto'}}/></div>}
        {erro&&<div style={{padding:'10px 14px',borderRadius:12,background:'rgba(239,68,68,.12)',
          border:'1px solid rgba(239,68,68,.3)',color:'#f87171',fontSize:13,marginBottom:10}}>{erro}</div>}
        {res.map(e=>(
          <button key={e.id} onClick={()=>onSelect(e)}

            {e.telefone&&<div style={{fontSize:12,color:'rgba(186,230,253,.4)',marginTop:2}}>📞 {e.telefone}</div>}
          </button>
        ))}
        {!load&&!erro&&q.length>=2&&res.length===0&&(
          <div style={{textAlign:'center',padding:'20px 0',color:'rgba(186,230,253,.3)',fontSize:13}}>
            Nenhum lava-jato encontrado
          </div>
        )}

    </div>
  );
}

/* ── Modal cadastro ── */
function CadastroModal({empresa,onClose,onSuccess}){
  const [svcs,setSvcs]=useState([]);
  const [form,setForm]=useState({client:'',phone:'',model:'',plate:'',color:'#3b82f6'});
  const [svcsSelected,setSvcsSelected]=useState([]); // array de {id,nome,valor}
  const totalSvcs=svcsSelected.reduce((s,x)=>s+parseFloat(x.valor),0);
  const toggleSvc=s=>{
    const jasel=svcsSelected.find(x=>x.id===s.id);
    const bloq=limiteAtingido.includes(s.nome);
    // Bloqueado e NÃO selecionado → ignora
    if(bloq&&!jasel)return;
    // Já selecionado → remove sempre (mesmo bloqueado)
    if(jasel){
      setLimiteAtingido(l=>l.filter(n=>n!==s.nome));
      setSvcsSelected(prev=>prev.filter(x=>x.id!==s.id));
      return;
    }
    // Livre → seleciona e verifica limite
    setSvcsSelected(prev=>[...prev,s]);
    verificarLimite(s);
  };
  const [saving,setSaving]=useState(false);
  const [erro,setErro]=useState('');
  const [limiteAtingido,setLimiteAtingido]=useState([]);

  const verificarLimite=async(svc)=>{
    const hoje=new Date().toISOString().split('T')[0];
    const{data}=await sb.rpc('fn_verificar_limite_servico',{
      p_empresa_id:empresa.id,
      p_servico_nome:svc.nome,
      p_data:hoje,
    });
    if(data&&data.permitido===false){
      setLimiteAtingido(prev=>prev.includes(svc.nome)?prev:[...prev,svc.nome]);
    }else{
      setLimiteAtingido(prev=>prev.filter(n=>n!==svc.nome));
    }
  };

  useEffect(()=>{
    sb.from('servicos_catalogo').select('id,nome,valor')
      .eq('empresa_id',empresa.id).eq('ativo',true)
      .then(({data})=>setSvcs(data||[]));
  },[empresa.id]);

  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const mask=v=>{
    const d=v.replace(/\D/g,'').slice(0,11);
    if(d.length<=2)return d;
    if(d.length<=7)return'('+d.slice(0,2)+') '+d.slice(2);
    return'('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  };

  const confirmar=async()=>{
    if(!form.client.trim()||!form.phone.trim()||!form.model.trim()||!form.plate.trim()||!svcsSelected.length){
      setErro('Preencha todos os campos obrigatórios.');return;
    }
    setSaving(true);setErro('');
    const typeLabel=svcsSelected.map(s=>s.nome).join(' + ');
    const{error}=await sb.from('ordens_servico').insert({
      empresa_id:empresa.id,
      plate:form.plate.trim().toUpperCase(),
      model:form.model.trim(),
      client:form.client.trim(),
      phone:form.phone.replace(/\D/g,''),
      type:typeLabel,
      value:totalSvcs,
      color:form.color,
      status:'Aguardando',
    });
    setSaving(false);
    if(error){setErro('Erro ao cadastrar. Tente novamente.');return;}
    onSuccess();
  };

  const CORES=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#64748b'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',backdropFilter:'blur(4px)'}}/>
      <div style={{position:'relative',background:'linear-gradient(180deg,#0f1f38,#0c1a2e)',
        borderRadius:'24px 24px 0 0',padding:'20px 20px 44px',maxHeight:'92vh',overflowY:'auto',
        border:'1px solid rgba(125,211,252,.15)',borderBottom:'none'}}>
        <div style={{width:40,height:4,borderRadius:99,background:'rgba(125,211,252,.2)',margin:'0 auto 20px'}}/>
        <div style={{fontSize:17,fontWeight:900,color:'#e0f2fe',marginBottom:2}}>Entrar na Fila</div>
        <div style={{fontSize:12,color:'rgba(186,230,253,.4)',marginBottom:20}}>{empresa.nome_fantasia}</div>
        {[['client','Seu nome','João da Silva','text'],['phone','WhatsApp','(49) 99999-9999','tel'],
          ['model','Modelo do veículo','Honda Civic...','text'],['plate','Placa','ABC1D23','text']].map(([k,l,p,t])=>(
          <div key={k} style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.5)',textTransform:'uppercase',
              letterSpacing:'.08em',marginBottom:6}}>{l} *</div>
            <input value={form[k]} onChange={e=>F(k,k==='phone'?mask(e.target.value):k==='plate'?e.target.value.toUpperCase():e.target.value)}
              placeholder={p} type={t} className='inp'
              style={k==='plate'?{fontFamily:'monospace',letterSpacing:'.1em'}:{}}/>
          </div>
        ))}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.5)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Cor do ícone</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {CORES.map(c=>(
              <button key={c} onClick={()=>F('color',c)}
                style={{width:32,height:32,borderRadius:99,background:c,cursor:'pointer',border:'3px solid '+(form.color===c?'#fff':'transparent')}}/>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.5)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Serviço *</div>
          {svcs.length===0
            ?<div style={{fontSize:12,color:'rgba(186,230,253,.3)'}}>Carregando...</div>
            :<>
              {svcs.map(s=>{
                const sel=!!svcsSelected.find(x=>x.id===s.id);
                const bloq=limiteAtingido.includes(s.nome);
                // Bloqueado mas selecionado → botão clicável para desmarcar
                if(bloq&&sel)return(
                  <button key={s.id} onClick={()=>toggleSvc(s)}
                    style={{width:'100%',marginBottom:8,display:'flex',alignItems:'center',
                      gap:10,padding:'12px 14px',borderRadius:12,cursor:'pointer',
                      border:'1.5px solid rgba(239,68,68,.6)',background:'rgba(239,68,68,.12)'}}>
                    <div style={{width:20,height:20,borderRadius:6,flexShrink:0,border:'2px solid #f87171',
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#f87171',fontWeight:900}}>✕</div>
                    <div style={{flex:1,textAlign:'left'}}>
                      <span style={{fontSize:13,fontWeight:700,color:'#f87171'}}>{s.nome}</span>
                      <div style={{fontSize:10,color:'#f87171',marginTop:2}}>Toque para remover</div>
                    </div>
                    <span style={{fontSize:13,fontWeight:800,color:'#f87171',flexShrink:0}}>R$ {parseFloat(s.valor).toFixed(2).replace('.',',')}</span>
                  </button>
                );
                // Bloqueado e NÃO selecionado → div estática sem clique
                if(bloq)return(
                  <div key={s.id} style={{width:'100%',marginBottom:8,display:'flex',alignItems:'center',
                    gap:10,padding:'12px 14px',borderRadius:12,
                    border:'1.5px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.06)',opacity:.6}}>
                    <div style={{width:20,height:20,borderRadius:6,flexShrink:0,border:'2px solid #f87171',
                      display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>🔒</div>
                    <div style={{flex:1,textAlign:'left'}}>
                      <span style={{fontSize:13,fontWeight:700,color:'#f87171'}}>{s.nome}</span>
                      <div style={{fontSize:10,color:'#f87171',marginTop:2}}>⚠️ Limite diário atingido</div>
                    </div>
                    <span style={{fontSize:13,fontWeight:800,color:'#f87171',flexShrink:0}}>R$ {parseFloat(s.valor).toFixed(2).replace('.',',')}</span>
                  </div>
                );
                return(
                  <button key={s.id} onClick={()=>toggleSvc(s)}
                    style={{width:'100%',marginBottom:8,display:'flex',alignItems:'center',
                      gap:10,padding:'12px 14px',borderRadius:12,cursor:'pointer',
                      border:'1.5px solid '+(sel?'rgba(14,165,233,.6)':'rgba(125,211,252,.12)'),
                      background:sel?'rgba(14,165,233,.12)':'rgba(255,255,255,.04)'}}>
                    <div style={{width:20,height:20,borderRadius:6,flexShrink:0,
                      border:'2px solid '+(sel?'#38bdf8':'rgba(125,211,252,.3)'),
                      background:sel?'#38bdf8':'transparent',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:11,color:'#fff',fontWeight:900}}>
                      {sel?'✓':''}
                    </div>
                    <span style={{flex:1,fontSize:13,fontWeight:700,color:sel?'#38bdf8':'rgba(186,230,253,.6)',textAlign:'left'}}>{s.nome}</span>
                    <span style={{fontSize:13,fontWeight:800,color:'#4ade80',flexShrink:0}}>R$ {parseFloat(s.valor).toFixed(2).replace('.',',')}</span>
                  </button>
                );
              })}
              {svcsSelected.length>0&&(
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                  padding:'10px 14px',borderRadius:12,
                  background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.25)',marginTop:4}}>
                  <span style={{fontSize:12,color:'rgba(186,230,253,.5)',fontWeight:600}}>
                    {svcsSelected.length} serviço{svcsSelected.length>1?'s':''} selecionado{svcsSelected.length>1?'s':''}
                  </span>
                  <span style={{fontSize:16,fontWeight:900,color:'#4ade80'}}>
                    R$ {totalSvcs.toFixed(2).replace('.',',')}
                  </span>
                </div>
              )}
            </>
          }
        </div>
        {erro&&<div style={{padding:'10px 14px',borderRadius:12,background:'rgba(239,68,68,.12)',
          border:'1px solid rgba(239,68,68,.3)',color:'#f87171',fontSize:13,marginBottom:14}}>{erro}</div>}
        <div style={{display:'flex',gap:10}}>
          <button onClick={onClose} className='btn'
            style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(125,211,252,.15)',color:'rgba(186,230,253,.5)'}}>
            Cancelar
          </button>
          {(()=>{
            const bloqSel=svcsSelected.filter(x=>limiteAtingido.includes(x.nome));
            const temBloq=bloqSel.length>0;
            return(
              <button onClick={confirmar} disabled={saving||temBloq} className='btn'
                style={{background:'linear-gradient(135deg,#0ea5e9,#0284c7)',color:'#fff',
                  boxShadow:'0 6px 20px rgba(14,165,233,.35)',
                  opacity:(saving||temBloq)?.5:1}}>
                {saving?<div className='spin' style={{width:16,height:16}}/>
                  :temBloq?'Remova o serviço esgotado'
                  :'✅ Confirmar'}
              </button>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

/* ── Fila da empresa ── */
function FilaScreen({empresa,onVoltar}){
  const [fila,setFila]=useState([]);
  const [load,setLoad]=useState(true);
  const [busca,setBusca]=useState('');
  const [updated,setUpdated]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [toast,setToast]=useState('');
  const ch=useRef(null);

  const fetch=useCallback(()=>{
    sb.from('ordens_servico')
      .select('id,plate,model,status,color,created_at,hora_entrega')
      .eq('empresa_id',empresa.id)
      .in('status',['Aguardando','Lavando','Concluído'])
      .order('created_at',{ascending:true})
      .then(({data,error})=>{
        if(!error){setFila(data||[]);setUpdated(new Date());}
        setLoad(false);
      });
  },[empresa.id]);

  useEffect(()=>{
    fetch();
    if(ch.current)sb.removeChannel(ch.current);
    ch.current=sb.channel('fp'+empresa.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'ordens_servico',
        filter:'empresa_id=eq.'+empresa.id},fetch)
      .subscribe();
    return()=>{if(ch.current)sb.removeChannel(ch.current);};
  },[fetch]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),4000);};

  const bNorm=busca.trim().toLowerCase();
  const filtrada=bNorm?fila.filter(c=>c.model?.toLowerCase().includes(bNorm)):fila;
  const porSt=ORDEM.reduce((a,s)=>{a[s]=filtrada.filter(c=>c.status===s);return a;},{});

  return(
    <div style={{maxWidth:480,margin:'0 auto',paddingBottom:100}}>
      <div style={{padding:'16px 16px 0'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <button onClick={onVoltar}
            style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.06)',
              border:'1px solid rgba(125,211,252,.15)',color:'#e0f2fe',fontSize:18,
              cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:'rgba(186,230,253,.4)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em'}}>Fila em Tempo Real</div>
            <div style={{fontSize:16,fontWeight:900,color:'#e0f2fe',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{empresa.nome_fantasia}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:99,
            background:'rgba(74,222,128,.1)',border:'1px solid rgba(74,222,128,.25)',flexShrink:0}}>
            <div className='pulse' style={{width:6,height:6,borderRadius:99,background:'#4ade80'}}/>
            <span style={{fontSize:10,fontWeight:800,color:'#4ade80'}}>AO VIVO</span>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[{l:'Na fila',v:fila.filter(c=>c.status==='Aguardando').length,c:'#fbbf24'},
            {l:'Lavando',v:fila.filter(c=>c.status==='Lavando').length,c:'#38bdf8'},
            {l:'Prontos',v:fila.filter(c=>c.status==='Concluído').length,c:'#4ade80'}].map(k=>(
            <div key={k.l} style={{flex:1,padding:'10px 6px',borderRadius:14,textAlign:'center',
              background:'rgba(255,255,255,.04)',border:'1px solid rgba(125,211,252,.1)'}}>
              <div style={{fontSize:20,fontWeight:900,color:k.c}}>{k.v}</div>
              <div style={{fontSize:10,color:'rgba(186,230,253,.4)',fontWeight:600,marginTop:1}}>{k.l}</div>
            </div>
          ))}
        </div>
        <div style={{position:'relative',marginBottom:16}}>
          <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',fontSize:14,pointerEvents:'none'}}>🔍</span>
          <input value={busca} onChange={e=>setBusca(e.target.value)}
            placeholder='Buscar pelo modelo do seu carro...' className='inp' style={{paddingLeft:38,fontSize:13}}/>
          {busca&&<button onClick={()=>setBusca('')}
            style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',
              background:'transparent',border:'none',color:'rgba(186,230,253,.4)',fontSize:18,cursor:'pointer'}}>×</button>}
        </div>
      </div>

      {load?<div style={{textAlign:'center',padding:40}}><div className='spin' style={{margin:'0 auto'}}/></div>:(
        <>
          {ORDEM.map(status=>{
            const carros=porSt[status];
            const cfg=ST_CFG[status];
            if(!cfg||(!carros.length&&!bNorm))return null;
            return(
              <div key={status} style={{padding:'0 16px',marginBottom:20}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{fontSize:16}}>{cfg.e}</span>
                  <span style={{fontSize:12,fontWeight:800,color:cfg.c}}>{cfg.l}</span>
                  <div style={{flex:1,height:1,background:cfg.c+'30'}}/>
                  <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,
                    background:cfg.bg,border:'1px solid '+cfg.b,color:cfg.c}}>{carros.length}</span>
                </div>
                {!carros.length
                  ?<div style={{textAlign:'center',padding:'12px 0',color:'rgba(186,230,253,.2)',fontSize:12}}>Nenhum veículo aqui agora</div>
                  :carros.map((c,i)=>{
                    const hl=bNorm&&c.model?.toLowerCase().includes(bNorm);
                    const pos=porSt['Aguardando'].findIndex(x=>x.id===c.id);
                    const hora=c.hora_entrega?new Date(c.hora_entrega).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):null;
                    return(
                      <div key={c.id} className={'card'+(hl?' hl':'')}>
                        <div style={{display:'flex',alignItems:'center',gap:12}}>
                          <div style={{width:38,height:38,borderRadius:12,flexShrink:0,
                            background:(c.color||'#38bdf8')+'22',border:'1px solid '+(c.color||'#38bdf8')+'44',
                            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🚗</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:800,color:'#e0f2fe'}}>{mascaraPlaca(c.plate)}</div>
                            <div style={{fontSize:11,color:'rgba(186,230,253,.5)',marginTop:1}}>
                              {c.model}{hora&&<span style={{color:'#38bdf8',marginLeft:5}}>· ⏰ {hora}</span>}
                            </div>
                          </div>
                          <div style={{fontSize:11,flexShrink:0,textAlign:'right'}}>
                            {status==='Aguardando'&&<div style={{color:'rgba(186,230,253,.35)'}}>{pos===0?'Próximo':'#'+(pos+1)}</div>}
                            {status==='Lavando'&&<div className='pulse' style={{color:'#38bdf8',fontWeight:700}}>Lavando</div>}
                            {status==='Concluído'&&<div style={{color:'#4ade80',fontWeight:700}}>Pronto!</div>}
                          </div>
                        </div>
                        {hl&&(
                          <div style={{marginTop:10,padding:'10px 12px',borderRadius:12,
                            background:'rgba(14,165,233,.15)',border:'1px solid rgba(14,165,233,.35)'}}>
                            <div style={{fontSize:13,fontWeight:700,color:'#38bdf8',marginBottom:2}}>
                              {status==='Aguardando'&&('⏳ Na fila'+(pos===0?' — próximo!':' — posição '+(pos+1)))}
                              {status==='Lavando'&&'🧼 Sendo lavado agora!'}
                              {status==='Concluído'&&'✅ Pronto para retirada!'}
                            </div>
                            <div style={{fontSize:11,color:'rgba(56,189,248,.7)'}}>
                              {status==='Aguardando'&&pos===0&&'Previsão: em breve!'}
                              {status==='Aguardando'&&pos>0&&'Previsão: ~'+(pos*20)+' min'}
                              {status==='Lavando'&&'Previsão: ~25 min'}
                              {status==='Concluído'&&'Pode vir buscar agora 🎉'}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })
                }
              </div>
            );
          })}
          {!bNorm&&!fila.length&&(
            <div style={{textAlign:'center',padding:'50px 20px'}}>
              <div style={{fontSize:44,marginBottom:12}}>🚗</div>
              <div style={{fontSize:14,fontWeight:700,color:'rgba(186,230,253,.5)',marginBottom:4}}>Fila vazia!</div>
              <div style={{fontSize:12,color:'rgba(186,230,253,.25)'}}>Ótimo momento para trazer seu carro 😊</div>
            </div>
          )}
        </>
      )}

      {updated&&!load&&(
        <div style={{textAlign:'center',padding:'8px 20px',fontSize:10,color:'rgba(186,230,253,.2)'}}>
          Atualizado às {updated.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · Lava Rápido Pro
        </div>
      )}

      <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:50,width:'calc(100% - 32px)',maxWidth:448}}>
        <button onClick={()=>setShowForm(true)} className='btn'
          style={{background:'linear-gradient(135deg,#0ea5e9,#0284c7)',color:'#fff',
            boxShadow:'0 8px 28px rgba(14,165,233,.4)',fontSize:14}}>
          ➕ Agendar / Entrar na Fila
        </button>
      </div>

      {showForm&&<CadastroModal empresa={empresa} onClose={()=>setShowForm(false)}
        onSuccess={()=>{setShowForm(false);showToast('🎉 Prontinho! Seu veículo foi adicionado à fila.');fetch();}}/>}

      {toast&&(
        <div style={{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',
          background:'rgba(15,23,42,.95)',backdropFilter:'blur(16px)',
          border:'1px solid rgba(56,189,248,.2)',color:'#e0f2fe',fontSize:13,fontWeight:600,
          padding:'12px 20px',borderRadius:16,boxShadow:'0 8px 24px rgba(0,0,0,.4)',
          zIndex:300,maxWidth:'calc(100vw - 32px)',textAlign:'center',lineHeight:1.4}}>
          {toast}
        </div>
      )}
    </div>
  );
}

/* ── App ── */
function App(){
  const [empresa,setEmpresa]=useState(null);
  const [initLoad,setInitLoad]=useState(false);

  useEffect(()=>{
    const id=getEmpresaId();
    if(!id)return;
    setInitLoad(true);
    sb.from('empresas').select('id,nome_fantasia,telefone').eq('id',id).single()
      .then(({data})=>{if(data)setEmpresa(data);setInitLoad(false);})
      .catch(()=>setInitLoad(false));
  },[]);

  if(initLoad)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
      <div className='spin'/>
      <div style={{color:'rgba(186,230,253,.4)',fontSize:14}}>Carregando...</div>
    </div>
  );

  return empresa
    ?<FilaScreen empresa={empresa} onVoltar={()=>setEmpresa(null)}/>
    :<BuscaScreen onSelect={setEmpresa}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
