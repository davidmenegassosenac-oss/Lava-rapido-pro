// ── Status de funcionamento baseado no horário do banco ──────────────────
function getBusinessStatus(horario_funcionamento){
  const DIAS=['dom','seg','ter','qua','qui','sex','sab'];
  const agora=new Date();
  const diaKey=DIAS[agora.getDay()];
  const h=horario_funcionamento;
  if(!h||!h[diaKey]){return'fechado';}
  const cfg=h[diaKey];
  if(!cfg.aberto){return'fechado';}
  // Converte hh:mm para minutos desde meia-noite
  const toMin=str=>{if(!str)return 0;const[hh,mm]=str.split(':').map(Number);return hh*60+mm;};
  const now=agora.getHours()*60+agora.getMinutes();
  const ini=toMin(cfg.inicio);
  const fim=toMin(cfg.fim);
  if(now<ini||now>=fim){return'fechado';}
  if(fim-now<=30){return'fecha_logo';}
  return'aberto';
}

function StatusHorario({horario_funcionamento}){

function CadastroModal({empresa,onClose,onSuccess}){
  const [svcs,setSvcs]=useState([]);
  const [form,setForm]=useState({client:'',phone:'',model:'',plate:'',color:'#3b82f6'});
  const [svcsSelected,setSvcsSelected]=useState([]); // array de {id,nome,valor}
  const totalSvcs=svcsSelected.reduce((s,x)=>s+parseFloat(x.valor),0);
  const toggleSvc=s=>{
    const jasel=svcsSelected.find(x=>x.id===s.id);
    const bloq=limiteAtingido.includes(s.nome);
    // Bloqueado e NÃO selecionado → ignora
    if(bloq&&!jasel)return;
    // Já selecionado → remove da seleção
    // P3 — NÃO limpa limiteAtingido ao desmarcar: o limite no banco não mudou
    if(jasel){
      setSvcsSelected(prev=>prev.filter(x=>x.id!==s.id));
      return;
    }
    // Livre → seleciona e verifica limite
    setSvcsSelected(prev=>[...prev,s]);
    verificarLimite(s);
  };
  const [saving,setSaving]=useState(false);
  const [erro,setErro]=useState('');
  const [limiteAtingido,setLimiteAtingido]=useState([]);

  const verificarLimite=async(svc)=>{
    // P1 — data local, não UTC (evita overbooking após 22h no Brasil)
    const hoje=toLocalDateStr(new Date());
    try{
      const{data}=await sb.rpc('fn_verificar_limite_servico',{
        p_empresa_id:empresa.id,
        p_servico_nome:svc.nome,
        p_data:hoje,
      });
      if(data&&data.permitido===false){
        setLimiteAtingido(prev=>prev.includes(svc.nome)?prev:[...prev,svc.nome]);
      }else{
        setLimiteAtingido(prev=>prev.filter(n=>n!==svc.nome));
      }
    }catch(_){
      // P4 — falha de rede: bloqueia preventivamente para não gerar overbooking
      setLimiteAtingido(prev=>prev.includes(svc.nome)?prev:[...prev,svc.nome]);
    }
  };

  useEffect(()=>{
    sb.from('servicos_catalogo').select('id,nome,valor')
      .eq('empresa_id',empresa.id).eq('ativo',true)
      .then(({data})=>setSvcs(data||[]));
  },[empresa.id]);

  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const mask=v=>{
    const d=v.replace(/\D/g,'').slice(0,11);
    if(d.length<=2)return d;
    if(d.length<=7)return'('+d.slice(0,2)+') '+d.slice(2);
    return'('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7);
  };

  const confirmar=async()=>{
    if(!form.client.trim()||!form.phone.trim()||!form.model.trim()||!form.plate.trim()||!svcsSelected.length){
      setErro('Preencha todos os campos obrigatórios.');return;
    }
    setSaving(true);setErro('');
    const hoje=toLocalDateStr(new Date()); // P1 — data local

    // P2 — revalida limites no momento do submit (trava atômica contra race condition)
    try{
      const checks=await Promise.all(
        svcsSelected.map(s=>sb.rpc('fn_verificar_limite_servico',{
          p_empresa_id:empresa.id,p_servico_nome:s.nome,p_data:hoje
        }))
      );
      const esgotados=svcsSelected.filter((_,i)=>checks[i]?.data?.permitido===false);
      if(esgotados.length>0){
        setLimiteAtingido(esgotados.map(s=>s.nome));
        setErro(`Limite atingido para: ${esgotados.map(s=>s.nome).join(', ')}. Remova o serviço e tente novamente.`);
        setSaving(false);return;
      }
    }catch(_){
      setErro('Não foi possível verificar disponibilidade. Verifique sua conexão.');
      setSaving(false);return;
    }

    const typeLabel=svcsSelected.map(s=>s.nome).join(' + ');
    const phone=form.phone.replace(/\D/g,'');

    // Verifica se é cliente recuperado (sumiu há +30 dias)
    let recuperado=false;
    try{
      const{data:rData}=await sb.rpc('fn_verificar_cliente_recuperado',{
        p_empresa_id:empresa.id,p_phone:phone,p_plate:form.plate.trim().toUpperCase()
      });
      recuperado=rData===true;
    }catch(_){}

    const{error}=await sb.from('ordens_servico').insert({
      empresa_id:empresa.id,
      plate:form.plate.trim().toUpperCase(),
      model:form.model.trim(),
      client:form.client.trim(),
      phone,
      type:typeLabel,
      value:totalSvcs,
      color:form.color,
      status:'Aguardando',
      cliente_recuperado:recuperado,
    });
    setSaving(false);
    if(error){setErro('Erro ao cadastrar. Tente novamente.');return;}
    onSuccess(recuperado);
  };

  const CORES=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#64748b'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
      {/* Backdrop */}
      <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(5,12,30,.75)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)'}}/>

      {/* Sheet */}

        borderRadius:'28px 28px 0 0',maxHeight:'94vh',overflowY:'auto',
        border:'1px solid rgba(125,211,252,.12)',borderBottom:'none',
        boxShadow:'0 -20px 60px rgba(0,0,0,.6)'}}>

        {/* Bolhas decorativas */}
        <div style={{position:'absolute',top:-60,right:-40,width:180,height:180,borderRadius:'50%',
          background:'radial-gradient(circle,rgba(14,165,233,.2),transparent 70%)',
          filter:'blur(40px)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',top:40,left:-60,width:160,height:160,borderRadius:'50%',
          background:'radial-gradient(circle,rgba(139,92,246,.15),transparent 70%)',
          filter:'blur(45px)',pointerEvents:'none'}}/>

        <div style={{padding:'20px 20px 48px',position:'relative'}}>
          {/* Handle */}
          <div style={{width:44,height:5,borderRadius:99,
            background:'rgba(125,211,252,.15)',margin:'0 auto 24px'}}/>

          {/* Header */}
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:24}}>
            <div style={{width:48,height:48,borderRadius:16,flexShrink:0,
              background:'linear-gradient(135deg,#0ea5e9,#6366f1)',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:20,fontWeight:900,color:'#fff',
              boxShadow:'0 6px 20px rgba(14,165,233,.35)'}}>
              {empresa.nome_fantasia?.charAt(0).toUpperCase()}
            </div>
            <div>
              <div style={{fontSize:18,fontWeight:900,color:'#e0f2fe',lineHeight:1.2}}>
                Entrar na Fila
              </div>
              <div style={{fontSize:12,color:'rgba(186,230,253,.4)',marginTop:2}}>
                {empresa.nome_fantasia}
              </div>
            </div>
          </div>

          {/* Campos do formulário */}
          {[['client','👤 Seu nome','João da Silva','text'],
            ['phone','📱 WhatsApp','(49) 99999-9999','tel'],
            ['model','🚗 Modelo do veículo','Honda Civic...','text'],
            ['plate','🔡 Placa','ABC1D23','text']].map(([k,l,p,t])=>(
            <div key={k} style={{marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.4)',
                textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>{l}</div>
              <input value={form[k]}
                onChange={e=>F(k,k==='phone'?mask(e.target.value):k==='plate'?e.target.value.toUpperCase():e.target.value)}
                placeholder={p} type={t}

                  background:'rgba(255,255,255,.06)',

                  color:'#e0f2fe',fontFamily:'Outfit,sans-serif',fontSize:14,outline:'none',
                  ...(k==='plate'?{fontFamily:'monospace',letterSpacing:'.12em',textTransform:'uppercase'}:{})}}/>
            </div>
          ))}

          {/* Cor do ícone */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.4)',
              textTransform:'uppercase',letterSpacing:'.1em',marginBottom:8}}>🎨 Cor do veículo</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {CORES.map(c=>(
                <button key={c} onClick={()=>F('color',c)}
                  style={{width:34,height:34,borderRadius:99,background:c,cursor:'pointer',
                    border:form.color===c?'3px solid #fff':'3px solid transparent',
                    boxShadow:form.color===c?`0 0 12px ${c}88`:'none',
                    transition:'all .2s'}}/>
              ))}
            </div>
          </div>

          {/* Serviços */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:700,color:'rgba(186,230,253,.4)',
              textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>
              ✨ Escolha o serviço *
            </div>
            {svcs.length===0
              ?<div style={{textAlign:'center',padding:'16px 0',color:'rgba(186,230,253,.3)',fontSize:13}}>
                Carregando serviços...
              </div>
              :<div style={{display:'flex',flexDirection:'column',gap:8}}>
                {svcs.map(s=>{
                  const sel=!!svcsSelected.find(x=>x.id===s.id);
                  const bloq=limiteAtingido.includes(s.nome);
                  if(bloq&&sel)return(
                    <button key={s.id} onClick={()=>toggleSvc(s)}
                      style={{width:'100%',display:'flex',alignItems:'center',gap:10,
                        padding:'13px 16px',borderRadius:16,cursor:'pointer',
                        background:'rgba(239,68,68,.1)',backdropFilter:'blur(8px)',
                        border:'1.5px solid rgba(239,68,68,.4)'}}>
                      <div style={{width:22,height:22,borderRadius:7,flexShrink:0,

                      <div style={{flex:1,textAlign:'left'}}>

                      </div>
                      <span style={{fontSize:13,fontWeight:800,color:'#f87171',flexShrink:0}}>
                        R$ {parseFloat(s.valor).toFixed(2).replace('.',',')}
                      </span>
                    </button>
                  );
                  if(bloq)return(
                    <div key={s.id} style={{width:'100%',display:'flex',alignItems:'center',gap:10,
                      padding:'13px 16px',borderRadius:16,opacity:.55,
                      background:'rgba(239,68,68,.06)',border:'1px solid rgba(239,68,68,.2)'}}>
                      <div style={{width:22,height:22,borderRadius:7,flexShrink:0,
                        border:'2px solid rgba(248,113,113,.5)',display:'flex',
                        alignItems:'center',justifyContent:'center',fontSize:12}}>🔒</div>
                      <div style={{flex:1,textAlign:'left'}}>
                        <span style={{fontSize:13,fontWeight:700,color:'rgba(248,113,113,.7)'}}>{s.nome}</span>
                        <div style={{fontSize:10,color:'rgba(248,113,113,.5)',marginTop:1}}>⚠️ Limite diário atingido</div>
                      </div>
                      <span style={{fontSize:13,fontWeight:800,color:'rgba(248,113,113,.6)',flexShrink:0}}>
                        R$ {parseFloat(s.valor).toFixed(2).replace('.',',')}
                      </span>
                    </div>
                  );
                  return(
                    <button key={s.id} onClick={()=>toggleSvc(s)}
                      style={{width:'100%',display:'flex',alignItems:'center',gap:10,
                        padding:'13px 16px',borderRadius:16,cursor:'pointer',
                        backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
                        background:sel?'rgba(14,165,233,.12)':'rgba(255,255,255,.04)',
                        border:`1.5px solid ${sel?'rgba(14,165,233,.5)':'rgba(125,211,252,.1)'}`,
                        transition:'all .15s'}}>
                      <div style={{width:22,height:22,borderRadius:7,flexShrink:0,
                        background:sel?'#0ea5e9':'transparent',
                        border:`2px solid ${sel?'#0ea5e9':'rgba(125,211,252,.3)'}`,
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:12,color:'#fff',fontWeight:900,transition:'all .15s'}}>
                        {sel?'✓':''}
                      </div>
                      <span style={{flex:1,fontSize:13,fontWeight:700,
                        color:sel?'#38bdf8':'rgba(186,230,253,.7)',textAlign:'left'}}>
                        {s.nome}
                      </span>
                      <span style={{fontSize:13,fontWeight:800,color:'#4ade80',flexShrink:0}}>

                      </span>
                    </button>
                  );
                })}

                {/* Total selecionado */}
                {svcsSelected.length>0&&(

                      R$ {totalSvcs.toFixed(2).replace('.',',')}
                    </span>
                  </div>
                )}
              </div>
            }
          </div>

          {/* Erro */}
          {erro&&(
            <div style={{padding:'10px 14px',borderRadius:14,marginBottom:14,
              background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',
              color:'#f87171',fontSize:13,display:'flex',alignItems:'center',gap:8}}>
              ⚠️ {erro}
            </div>
          )}

          {/* Botões */}
          <div style={{display:'flex',gap:10}}>
            <button onClick={onClose}
              style={{flex:'0 0 auto',padding:'14px 20px',borderRadius:16,cursor:'pointer',
                background:'rgba(255,255,255,.05)',border:'1px solid rgba(125,211,252,.15)',
                color:'rgba(186,230,253,.5)',fontSize:14,fontWeight:700,fontFamily:'Outfit,sans-serif'}}>
              Voltar
            </button>
            {(()=>{
              const bloqSel=svcsSelected.filter(x=>limiteAtingido.includes(x.nome));
              const temBloq=bloqSel.length>0;
              const disabled=saving||temBloq||!svcsSelected.length;
              return(
                <button onClick={confirmar} disabled={disabled}
                  style={{flex:1,padding:'14px 20px',borderRadius:16,cursor:disabled?'not-allowed':'pointer',
                    background:disabled?'rgba(255,255,255,.06)':'linear-gradient(135deg,#0ea5e9,#6366f1)',
                    color:disabled?'rgba(186,230,253,.3)':'#fff',
                    fontSize:14,fontWeight:800,fontFamily:'Outfit,sans-serif',
                    boxShadow:disabled?'none':'0 6px 24px rgba(14,165,233,.35)',
                    opacity:disabled?.6:1,transition:'all .2s',border:'none'}}>
                  {saving
                    ?<div className='spin' style={{width:18,height:18,margin:'0 auto'}}/>
                    :temBloq?'Remova o serviço esgotado'
                    :!svcsSelected.length?'Selecione um serviço'
                    :'✅ Confirmar Agendamento'}
                </button>
              );
            })()}
          </div>
        </div>
      </div>
    </div>
  );
}

                          background:rec
                            ?'linear-gradient(135deg,rgba(251,191,36,.1),rgba(202,138,4,.05),rgba(255,255,255,.04))'
                            :hl?'rgba(14,165,233,.1)':'rgba(255,255,255,.05)',
                          backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)',
                          border:rec
                            ?`1.5px solid rgba(251,191,36,${lavandoRec?.5:.3})`
                            :`1px solid ${hl?'rgba(14,165,233,.35)':'rgba(125,211,252,.1)'}`,
                          boxShadow:rec
                            ?lavandoRec
                              ?'0 4px 24px rgba(251,191,36,.18),0 0 0 1px rgba(251,191,36,.1)'
                              :'0 4px 16px rgba(251,191,36,.1)'
                            :hl?'0 4px 20px rgba(14,165,233,.15)':'0 2px 12px rgba(0,0,0,.2)',
                          animation:lavandoRec?'pl 2.5s ease-in-out infinite':undefined}}>
                          {/* Badge cliente recuperado */}
                          {rec&&(
                            <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:10,
                              padding:'4px 10px',borderRadius:8,width:'fit-content',
                              background:'rgba(251,191,36,.15)',border:'1px solid rgba(251,191,36,.35)'}}>
                              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                              <span style={{fontSize:10,fontWeight:800,color:'#fbbf24',textTransform:'uppercase',letterSpacing:'.08em'}}>Cliente Recuperado</span>
                            </div>
                          )}
                          <div style={{display:'flex',alignItems:'center',gap:12}}>
                            {/* Avatar cor do veículo */}
                            <div style={{width:42,height:42,borderRadius:14,flexShrink:0,
                              background:rec?'rgba(251,191,36,.15)':(c.color||'#38bdf8')+'28',
                              border:rec?'1.5px solid rgba(251,191,36,.4)':'1.5px solid '+(c.color||'#38bdf8')+'55',
                              display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>
                              {rec?'⭐':'🚗'}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:14,fontWeight:900,
                                color:rec?'#fbbf24':'#e0f2fe',
                                letterSpacing:'.05em'}}>
                                {mascaraPlaca(c.plate)}
                              </div>
                              <div style={{fontSize:11,color:rec?'rgba(251,191,36,.6)':'rgba(186,230,253,.5)',marginTop:2}}>
                                {c.model}
                                {hora&&<span style={{color:rec?'#fbbf24':'#38bdf8',marginLeft:6}}>· ⏰ {hora}</span>}
                              </div>
                            </div>
                            <div style={{fontSize:11,flexShrink:0,textAlign:'right'}}>
                              {status==='Aguardando'&&(
                                <div style={{padding:'3px 9px',borderRadius:99,
                                  background:rec?'rgba(251,191,36,.15)':'rgba(251,191,36,.12)',
                                  border:rec?'1px solid rgba(251,191,36,.4)':'1px solid rgba(251,191,36,.25)',
                                  color:'#fbbf24',fontWeight:700}}>
                                  {pos===0?'Próximo':'#'+(pos+1)}
                                </div>
                              )}
                              {status==='Lavando'&&(
                                <div className='pulse' style={{padding:'3px 9px',borderRadius:99,
                                  background:rec?'rgba(251,191,36,.15)':'rgba(56,189,248,.12)',
                                  border:rec?'1px solid rgba(251,191,36,.4)':'1px solid rgba(56,189,248,.25)',
                                  color:rec?'#fbbf24':'#38bdf8',fontWeight:700}}>
                                  {rec?'✨ Lavando':'Lavando'}
                                </div>
                              )}
                              {status==='Concluído'&&(
                                <div style={{padding:'3px 9px',borderRadius:99,
                                  background:'rgba(74,222,128,.12)',border:'1px solid rgba(74,222,128,.25)',
                                  color:'#4ade80',fontWeight:700}}>
                                  Pronto!
                                </div>
                              )}
                            </div>
                          </div>
                          {hl&&(
                            <div style={{marginTop:12,padding:'12px 14px',borderRadius:14,
                              background:rec?'rgba(251,191,36,.1)':'rgba(14,165,233,.12)',
                              border:rec?'1px solid rgba(251,191,36,.3)':'1px solid rgba(14,165,233,.3)'}}>
                              <div style={{fontSize:13,fontWeight:800,color:rec?'#fbbf24':'#38bdf8',marginBottom:3}}>
                                {status==='Aguardando'&&('⏳ Na fila'+(pos===0?' — próximo!':' — posição '+(pos+1)))}
                                {status==='Lavando'&&(rec?'⭐ VIP sendo lavado agora!':'🧼 Sendo lavado agora!')}
                                {status==='Concluído'&&'✅ Pronto para retirada!'}
                              </div>
                              <div style={{fontSize:11,color:rec?'rgba(251,191,36,.7)':'rgba(56,189,248,.7)'}}>
                                {status==='Aguardando'&&pos===0&&'Previsão: em breve!'}
                                {status==='Aguardando'&&pos>0&&'~'+pos*20+' min de espera'}
                                {status==='Lavando'&&'Previsão: ~25 min'}
                                {status==='Concluído'&&'Pode vir buscar agora 🎉'}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })
                  }
                </div>
              );
            })}
            {!bNorm&&!fila.length&&(
              <div style={{textAlign:'center',padding:'60px 20px'}}>
                <div style={{fontSize:52,marginBottom:14}}>🚗</div>
                <div style={{fontSize:15,fontWeight:800,color:'rgba(186,230,253,.4)',marginBottom:6}}>
                  Fila vazia!
                </div>
                <div style={{fontSize:12,color:'rgba(186,230,253,.2)'}}>
                  Ótimo momento para trazer seu carro 😊
                </div>
              </div>
            )}
          </div>
        }

        {/* Timestamp */}
        {updated&&!load&&(
          <div style={{textAlign:'center',padding:'12px 20px',
            fontSize:10,color:'rgba(186,230,253,.18)'}}>
            Atualizado às {updated.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} · Lava Rápido Pro
          </div>
        )}
      </div>

      {/* FAB — Entrar na fila */}
      <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
        zIndex:50,width:'calc(100% - 32px)',maxWidth:448}}>
        <button onClick={()=>setShowForm(true)}
          style={{width:'100%',padding:'16px 24px',borderRadius:20,cursor:'pointer',border:'none',
            background:'linear-gradient(135deg,#0ea5e9,#6366f1)',color:'#fff',
            fontSize:15,fontWeight:800,fontFamily:'Outfit,sans-serif',
            boxShadow:'0 8px 32px rgba(14,165,233,.45)',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          ➕ Agendar / Entrar na Fila
        </button>
      </div>

      {showForm&&<CadastroModal empresa={empresa}
        onClose={()=>setShowForm(false)}
        onSuccess={rec=>{setShowForm(false);showToast(rec?'🌟 Que saudade! Bem-vindo de volta! Seu veículo está na fila.':'🎉 Prontinho! Seu veículo foi adicionado à fila.');fetch();}}/>}      {toast&&(
        <div style={{position:'fixed',bottom:96,left:'50%',transform:'translateX(-50%)',
          background:'rgba(8,15,30,.96)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
          border:'1px solid rgba(56,189,248,.2)',color:'#e0f2fe',
          fontSize:13,fontWeight:700,padding:'14px 22px',borderRadius:18,
          boxShadow:'0 8px 32px rgba(0,0,0,.5)',zIndex:300,
          maxWidth:'calc(100vw - 32px)',textAlign:'center',lineHeight:1.5}}>
          {toast}
        </div>
      )}
    </div>
  );
}

/* ── Bolhas subindo ── */
function BubbleRise(){
  const bs=React.useMemo(()=>Array.from({length:14},(_,i)=>({
    id:i,
    size:14+Math.random()*40,
    left:5+Math.random()*90,
    delay:Math.random()*16,
    dur:10+Math.random()*18,
  })),[]);
  return(
    <>
      {bs.map(b=>(
        <div key={b.id} className="bubble-rise" style={{
          width:b.size,height:b.size,
          left:b.left+'%',bottom:'-60px',
          animationDelay:b.delay+'s',
          animationDuration:b.dur+'s',
        }}/>
      ))}
    </>
  );
}

// Extrai data local YYYY-MM-DD ignorando UTC — evita bug de fuso horário
function toLocalDateStr(ds){
  const d=new Date(ds);
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dia=String(d.getDate()).padStart(2,'0');
  return`${y}-${m}-${dia}`;
}

/* ── App ── */
function App(){
  const [empresa,setEmpresa]=useState(null);
  const [initLoad,setInitLoad]=useState(false);

  useEffect(()=>{
    const id=getEmpresaId();
    if(!id)return;
    setInitLoad(true);
    sb.from('empresas').select('id,nome_fantasia,telefone').eq('id',id).single()
      .then(({data})=>{if(data)setEmpresa(data);setInitLoad(false);})
      .catch(()=>setInitLoad(false));
  },[]);

  if(initLoad)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',flexDirection:'column',gap:16}}>
      <div className='spin'/>
      <div style={{color:'rgba(186,230,253,.4)',fontSize:14}}>Carregando...</div>
    </div>
  );

  return empresa
    ?<FilaScreen empresa={empresa} onVoltar={()=>setEmpresa(null)}/>
    :<BuscaScreen onSelect={setEmpresa}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
